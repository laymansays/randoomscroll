function makeSlots(types, topics) {
  const t = types.length ? types : ["engaging"];
  const tp = topics && topics.length ? topics : ["general"];
  const s = [];
  let ti = 0;
  const slotsPerTopic = Math.ceil(21 / tp.length);
  let slotCount = 0;
  for (let d = 0; d < 7; d++)
    for (let x = 0; x < 3; x++) {
      const topicIndex = Math.floor(slotCount / slotsPerTopic) % tp.length;
      s.push({
        id: uid(), day: d, time: x,
        contentType: t[ti++ % t.length],
        topic: tp[topicIndex],
        status: "pending", script: null,
        videoBlob: null, videoUrl: null,
        youtubeId: null, scheduleStatus: "unscheduled",
      });
      slotCount++;
    }
  return s;
}

async function sbLoad(url, key, ch) {
  if (!url||!key||!ch) return null;
  try {
    const r = await fetch(url+"/rest/v1/r00m_data?channel_key=eq."+encodeURIComponent(ch)+"&select=*",
      {headers:{apikey:key, Authorization:"Bearer "+key}});
    const d = await r.json();
    return Array.isArray(d)&&d[0]?d[0]:null;
  } catch { return null; }
}
async function sbSave(url, key, ch, payload) {
  if (!url||!key||!ch) return;

    await fetch(url+"/rest/v1/r00m_data", {
      method:"POST",
      headers:{apikey:key, Authorization:"Bearer "+key, "Content-Type":"application/json", Prefer:"resolution=merge-duplicates"},

async function claudeCall(messages, opts) {
  const maxTokens = (opts&&opts.maxTokens)||1000;

  const r = await fetch("/api/claude", {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body),

  if (!r.ok) throw new Error("Claude "+r.status);
  return r.json();
}

function tryJSON(t) {

// ── Video Generation (Canvas + MediaRecorder) ──────────────────
function generateVideoBlob(slot) {
  return new Promise((resolve, reject) => {
    if (!window.MediaRecorder) { reject(new Error("MediaRecorder not supported — use Chrome")); return; }

    const W = 720, H = 1280;
    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    const accent = CTYPE_COLOR[slot.contentType] || "#ADFF2F";
    const hook = (slot.script && slot.script.hook) || "";
    const scriptText = (slot.script && slot.script.script) || "";
    const title = (slot.script && slot.script.title) || "";
    const allWords = scriptText.split(/\s+/).filter(w => w.length > 0);

    const mimeType = MediaRecorder.isTypeSupported("video/webm;codecs=vp8")
      ? "video/webm;codecs=vp8" : "video/webm";
    const stream = canvas.captureStream(24);
    const recorder = new MediaRecorder(stream, {mimeType, videoBitsPerSecond:1800000});
    const chunks = [];

    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => resolve(new Blob(chunks, {type:"video/webm"}));
    recorder.onerror = e => reject(e.error||new Error("Recording failed"));

    let frameId = null;
    let phase = "hook";
    let wordIndex = 0;
    let phaseStart = Date.now();
    let lastWordTime = Date.now();
    const MS_PER_WORD = 400;
    const HOOK_DURATION = 2800;

    function wrapText(text, maxW, font) {
      ctx.font = font;
      const words = text.split(" ");
      const lines = [];
      let cur = "";
      for (const w of words) {
        const test = cur ? cur+" "+w : w;
        if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
        else cur = test;
      }
      if (cur) lines.push(cur);
      return lines;
    }

    function drawBg() {
      ctx.fillStyle = "#08080E";
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = accent;
      ctx.fillRect(0,0,W,6);
      ctx.fillRect(0,H-6,W,6);
    }

    function drawHook() {
      drawBg();
      const elapsed = Date.now() - phaseStart;
      const prog = Math.min(elapsed / HOOK_DURATION, 1);
      const alpha = prog < 0.12 ? prog/0.12 : prog > 0.88 ? (1-prog)/0.12 : 1;
      ctx.save(); ctx.globalAlpha = alpha;

      ctx.font = "bold 32px 'Space Mono', monospace";
      ctx.fillStyle = accent; ctx.textAlign = "center";
      ctx.fillText("HOOK", W/2, H/2 - 160);

      const lines = wrapText(hook, W-80, "bold 60px 'Syne', sans-serif");
      ctx.fillStyle = "#FFFFFF"; ctx.textAlign = "center";
      const lh = 78;
      let y = H/2 - (lines.length*lh)/2 + 20;
      lines.forEach(l => { ctx.font = "bold 60px 'Syne', sans-serif"; ctx.fillText(l,W/2,y); y+=lh; });

      ctx.restore();
    }

    function drawScript() {
      drawBg();
      const shown = allWords.slice(0, wordIndex+1);
      const recent = shown.slice(-10);
      const display = recent.join(" ");
      const progress = (wordIndex+1)/allWords.length;

      // Progress bar
      ctx.fillStyle = "#1A1A2A";
      ctx.beginPath(); ctx.roundRect(50,100,W-100,8,4); ctx.fill();
      ctx.fillStyle = accent;
      ctx.beginPath(); ctx.roundRect(50,100,(W-100)*progress,8,4); ctx.fill();

      // Type badge
      ctx.font = "bold 28px 'Space Mono', monospace";
      ctx.fillStyle = accent; ctx.textAlign = "center";
      ctx.fillText(slot.contentType.toUpperCase(), W/2, 170);

      // Main words
      const fontSize = allWords.length > 40 ? 54 : 64;
      const font = `bold ${fontSize}px 'Syne', sans-serif`;
      const lines = wrapText(display, W-80, font);
      const lh = fontSize*1.35;
      let y = H/2 - (lines.length*lh)/2;
      lines.forEach((l,i) => {
        ctx.font = font; ctx.textAlign = "center";
        ctx.fillStyle = i===lines.length-1 ? accent : "rgba(255,255,255,0.65)";
        ctx.fillText(l, W/2, y); y+=lh;
      });

      // Title footer
      ctx.font = "bold 26px 'Syne', sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      ctx.textAlign = "center";
      ctx.fillText(title.slice(0,42)+(title.length>42?"...":""), W/2, H-50);
    }

    function frame() {
      const now = Date.now();
      if (phase === "hook") {
        drawHook();
        if (now - phaseStart >= HOOK_DURATION) { phase="script"; lastWordTime=now; }
      } else {
        drawScript();
        if (now - lastWordTime >= MS_PER_WORD) {
          wordIndex++;
          lastWordTime = now;
          if (wordIndex >= allWords.length) {
            setTimeout(() => { recorder.stop(); cancelAnimationFrame(frameId); }, 1200);
            return;
          }
        }
      }
      frameId = requestAnimationFrame(frame);
    }

    recorder.start(100);
    frame();
  });
}

// ── YouTube Upload ─────────────────────────────────────────────
async function uploadToYouTube(blob, slot, accessToken, publishAt) {
  const title  = (slot.script && slot.script.title) || "Untitled";
  const desc   = (slot.script && slot.script.ytCaption || "#Shorts") + "\n\n#Shorts";
  const meta   = {
    snippet:{ title, description:desc, tags:["shorts","#shorts"], categoryId:"22" },
    status:{ privacyStatus:"private", publishAt, selfDeclaredMadeForKids:false },
  };

  // Resumable upload — handles any file size
  const initR = await fetch(
    "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status",
    {
      method:"POST",
      headers:{
        Authorization:"Bearer "+accessToken,
        "Content-Type":"application/json",
        "X-Upload-Content-Type":"video/webm",
        "X-Upload-Content-Length":String(blob.size),
      },
      body:JSON.stringify(meta),
    }
  );
  if (!initR.ok) {
    const err = await initR.json();
    throw new Error("YouTube init failed: "+(err.error&&err.error.message||initR.status));
  }
  const uploadUrl = initR.headers.get("Location");
  if (!uploadUrl) throw new Error("No upload URL from YouTube");

  const uploadR = await fetch(uploadUrl, {
    method:"PUT",
    headers:{"Content-Type":"video/webm", "Content-Length":String(blob.size)},
    body:blob,
  });
  if (!uploadR.ok) throw new Error("YouTube upload failed: "+uploadR.status);
  const data = await uploadR.json();
  return data.id;
}

function buildPublishTime(day, timeStr, offsetDays) {
  const DAY = {Mon:0,Tue:1,Wed:2,Thu:3,Fri:4,Sat:5,Sun:6};
  const HRS  = {"7:00 AM":"07:00","1:00 PM":"13:00","6:00 PM":"18:00"};
  const now  = new Date();
  const target = new Date(now);
  const diff = (DAY[day]||0) - now.getDay();
  target.setDate(now.getDate() + ((diff+7)%7) + (offsetDays||7));
  const [h,m] = (HRS[timeStr]||"07:00").split(":").map(Number);
  target.setHours(h,m,0,0);
  return target.toISOString();
}

function StatBox(p){const a=p.accent||"#ADFF2F";return <div style={{flex:1,minWidth:"90px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"12px 14px"}}><div style={{fontFamily:"Space Mono",fontSize:"20px",fontWeight:700,color:a,lineHeight:1}}>{p.value}</div><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,marginTop:"5px"}}>{p.label}</div>{p.sub&&<div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text2)",marginTop:"2px"}}>{p.sub}</div>}</div>;}
function Btn(p){const v=p.variant||"primary";const look={primary:{background:p.disabled?p.disabled?"#1c1c28":"#ADFF2F",color:p.disabled?"#444":"#08080E",border:"none"},outline:{background:"transparent",color:"#ADFF2F",border:"1px solid #ADFF2F55"},danger:{background:"transparent",color:"#FF2D6B",border:"1px solid #FF2D6B44"},ghost:{background:"var(--card)",color:"var(--text3)",border:"1px solid var(--border)"},green:{background:"#0D1A0D",color:"#ADFF2F",border:"1px solid #ADFF2F44"},orange:{background:"#1A0A00",color:"#FF6B35",border:"1px solid #FF6B3544"}}[v]||{};return <button onClick={p.onClick} disabled={p.disabled} style={{...look,fontFamily:"Syne",fontWeight:700,fontSize:p.small?"12px":"14px",padding:p.small?"7px 14px":"11px 22px",borderRadius:"8px",cursor:p.disabled?"not-allowed":"pointer",transition:"all .15s",width:p.full?"100%":undefined,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:"6px"}}>{p.children}</button>;}
function ZoneCard(p){const done=p.frozen&&p.status!=="live";const cfg={live:{label:"LIVE",bg:"#0A1A0A",border:"#ADFF2F",dot:"#ADFF2F",pulse:true},draft:{label:"DRAFT",bg:"#1A1200",border:"#FF6B35",dot:"#FF6B35",pulse:false},intention:{label:"OPEN",bg:"var(--card)",border:"var(--border)",dot:"#333",pulse:false},done:{label:"DONE",bg:"#0d0d0d",border:"#1a1a1a",dot:"#222",pulse:false}}[done?"done":p.status]||{};return <div onClick={!done&&p.status!=="live"?p.onClick:undefined} style={{background:cfg.bg,border:"1px solid "+(p.selected?"#ADFF2F":cfg.border),borderRadius:"12px",padding:"12px",minHeight:"84px",cursor:done||p.status==="live"?"default":"pointer",opacity:done?0.4:1,transition:"all .2s",outline:p.selected?"2px solid #ADFF2F22":"none"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}><span style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text2)"}}>WK {p.week}</span><div style={{display:"flex",alignItems:"center",gap:"4px"}}><div style={{width:6,height:6,borderRadius:"50%",background:cfg.dot,...(cfg.pulse?{animation:"pulse 2s infinite"}:{})}}/>  <span style={{fontFamily:"Space Mono",fontSize:"9px",color:cfg.dot}}>{cfg.label}</span></div></div><div style={{fontWeight:700,fontSize:"13px",color:done?"#333":"#E8E8F0",marginBottom:"5px",lineHeight:1.3}}>{p.niche||"Plan this week"}</div>{p.score!=null&&<div style={{fontFamily:"Space Mono",fontSize:"14px",color:"#ADFF2F"}}>{p.score}<span style={{fontSize:"10px",color:"var(--text4)"}}>/100</span></div>}{p.status==="intention"&&!done&&<div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text3)",marginTop:"3px"}}>tap to plan</div>}</div>;}

// ── Command Center ─────────────────────────────────────────────
function CommandCenter({weeks, onNavigate}) {
  const live  = weeks.find(w=>w.status==="live");
  const draft = weeks.find(w=>w.status==="draft"&&w.slots&&w.slots.length>0);
  const open  = weeks.find(w=>w.status==="intention");
  const pending   = draft?draft.slots.filter(s=>s.status==="pending").length:0;
  const videoDone = draft?draft.slots.filter(s=>s.scheduleStatus==="youtube_done").length:0;
  const nextAction = !live&&!draft?{msg:"Start: Planner → pick niche + topics → lock Week 1",tab:"planner"}:!draft?{msg:"Planner → lock Week "+(open?open.id:2),tab:"planner"}:pending>0?{msg:"Content Engine → generate "+pending+" scripts",tab:"engine"}:videoDone<21?{msg:"Content Engine → generate videos → upload to YouTube",tab:"engine"}:{msg:"All done. Check back Sunday for analytics.",tab:null};
  const steps=[
    {s:live?"done":"pending",t:"Wk1",text:live?"Week "+live.id+" live — "+live.niche:"Lock Week 1 in Planner"},
    {s:draft?"done":live?"active":"pending",t:"Next",text:draft?"Week "+draft.id+" drafted":"Lock next week"},
    {s:pending===0&&draft?"done":"pending",t:"Scripts",text:"Scripts: "+(draft?(21-pending)+"/21":"0/21")},
    {s:videoDone>0?"done":"pending",t:"Videos",text:"Videos generated & on YouTube: "+videoDone+"/21"},
    {s:"pending",t:"Sunday",text:"Analytics → engine evolves → next niche"},
  ];
  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite"}}/>
          <span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",letterSpacing:"0.08em"}}>ENGINE READY</span>
        </div>
        <h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Command Center</h2>
        <p style={{color:"var(--text4)",fontSize:"13px",marginTop:"3px"}}>{live?"Week "+live.id+" live — "+live.niche:draft?"Week "+draft.id+" drafting":"No weeks planned — start in Planner"}</p>
      </div>
      <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
        <StatBox label="Scripts" value={(21-pending)+"/21"} sub="generated" accent="#FF6B35"/>
        <StatBox label="Videos on YT" value={videoDone+"/21"} sub="uploaded" accent="#ADFF2F"/>
        <StatBox label="Weeks Open" value={weeks.filter(w=>w.status==="intention").length} sub="to plan" accent="#B06EF3"/>
        <StatBox label="Live Score" value={live?(live.score||"—"):"—"} sub="this week" accent="#00CFFF"/>
      </div>
      <div>
        <SL>ROLLING RUNWAY</SL>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}}>
          {weeks.map(w=><ZoneCard key={w.id} week={w.id} niche={w.niche} status={w.status} score={w.score} frozen={w.frozen} onClick={()=>onNavigate(w.status==="intention"?"planner":"engine")}/>)}
        </div>
      </div>
      {!live&&!draft&&<div style={{background:"#0A1A0A",border:"1px solid #ADFF2F33",borderRadius:"12px",padding:"16px"}}><SL color="#ADFF2F">HOW TO START</SL>{["1. Planner → enter niche → search topics → lock Week 1","2. Content Engine → generate all 21 scripts","3. Content Engine → generate videos (browser does it)","4. Upload all to YouTube with one tap"].map((s,i)=><div key={i} style={{fontSize:"13px",color:"var(--text3)",marginBottom:"4px"}}>{s}</div>)}</div>}
      <Card>
        <SL>PIPELINE STATUS</SL>
        {steps.map((step,i)=>{const dc=step.s==="done"?"#ADFF2F":step.s==="active"?"#FF6B35":"#2a2a3a";return <div key={i} style={{display:"flex",gap:"12px",alignItems:"flex-start",marginBottom:"10px"}}><div style={{width:18,height:18,borderRadius:"50%",flexShrink:0,marginTop:"2px",display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid "+dc,background:dc+"18",fontSize:"9px",color:dc,...(step.s==="active"?{animation:"pulse 2s infinite"}:{})}}>{step.s==="done"?"✓":step.s==="active"?"◉":"○"}</div><div style={{flex:1,fontSize:"13px",color:step.s==="pending"?"#444":"#CCC"}}>{step.text}</div><span style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text3)",flexShrink:0}}>{step.t}</span></div>;})}
      </Card>
      <div style={{background:"#0D1A0D",border:"1px solid #ADFF2F33",borderRadius:"12px",padding:"14px 16px"}}>
        <SL color="#ADFF2F">NEXT ACTION</SL>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px",flexWrap:"wrap"}}>
          <p style={{fontSize:"14px",color:"var(--text2)",flex:1}}>{nextAction.msg}</p>
          {nextAction.tab&&<Btn small variant="green" onClick={()=>onNavigate(nextAction.tab)}>Go</Btn>}
        </div>
      </div>
    </div>
  );
}

// ── Weekly Planner ─────────────────────────────────────────────
function WeeklyPlanner({weeks, setWeeks, lastInsight}) {
  const firstOpen = weeks.find(x=>x.status==="intention");
  const [selWeek, setSelWeek] = useState(firstOpen?firstOpen.id:1);
  const [niche,   setNiche]   = useState("");
  const [trending,setTrending]= useState([]);
  const [loading, setLoading] = useState(false);
  const [trendErr,setTrendErr]= useState("");
  const [topics,  setTopics]  = useState(["","",""]);
  const [selTypes,setSelTypes]= useState(["cliffhanger","explanatory"]);
  const [usedRec, setUsedRec] = useState(false);
  const week = weeks.find(w=>w.id===selWeek);
  const hasRecs = lastInsight&&lastInsight.nextNiches&&lastInsight.nextNiches.length>0;
  const validTopics = topics.filter(t=>t.trim().length>0);
  const canLock = validTopics.length>0&&selTypes.length>0&&niche.trim().length>0;
  const slotsPerTopic = validTopics.length>0?Math.ceil(21/validTopics.length):7;

  const doSearch = async()=>{
    if(!niche.trim()){setTrendErr("Enter a niche first");return;}
    setTrendErr("");setLoading(true);setTrending([]);
    try{
      const d=await claudeCall([{role:"user",content:"Generate 8 specific trending YouTube Shorts topic ideas for the \""+niche.trim()+"\" niche. Make each topic specific, clickable, and with high viral potential. Assign a heat score 70-99. Return ONLY valid JSON:\n[{\"topic\":\"specific topic\",\"heat\":95,\"source\":\"YouTube\"},...]"}],{maxTokens:900});
      const t=tryJSON(getText(d))||[];
      if(t.length){setTrending(t);}else{setTrendErr("Try a more specific niche like 'AI Tools' or 'Personal Finance'");}
    }catch{setTrendErr("Search failed — check connection");}
    setLoading(false);
  };

  const setTopic=(idx,val)=>{const u=[...topics];u[idx]=val;setTopics(u);};
  const pickTrending=(topicText)=>{const empty=topics.findIndex(t=>t.trim()==="");const target=empty>=0?empty:2;const u=[...topics];u[target]=topicText;setTopics(u);};
  const toggleType=id=>setSelTypes(p=>p.includes(id)?p.filter(t=>t!==id):[...p,id]);

  const lockWeek=()=>{
    if(!canLock)return;
    const filled=validTopics;
    const isFirst=weeks.filter(x=>x.status==="live").length===0;
    setWeeks(prev=>prev.map(w=>w.id===selWeek?{...w,status:isFirst?"live":"draft",frozen:isFirst,niche:niche.trim(),topic:filled[0],topics:filled,contentTypes:selTypes,slots:makeSlots(selTypes,filled)}:w));
    setTopics(["","",""]);setNiche("");setTrending([]);setUsedRec(false);
  };

  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
      <div><h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Weekly Planner</h2><p style={{color:"var(--text4)",fontSize:"13px",marginTop:"3px"}}>One niche · Multiple topics · 21 videos · Rolling runway</p></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}}>
        {weeks.map(w=><ZoneCard key={w.id} week={w.id} niche={w.niche} status={w.status} score={w.score} frozen={w.frozen} selected={selWeek===w.id} onClick={()=>setSelWeek(w.id)}/>)}
      </div>
      {week&&(week.status==="live"||week.status==="draft")&&!week.frozen&&<Card accent="#FF6B3544"><SL color="#FF6B35">WEEK {selWeek} LOCKED</SL><p style={{fontSize:"13px",color:"var(--text3)",marginBottom:"10px"}}>Go to <strong style={{color:"#ADFF2F"}}>Content Engine</strong> to generate scripts and videos.</p><div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}><Tag color="#FF6B35">{week.niche}</Tag>{(week.topics||[]).map((t,i)=><Tag key={i} color="#00CFFF">{t.slice(0,28)}</Tag>)}</div></Card>}
      {week&&week.frozen&&<Card accent="#ADFF2F33"><SL color="#ADFF2F">WEEK {selWeek} — LIVE</SL><p style={{fontSize:"13px",color:"var(--text3)",lineHeight:1.75}}>Publishing automatically 3x/day.</p></Card>}
      {week&&week.status==="intention"&&<Card style={{display:"flex",flexDirection:"column",gap:"18px"}}>
        <div style={{fontWeight:700,fontSize:"16px"}}>Planning Week {selWeek}{weeks.filter(x=>x.status==="live").length===0?" — This becomes your live Week 1":""}</div>
        {hasRecs&&<div style={{background:"#070712",border:"1px solid #00CFFF22",borderRadius:"12px",padding:"14px"}}><div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}><div style={{width:22,height:22,borderRadius:"50%",background:"#00CFFF14",border:"1px solid #00CFFF44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",color:"#00CFFF"}}>◈</div><SL color="#00CFFF">ENGINE RECOMMENDS</SL></div><div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>{lastInsight.nextNiches.map((n,i)=><button key={i} onClick={()=>{setNiche(n);setUsedRec(true);}} style={{background:usedRec&&niche===n?"#0D1A0D":"#0A0A12",border:"1px solid "+(usedRec&&niche===n?"#ADFF2F":i===0?"#FF6B3566":"#1A1A2A"),color:i===0?"#FF6B35":"#888",padding:"7px 14px",borderRadius:"8px",fontFamily:"Syne",fontWeight:i===0?700:400,fontSize:"13px",cursor:"pointer"}}>{i===0&&"★ "}{n}</button>)}</div></div>}
        {!hasRecs&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"10px",padding:"12px"}}><p style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text2)",lineHeight:1.7}}>Engine recommendations appear after your first analytics run.</p></div>}
        <div><SL>STEP 1 — NICHE</SL><input value={niche} onChange={e=>{setNiche(e.target.value);setUsedRec(false);}} placeholder="e.g. AI Tools, Personal Finance, True Crime..." style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"8px",padding:"10px 14px",color:"var(--text)",fontSize:"13px"}}/></div>
        <div>
          <SL>STEP 2 — TOPICS (up to 3, ~{slotsPerTopic} videos each)</SL>
          {[0,1,2].map(idx=><div key={idx} style={{marginBottom:"8px"}}><div style={{fontSize:"11px",color:"var(--text4)",fontFamily:"Space Mono",marginBottom:"3px"}}>TOPIC {idx+1} {idx===0?"(required)":"(optional)"}</div><input value={topics[idx]} onChange={e=>setTopic(idx,e.target.value)} placeholder={idx===0?"Main topic...":idx===1?"Second angle (optional)...":"Third angle (optional)..."} style={{width:"100%",background:topics[idx]?"#0D1A0D":"var(--bg3)",border:"1px solid "+(topics[idx]?"#ADFF2F44":"var(--border)"),borderRadius:"8px",padding:"10px 14px",color:"var(--text)",fontSize:"13px",transition:"all .2s"}}/></div>)}
          <div style={{marginTop:"10px"}}><Btn variant="outline" small onClick={doSearch}>{loading?<><Spinner size={12}/>Searching...</>:"Search Trending Topics"}</Btn></div>
          {trendErr&&<div style={{fontSize:"12px",color:"#FF2D6B",marginTop:"8px"}}>{trendErr}</div>}
          {trending.length>0&&<div style={{marginTop:"10px",display:"flex",flexDirection:"column",gap:"4px"}}>{trending.map((t,i)=>{const added=topics.some(tp=>tp===t.topic);return <div key={i} onClick={()=>!added&&pickTrending(t.topic)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 12px",borderRadius:"8px",cursor:added?"default":"pointer",background:added?"#0D1A0D":"var(--bg3)",border:"1px solid "+(added?"#ADFF2F44":"var(--border)"),opacity:added?0.7:1}}><div style={{fontFamily:"Space Mono",fontSize:"12px",fontWeight:700,width:26,flexShrink:0,color:t.heat>92?"#FF2D6B":t.heat>87?"#FF6B35":"#ADFF2F"}}>{t.heat}</div><div style={{flex:1,fontSize:"13px"}}>{t.topic}</div><div style={{fontFamily:"Space Mono",fontSize:"9px",color:added?"#ADFF2F":"#444"}}>{added?"✓":t.source}</div></div>;})}</div>}
        </div>
        <div>
          <SL>STEP 3 — CONTENT TYPE MIX</SL>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"8px"}}>{CTYPES.map(ct=><button key={ct.id} onClick={()=>toggleType(ct.id)} style={{background:selTypes.includes(ct.id)?ct.color+"22":"var(--bg3)",border:"1px solid "+(selTypes.includes(ct.id)?ct.color:"var(--border)"),color:selTypes.includes(ct.id)?ct.color:"var(--text4)",padding:"6px 12px",borderRadius:"20px",fontFamily:"Syne",fontWeight:700,fontSize:"12px",cursor:"pointer",transition:"all .15s"}}>{ct.label}</button>)}</div>
          <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text2)"}}>21 videos · {selTypes.length} format{selTypes.length!==1?"s":""} · {validTopics.length||1} topic{validTopics.length!==1?"s":""}</div>
        </div>
        {canLock&&<div style={{background:"#0A1A0A",border:"1px solid #ADFF2F22",borderRadius:"10px",padding:"12px 14px"}}><div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:"8px"}}>WEEK {selWeek} SUMMARY</div><div style={{fontSize:"13px",color:"var(--text3)",lineHeight:1.8}}><div>Niche: <strong style={{color:"var(--text)"}}>{niche}</strong></div>{validTopics.map((t,i)=><div key={i}>Topic {i+1}: <strong style={{color:"var(--text)"}}>{t}</strong> — {slotsPerTopic} videos</div>)}<div>Formats: <strong style={{color:"var(--text)"}}>{selTypes.join(", ")}</strong></div></div></div>}
        <Btn onClick={lockWeek} disabled={!canLock}>Lock Week {selWeek} and Start</Btn>
      </Card>}
    </div>
  );
}

// ── Content Engine ─────────────────────────────────────────────
function ContentEngine({weeks, setWeeks, settings, onNavigate, theme}) {
  const workable = weeks.filter(w=>w.slots&&w.slots.length>0&&(w.status==="draft"||w.status==="live"));
  const lastW = workable[workable.length-1];
  const [activeId,   setActiveId]   = useState(lastW?lastW.id:null);
  const [generating, setGenerating] = useState(false);
  const [genProgress,setGenProgress]= useState(0);
  const [genTotal,   setGenTotal]   = useState(0);
  const [expanded,   setExpanded]   = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [manifest,   setManifest]   = useState("");
  const [importErr,  setImportErr]  = useState("");
  const [importOk,   setImportOk]   = useState(false);
  const [exported,   setExported]   = useState(false);

  const activeWeek = weeks.find(w=>w.id===activeId)||workable[0];
  const isDark = theme==="dark";
  const cardBg   = "var(--card)";
  const cardBord = "var(--border)";
  const textMute = "var(--text4)";
  const textSub  = "var(--text3)";

  const updateSlot=(wid,sid,up)=>setWeeks(prev=>prev.map(w=>w.id===wid?{...w,slots:w.slots.map(s=>s.id===sid?{...s,...up}:s)}:w));

  const generateAll=async()=>{
    if(!activeWeek||!activeWeek.slots)return;
    const pending=activeWeek.slots.filter(s=>s.status==="pending");
    if(!pending.length)return;
    setGenerating(true);setGenTotal(pending.length);setGenProgress(0);
    for(let i=0;i<pending.length;i+=3){
      const batch=pending.slice(i,i+3);
      try{
        const slotInfo=batch.map(s=>({topic:s.topic||activeWeek.topic||"general",contentType:s.contentType}));
        const scripts=await genScripts(slotInfo,activeWeek.evolvedPrompt);
        batch.forEach((slot,j)=>{if(scripts[j])updateSlot(activeWeek.id,slot.id,{script:scripts[j],status:"script_ready"});});
      }catch(e){console.error(e);}
      setGenProgress(Math.min(i+3,pending.length));
    }
    setGenerating(false);
  };

  const doExport=()=>{
    if(!activeWeek)return;
    const jobs=activeWeek.slots.map(s=>({
      jobId:s.id, weekId:activeWeek.id, niche:activeWeek.niche, topic:s.topic||activeWeek.topic,
      day:DAYS[s.day], time:TIMES[s.time], contentType:s.contentType,
      voiceId:settings.voiceId||"en-US-ChristopherNeural",
      targetDuration:settings.targetDuration||55,
      script:s.script?s.script.script:"",
      hook:s.script?s.script.hook:"",
      title:s.script?s.script.title:"",
      ytCaption:s.script?s.script.ytCaption:"",
      keywords:s.keywords||[],
      footage:(s.footage||[]).map(c=>({id:c.id,url:c.url,duration:c.duration})),
      instagramEnabled:settings.instagramEnabled||false,
    }));
    const blob=new Blob([JSON.stringify(jobs,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="week"+activeWeek.id+"_jobs.json";a.click();
    URL.revokeObjectURL(url);setExported(true);
  };

  const doImport=()=>{
    setImportErr("");setImportOk(false);
    try{
      const m=JSON.parse(manifest);
      if(!Array.isArray(m))throw new Error();
      setWeeks(prev=>prev.map(w=>{
        if(w.id!==activeWeek.id)return w;
        return{...w,slots:w.slots.map(s=>{
          const e=m.find(x=>x.jobId===s.id);
          return e?{...s,youtubeId:e.youtubeId||s.youtubeId,scheduleStatus:e.scheduleStatus||s.scheduleStatus,igScheduled:e.igScheduled||s.igScheduled}:s;
        })};
      }));
      setImportOk(true);setShowImport(false);setManifest("");
    }catch{setImportErr("Invalid JSON — paste the manifest.json from the pipeline");}
  };

  if(!workable.length) return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
      <h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Content Engine</h2>
      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"12px",padding:"18px"}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",letterSpacing:"0.1em",marginBottom:"12px"}}>NO WEEKS LOCKED YET</div>
        <p style={{fontSize:"13px",color:"var(--text3)",lineHeight:1.75,marginBottom:"14px"}}>Go to <strong style={{color:"#ADFF2F"}}>Planner</strong> to lock a week first.</p>
        <button onClick={()=>onNavigate("planner")} style={{background:"#0D1A0D",color:"#ADFF2F",border:"1px solid #ADFF2F44",fontFamily:"Syne",fontWeight:700,fontSize:"12px",padding:"7px 14px",borderRadius:"8px",cursor:"pointer"}}>Go to Planner</button>
      </div>
    </div>
  );

  const slots       = activeWeek?activeWeek.slots:[];
  const pendingCt   = slots.filter(s=>s.status==="pending").length;
  const scriptCt    = slots.filter(s=>s.status==="script_ready"&&s.script).length;
  const scheduledCt = slots.filter(s=>s.scheduleStatus==="youtube_done").length;
  const SC  = {pending:"#2a2a3a",script_ready:"#FF6B35",keywords_extracted:"#00CFFF",footage_found:"#B06EF3",scheduled:"#ADFF2F"};
  const SLM = {pending:"PENDING",script_ready:"SCRIPT ✓",scheduled:"ON YT ✓"};

  const stepCard = (active, done) => ({
    background: done?"#0A1A0A":active?"var(--card)":"var(--card2)",
    border: "1px solid "+(done?"#ADFF2F33":active?"#ADFF2F":"var(--border)"),
    borderRadius:"12px", padding:"18px", transition:"all .3s",
  });

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
      <div>
        <h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Content Engine</h2>
        <p style={{color:"var(--text3)",fontSize:"13px",marginTop:"3px"}}>Scripts → Export → Pipeline → YouTube via Buffer</p>
      </div>

      {workable.length>1&&<div style={{display:"flex",gap:"4px",background:"var(--bg4)",border:"1px solid var(--border)",padding:"4px",borderRadius:"10px",alignSelf:"flex-start"}}>{workable.map(w=><button key={w.id} onClick={()=>{setActiveId(w.id);setExpanded(null);setExported(false);setImportOk(false);}} style={{background:activeId===w.id?"#ADFF2F":"transparent",color:activeId===w.id?"#08080E":textSub,border:"none",padding:"6px 12px",borderRadius:"7px",fontFamily:"Syne",fontWeight:700,fontSize:"12px",cursor:"pointer"}}>Week {w.id}</button>)}</div>}

      {activeWeek&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"10px",padding:"10px 14px",display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#FF6B35",background:"#FF6B3518",border:"1px solid #FF6B3544",padding:"3px 9px",borderRadius:"20px"}}>Week {activeWeek.id}</span>
        <span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#B06EF3",background:"#B06EF318",border:"1px solid #B06EF344",padding:"3px 9px",borderRadius:"20px"}}>{activeWeek.niche}</span>
        {(activeWeek.topics||[]).map((t,i)=><span key={i} style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",background:"#55551a",border:"1px solid #55554a",padding:"3px 9px",borderRadius:"20px"}}>T{i+1}: {t.slice(0,22)}</span>)}
      </div>}

      {/* Progress overview */}
      <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:"90px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"12px 14px"}}><div style={{fontFamily:"Space Mono",fontSize:"20px",fontWeight:700,color:"#FF6B35",lineHeight:1}}>{scriptCt}/21</div><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,marginTop:"5px"}}>Scripts</div></div>
        <div style={{flex:1,minWidth:"90px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"12px 14px"}}><div style={{fontFamily:"Space Mono",fontSize:"20px",fontWeight:700,color:exported?"#ADFF2F":"#555",lineHeight:1}}>{exported?"✓":"—"}</div><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,marginTop:"5px"}}>Exported</div></div>
        <div style={{flex:1,minWidth:"90px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"12px 14px"}}><div style={{fontFamily:"Space Mono",fontSize:"20px",fontWeight:700,color:"#ADFF2F",lineHeight:1}}>{scheduledCt}/21</div><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,marginTop:"5px"}}>On YouTube</div></div>
        <div style={{flex:1,minWidth:"90px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"12px 14px"}}><div style={{fontFamily:"Space Mono",fontSize:"20px",fontWeight:700,color:pendingCt>0?"#FF2D6B":"#ADFF2F",lineHeight:1}}>{pendingCt}</div><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:600,marginTop:"5px"}}>Pending</div></div>
      </div>

      {/* STEP 1 — Scripts */}
      <div style={stepCard(pendingCt>0, scriptCt===21)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"Space Mono",fontSize:"10px",color:scriptCt===21?"#ADFF2F":textMute,letterSpacing:"0.1em",marginBottom:"6px"}}>STEP 1 — GENERATE SCRIPTS</div>
            {scriptCt>0&&<div style={{background:"var(--bg4)",borderRadius:"4px",height:"4px",width:"200px"}}><div style={{width:(scriptCt/21*100)+"%",height:"100%",background:"#FF6B35",borderRadius:"4px",transition:"width .5s"}}/></div>}
          </div>
          {generating
            ?<div style={{display:"flex",alignItems:"center",gap:"8px",background:"var(--bg4)",border:"1px solid var(--border)",borderRadius:"8px",padding:"8px 12px"}}><span style={{display:"inline-block",width:12,height:12,border:"2px solid #ADFF2F",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite"}}/><span style={{fontFamily:"Space Mono",fontSize:"11px",color:"#ADFF2F"}}>{genProgress}/{genTotal}</span></div>
            :<button onClick={generateAll} disabled={!pendingCt} style={{background:!pendingCt?p.disabled?"#1c1c28":"#ADFF2F",color:!pendingCt?"#444":"#08080E",border:"none",fontFamily:"Syne",fontWeight:700,fontSize:"12px",padding:"7px 14px",borderRadius:"8px",cursor:!pendingCt?"not-allowed":"pointer"}}>{pendingCt?"Generate "+pendingCt+" Scripts":"All Scripts Done ✓"}</button>
          }
        </div>
      </div>

      {/* STEP 2 — Export Jobs */}
      <div style={stepCard(scriptCt===21&&!exported, exported)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"Space Mono",fontSize:"10px",color:exported?"#ADFF2F":textMute,letterSpacing:"0.1em",marginBottom:"4px"}}>STEP 2 — EXPORT JOBS FILE</div>
            <p style={{fontSize:"12px",color:"var(--text3)"}}>Downloads week{activeWeek?.id}_jobs.json — give this to the pipeline</p>
          </div>
          <button onClick={doExport} disabled={!scriptCt} style={{background:!scriptCt?"#1c1c28":exported?"#0D1A0D":"#ADFF2F",color:!scriptCt?"#444":exported?"#ADFF2F":"#08080E",border:exported?"1px solid #ADFF2F44":"none",fontFamily:"Syne",fontWeight:700,fontSize:"12px",padding:"7px 14px",borderRadius:"8px",cursor:!scriptCt?"not-allowed":"pointer"}}>{exported?"✓ Exported":"↓ Export Jobs"}</button>
        </div>

// ── App Root ───────────────────────────────────────────────────
const TABS=[{id:"command",label:"Overview"},{id:"planner",label:"Planner"},{id:"engine",label:"Engine"},{id:"analytics",label:"Analytics"},{id:"setup",label:"Setup"}];

function App() {
  const [tab,setTab]=useState("command");
  const [weeks,setWeeksRaw]=useState(()=>{try{const s=localStorage.getItem("r00m_weeks");return s?JSON.parse(s):INIT_WEEKS;}catch{return INIT_WEEKS;}});
  const [settings,setSettingsRaw]=useState(()=>{try{const s=localStorage.getItem("r00m_settings");return s?JSON.parse(s):INIT_SETTINGS;}catch{return INIT_SETTINGS;}});
  const [lastInsight,setLastInsightRaw]=useState(()=>{try{const s=localStorage.getItem("r00m_insight");return s?JSON.parse(s):null;}catch{return null;}});
  const [syncStatus,setSyncStatus]=useState("");
  const [sbReady,setSbReady]=useState(false);
  const [theme,setTheme]=useState(()=>{
    try{return localStorage.getItem("r00m_theme")||"light";}catch{return "light";}
  });

  // Apply theme to body
  useEffect(()=>{
    document.body.className=theme;
    try{localStorage.setItem("r00m_theme",theme);}catch{}
  },[theme]);

  useEffect(()=>{
    const {supabaseUrl,supabaseKey,channelKey}=settings;
    if(supabaseUrl&&supabaseKey&&channelKey){
      setSyncStatus("syncing");
      sbLoad(supabaseUrl,supabaseKey,channelKey).then(data=>{
        if(data){
          if(data.weeks) setWeeksRaw(prev=>{
            // Don't overwrite videoBlob (not serializable) — keep local blobs
            return data.weeks.map((w,i)=>({...w,slots:(w.slots||[]).map(s=>({...s,videoBlob:null,videoUrl:null}))}));
          });
          if(data.insight) setLastInsightRaw(data.insight);
          if(data.settings) setSettingsRaw(prev=>({...data.settings,supabaseUrl:prev.supabaseUrl,supabaseKey:prev.supabaseKey,channelKey:prev.channelKey}));
          setSyncStatus("synced");
        } else { setSyncStatus("new"); }
        setSbReady(true);
      });
    } else { setSbReady(true); }
  },[]);

  useEffect(()=>{try{localStorage.setItem("r00m_weeks",JSON.stringify(weeks));}catch{}},[weeks]);
  useEffect(()=>{try{localStorage.setItem("r00m_settings",JSON.stringify(settings));}catch{}},[settings]);
  useEffect(()=>{if(lastInsight)try{localStorage.setItem("r00m_insight",JSON.stringify(lastInsight));}catch{}},[lastInsight]);

  useEffect(()=>{
    if(!sbReady)return;
    const {supabaseUrl,supabaseKey,channelKey}=settings;
    if(supabaseUrl&&supabaseKey&&channelKey){
      // Save weeks without videoBlob (not serializable)
      const weeksForSave = weeks.map(w=>({...w,slots:(w.slots||[]).map(s=>({...s,videoBlob:null,videoUrl:null}))}));
      sbSave(supabaseUrl,supabaseKey,channelKey,{weeks:weeksForSave,insight:lastInsight,settings});
      setSyncStatus("saved");
    }
  },[weeks,lastInsight,settings,sbReady]);

  const setWeeks=v=>setWeeksRaw(v);
  const setSettings=v=>setSettingsRaw(v);
  const setLastInsight=v=>setLastInsightRaw(v);

  const handleReset=()=>{if(!window.confirm("Reset everything? This clears all weeks and starts fresh."))return;setWeeksRaw(INIT_WEEKS);setLastInsightRaw(null);try{localStorage.removeItem("r00m_weeks");localStorage.removeItem("r00m_insight");}catch{}};

  const draftWeek=weeks.find(w=>w.status==="draft"&&w.slots&&w.slots.length>0);
  const pendingBadge=draftWeek?draftWeek.slots.filter(s=>s.status==="pending").length:0;

  const isDark = theme==="dark";
  const bg     = "var(--bg)";
  const fg     = "var(--text)";

  const VIEW={
    command:   <CommandCenter  weeks={weeks} onNavigate={setTab} theme={theme}/>,
    planner:   <WeeklyPlanner  weeks={weeks} setWeeks={setWeeks} lastInsight={lastInsight} theme={theme}/>,
    engine:    <ContentEngine  weeks={weeks} setWeeks={setWeeks} settings={settings} onNavigate={setTab} theme={theme}/>,
    analytics: <AnalyticsBrain weeks={weeks} setWeeks={setWeeks} lastInsight={lastInsight} setLastInsight={setLastInsight} theme={theme}/>,
    setup:     <Setup          settings={settings} setSettings={setSettings} onReset={handleReset} syncStatus={syncStatus} theme={theme}/>,
  };

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <div style={{position:"sticky",top:0,zIndex:200,background:"var(--topbar)",backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",borderBottom:"1px solid var(--border)",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
          <div style={{fontWeight:800,fontSize:"16px",letterSpacing:"-0.02em",color:"var(--text)"}}>Rand00mscroll</div>
          <div style={{fontFamily:"Space Mono",fontSize:"8px",color:"var(--text4)",background:"var(--bg4)",border:"1px solid var(--border)",padding:"2px 6px",borderRadius:"4px"}}>v2</div>
        </div>
        <div style={{flex:1,display:"flex",justifyContent:"center"}}>
          <div style={{position:"relative",width:"100%",maxWidth:"200px"}}>
            <select value={tab} onChange={e=>setTab(e.target.value)} style={{width:"100%",background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"8px 32px 8px 14px",color:"var(--text)",fontFamily:"Syne",fontWeight:700,fontSize:"13px",cursor:"pointer",appearance:"none",WebkitAppearance:"none"}}>
              {TABS.map(t=><option key={t.id} value={t.id}>{t.label}{t.id==="engine"&&pendingBadge>0?" ("+pendingBadge+")":""}</option>)}
            </select>
            <div style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",pointerEvents:"none",color:"#ADFF2F",fontSize:"11px"}}>▾</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
          <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")}
            style={{background:"var(--bg4)",border:"none",borderRadius:"20px",padding:"4px 10px",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",gap:"4px",transition:"all .2s"}}>
            <span>{isDark?"☀️":"🌙"}</span>
          </button>
          <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite"}}/>
            <span style={{fontFamily:"Space Mono",fontSize:"9px",color:syncStatus==="synced"||syncStatus==="saved"?"#ADFF2F":syncStatus==="syncing"?"#FF6B35":"#ADFF2F"}}>
              {syncStatus==="syncing"?"SYNC":syncStatus==="synced"?"SYNCED":syncStatus==="saved"?"SAVED":"LIVE"}
            </span>
          </div>
        </div>
      </div>
      <div style={{maxWidth:"860px",margin:"0 auto",padding:"24px 16px 80px",color:"var(--text)"}}>{VIEW[tab]}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
