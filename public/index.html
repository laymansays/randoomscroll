    {/* Stage 3: Visuals */}
    <div className={`fb-stage ${openStage===3?"active":""}`}>
      <FbHdr n={3} label={dalleReady?"Get Visuals (GPT Image AI)":"Get Visuals (Pexels)"} done={visuals.length>0}/>
      {openStage===3&&<div className="fb-stage-body">
        <Banner st={visualStatus} msgs={[dalleReady?"Generating AI images via GPT Image… (~5s per scene)":"Fetching Pexels clips…",visuals.length+" visual assets ready","Visual fetch failed — check API key in Setup ⚙️"]}/>
        {visuals.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:8,marginBottom:14}}>
          {visuals.map((v,i)=><div key={i} style={{border:"1px solid var(--border)",borderRadius:8,overflow:"hidden",aspectRatio:"9/16",background:"var(--bg3)",position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {v.thumbnail_url?<img src={v.thumbnail_url} alt={v.keyword} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:"1.2rem"}}>🎬</span>}
            <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.6)",padding:"3px 5px",textAlign:"center"}}>
              {v.source==="dalle3"
                ? <span style={{display:"inline-block",padding:"1px 6px",borderRadius:3,background:"#10a37f",color:"#fff",fontSize:"9px"}}>AI</span>
                : <span className="px-badge">PX</span>}
            </div>
          </div>)}
        </div>}
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn variant="ghost" small disabled={visualStatus==="loading"} onClick={doVisuals}>↺ Refetch</Btn>
          <Btn disabled={!visuals.length||visualStatus==="loading"} onClick={()=>{doAssemble();setOpenStage(4);}}>Assemble Video →</Btn>
        </div>
      </div>}
    </div>

    {/* Stage 4: Video */}
    <div className={`fb-stage ${openStage===4?"active":""}`}>
      <FbHdr n={4} label={batchMode?"Generate Videos + Preview":"Generate Video + Preview"} done={batchMode?batchSlots.some(s=>s.has_video):!!(slot&&slot.has_video)}/>
      {openStage===4&&<div className="fb-stage-body">

        {/* BATCH MODE */}
        {batchMode&&<>
          {batchStatus==="generating"&&<div className="fb-banner info">
            <Spinner size={12}/>
            Generating videos… this takes ~{Math.round(batchAngles.length*0.5)} minutes. Leave this running.
          </div>}
          {batchStatus==="done"&&<div className="fb-banner ok">
            ✓ {batchSlots.filter(s=>s.has_video).length}/{batchSlots.length} videos ready · {batchSlots.filter(s=>s.scheduled).length} scheduled on alternate days
          </div>}
          {batchStatus==="err"&&<div className="fb-banner err">Batch generation failed — check server terminal</div>}

          {/* Progress during generation */}
          {batchStatus==="generating"&&batchAngles.length>0&&<div style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",marginBottom:6}}>
              <span>Progress</span>
              <span>{batchProgress}/{batchAngles.length}</span>
            </div>
            <div style={{height:6,background:"var(--bg3)",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",background:"#ADFF2F",borderRadius:3,width:`${(batchProgress/batchAngles.length)*100}%`,transition:"width .3s"}}/>
            </div>
          </div>}

          {/* Completed slots grid */}
          {batchSlots.length>0&&<>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8,marginBottom:14}}>
              {batchSlots.map((s,i)=><div key={i} onClick={()=>s.has_video&&setBatchModal(i)}
                style={{border:"1px solid "+(s.has_video?"rgba(173,255,47,0.3)":"var(--border)"),borderRadius:8,overflow:"hidden",background:"var(--card2)",cursor:s.has_video?"pointer":"default",opacity:s.has_video?1:0.5}}>
                <div style={{aspectRatio:"9/16",background:"var(--bg3)",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                  {s.thumbnail_path
                    ? <img src={SERVER+"/file/football_"+s.id+"_thumb.jpg"} alt="thumb" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    : <span style={{fontSize:"1.2rem"}}>{s.has_video?"▶":"⏳"}</span>
                  }
                  {s.scheduled&&<div style={{position:"absolute",top:4,right:4,background:"#ADFF2F",borderRadius:3,padding:"1px 5px",fontFamily:"Space Mono",fontSize:"8px",color:"#08080E",fontWeight:700}}>SCHED</div>}
                </div>
                <div style={{padding:"6px 7px"}}>
                  <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text)",lineHeight:1.3,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{s.title}</div>
                  {s.publish_at&&<div style={{fontFamily:"Space Mono",fontSize:"8px",color:"#ADFF2F",marginTop:3}}>
                    {new Date(s.publish_at).toLocaleDateString("en-IN",{day:"numeric",month:"short"})}
                  </div>}
                </div>
              </div>)}
            </div>

            {/* Add more button */}
            {batchStatus==="done"&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Btn variant="ghost" small onClick={()=>doAddMore(5)}>+ Add 5 More Videos</Btn>
              <Btn variant="ghost" small onClick={()=>doAddMore(10)}>+ Add 10 More Videos</Btn>
            </div>}
          </>}
        </>}

        {/* SINGLE MODE */}
        {!batchMode&&<>
          <Banner st={videoStatus} msgs={["Assembling video with FFmpeg + Edge TTS (~30s)…","Video ready — click to preview","Assembly failed — is server.py running on port 8080?"]}/>
          {slot&&slot.has_video&&<div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:14}}>
            <div onClick={()=>setModal(true)} style={{width:90,aspectRatio:"9/16",background:"var(--bg3)",borderRadius:8,overflow:"hidden",cursor:"pointer",border:"1px solid rgba(173,255,47,0.3)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {slot.thumbnail_path?<img src={SERVER+"/file/football_"+slot.id+"_thumb.jpg"} alt="thumb" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:"1.5rem"}}>▶</span>}
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:"13px",marginBottom:6}}>{slot.topic||activeTopic}</div>
              <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:4}}>Hook: "{slot.hook}"</div>
              <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)"}}>Click thumbnail to preview</div>
            </div>
          </div>}
          {slot&&slot.has_video&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Btn variant="ghost" small onClick={doAssemble}>↺ Regenerate</Btn>
            <Btn onClick={()=>setOpenStage(5)}>Schedule →</Btn>
          </div>}
        </>}
      </div>}
    </div>

    {/* Stage 5: Schedule */}
    <div className={`fb-stage ${openStage===5?"active":""}`}>
      <FbHdr n={5} label="Schedule to YouTube" done={!!(slot&&slot.scheduled)}/>
      {openStage===5&&<div className="fb-stage-body">
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",marginBottom:12,lineHeight:1.8}}>
          Auto-slots to next available time · {settings.footballVideosPerDay||2} videos/day max<br/>
          Upload handled by upload_runner.py at 9 AM daily
        </div>
        {slot&&<div style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:10,padding:12,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1,fontWeight:700,fontSize:"13px"}}>{slot.topic||activeTopic}</div>
            <div style={{fontFamily:"Space Mono",fontSize:"10px",color:slot.scheduled?"#ADFF2F":"#FF6B35"}}>
              {slot.scheduled?"✓ SCHEDULED":"PENDING"}
            </div>
          </div>
          {slot.publish_at&&<div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",marginTop:4}}>
            Publishes: {new Date(slot.publish_at).toLocaleString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}
          </div>}
        </div>}
        {slot&&slot.has_video&&!slot.scheduled&&<Btn onClick={doSchedule}>Schedule This Video →</Btn>}
        {slot&&slot.scheduled&&<div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite"}}/>
          <span style={{fontFamily:"Space Mono",fontSize:"11px",color:"#ADFF2F"}}>Added to upload queue</span>
        </div>}
      </div>}
    </div>

    {/* Stage 6: Match Monitor */}
    <div className={`fb-stage ${openStage===6?"active":""}`}>
      <FbHdr n={6} label="⚡ Match Monitor" done={false}/>
      {openStage===6&&<div className="fb-stage-body">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text3)"}}>
            <span className="live-dot"/>World Cup 2026 · Auto-polls every 30 min
          </div>
          <Btn small variant="ghost" onClick={doMatches} disabled={matchStatus==="loading"}>
            {matchStatus==="loading"?<><Spinner size={12}/>Fetching…</>:"↺ Live Refresh"}
          </Btn>
        </div>

        {matchStatus==="err"&&<div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)",marginBottom:12}}>
          Could not fetch matches.{!settings.footballDataKey&&<span style={{color:"#FF2D6B"}}> Add Football-Data.org API key in ⚙️ Setup → Football Engine.</span>}
        </div>}

        {/* Content opportunities from upsets */}
        {upsets.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#FF2D6B",letterSpacing:".08em",marginBottom:8}}>⚡ CONTENT OPPORTUNITIES</div>
          {upsets.map((u,i)=><div key={i} className="match-card upset">
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:"13px",marginBottom:3}}>{u.team1} vs {u.team2}</div>
              {u.goals&&u.goals.length>0&&<div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",lineHeight:1.8}}>
                {u.goals.map((g,gi)=><span key={gi} style={{marginRight:8}}>
                  {g.own_goal?"(OG) ":""}{g.scorer} {g.minute}'
                  {g.assist&&<span style={{color:"var(--text4)"}}> ▸ {g.assist}</span>}
                </span>)}
              </div>}
            </div>
            <div style={{fontFamily:"Space Mono",fontSize:"16px",fontWeight:700,color:"#FF2D6B",margin:"0 8px"}}>{u.score}</div>
            <button onClick={()=>triggerFromUpset(u)} style={{padding:"5px 10px",borderRadius:6,background:"#FF2D6B",color:"#fff",border:"none",fontFamily:"Space Mono",fontSize:"10px",cursor:"pointer",flexShrink:0}}>Generate →</button>
          </div>)}
        </div>}

        {/* All today's matches */}
        {matches.length>0&&<div>
          <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",letterSpacing:".08em",marginBottom:8}}>
            TODAY'S MATCHES
          </div>
          {matches.map((m,i)=><div key={i} style={{
            border:"1px solid "+(m.is_upset?"#FF2D6B":m.status==="LIVE"?"#ADFF2F":"var(--border)"),
            borderRadius:10,padding:"12px 14px",marginBottom:8,
            background:m.is_upset?"rgba(255,45,107,0.04)":m.status==="LIVE"?"rgba(173,255,47,0.03)":"var(--card2)",
          }}>
            {/* Score tally header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:"14px",marginBottom:2}}>{m.team1}</div>
              </div>
              <div style={{textAlign:"center",minWidth:80}}>
                <div style={{fontFamily:"Space Mono",fontSize:"22px",fontWeight:700,
                  color:m.status==="LIVE"?"#ADFF2F":"var(--text)",lineHeight:1}}>
                  {m.score||"0 – 0"}
                </div>
                <Tag color={m.status==="LIVE"?"#ADFF2F":m.status==="FT"?"var(--text4)":"#00CFFF"} style={{marginTop:4}}>
                  {m.status==="LIVE"&&m.minute?`${m.minute}'`:m.status}
                </Tag>
              </div>
              <div style={{flex:1,textAlign:"right"}}>
                <div style={{fontWeight:700,fontSize:"14px",marginBottom:2}}>{m.team2}</div>
              </div>
            </div>

            {/* Round */}
            <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",textAlign:"center",marginBottom:m.goals&&m.goals.length>0?8:0}}>
              {m.round}
            </div>

            {/* Goal scorers with spotlight button */}
            {m.goals&&m.goals.length>0&&<div style={{borderTop:"1px solid var(--border)",paddingTop:8}}>
              <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",letterSpacing:".06em",marginBottom:6}}>GOALS</div>
              {m.goals.map((g,gi)=>{
                const sk = g.scorer+"_"+m.match_id;
                const pss = playerSpotlightStatus[sk]||"idle";
                return <div key={gi} style={{
                  display:"flex",alignItems:"center",gap:8,marginBottom:6,
                  padding:"6px 8px",background:"var(--bg3)",borderRadius:6,
                }}>
                  <span style={{color:g.own_goal?"#FF2D6B":"#ADFF2F",fontSize:"12px"}}>⚽</span>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text)",fontWeight:700}}>
                      {g.scorer}
                      {g.own_goal&&<span style={{color:"#FF2D6B",fontSize:"9px",marginLeft:4}}>(OG)</span>}
                    </div>
                    <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)"}}>
                      {g.minute}' {g.assist&&`▸ assist: ${g.assist}`}
                    </div>
                  </div>
                  {/* Player spotlight button */}
                  {pss==="idle"&&<button onClick={()=>doPlayerSpotlight(g,m)} style={{
                    padding:"4px 9px",borderRadius:5,background:"#a855f7",color:"#fff",
                    border:"none",fontFamily:"Space Mono",fontSize:"8px",cursor:"pointer",
                    whiteSpace:"nowrap",flexShrink:0,
                  }}>🎯 Spotlight</button>}
                  {pss!=="idle"&&pss!=="done"&&pss!=="err"&&<div style={{
                    fontFamily:"Space Mono",fontSize:"8px",color:"#a855f7",
                    display:"flex",alignItems:"center",gap:4,flexShrink:0,
                  }}><Spinner size={10}/>{pss==="uploading"?"Posting…":"Generating…"}</div>}
                  {pss==="done"&&<span style={{fontFamily:"Space Mono",fontSize:"8px",color:"#ADFF2F",flexShrink:0}}>✓ Posted!</span>}
                  {pss==="err"&&<button onClick={()=>doPlayerSpotlight(g,m)} style={{
                    padding:"4px 8px",borderRadius:5,background:"transparent",color:"#FF2D6B",
                    border:"1px solid #FF2D6B",fontFamily:"Space Mono",fontSize:"8px",cursor:"pointer",flexShrink:0,
                  }}>↺</button>}
                </div>;
              })}
            </div>}

            {/* MOTM note */}
            {m.status==="FT"&&<div style={{fontFamily:"Space Mono",fontSize:"8px",color:"var(--text4)",marginTop:6,fontStyle:"italic"}}>
              Man of the Match: not available on free API tier
            </div>}

            {/* Action buttons */}
            <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
              {m.status==="FT"&&<>
                <button onClick={()=>triggerFromUpset(m)}
                  style={{flex:1,padding:"6px",borderRadius:6,background:"var(--bg3)",color:"var(--text4)",border:"1px solid var(--border)",fontFamily:"Space Mono",fontSize:"9px",cursor:"pointer"}}>
                  ✏️ Schedule
                </button>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  {[1,2,3].map(n=>{
                    const mid2=m.match_id||m.team1+m.team2;
                    return <button key={n} onClick={()=>setReactiveCount(s=>({...s,[mid2]:n}))} style={{
                      width:22,height:22,borderRadius:4,border:"1px solid",
                      borderColor:(reactiveCount[mid2]||1)===n?"#FF2D6B":"var(--border)",
                      background:(reactiveCount[mid2]||1)===n?"#FF2D6B":"transparent",
                      color:(reactiveCount[mid2]||1)===n?"#fff":"var(--text4)",
                      fontFamily:"Space Mono",fontSize:"9px",fontWeight:700,cursor:"pointer",
                    }}>{n}</button>;
                  })}
                </div>
                <button onClick={()=>doReactiveImmediate(m,reactiveCount[m.match_id||m.team1+m.team2]||1)}
                  style={{flex:1,padding:"6px",borderRadius:6,background:"#FF2D6B",color:"#fff",border:"none",fontFamily:"Space Mono",fontSize:"9px",cursor:"pointer",fontWeight:700}}>
                  ⚡ Post {reactiveCount[m.match_id||m.team1+m.team2]||1} NOW
                </button>
              </>}
              {m.status==="LIVE"&&<>
                <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                  {[1,2,3].map(n=>{
                    const mid2=m.match_id||m.team1+m.team2;
                    return <button key={n} onClick={()=>setReactiveCount(s=>({...s,[mid2]:n}))} style={{
                      width:22,height:22,borderRadius:4,border:"1px solid",
                      borderColor:(reactiveCount[mid2]||1)===n?"#FF2D6B":"var(--border)",
                      background:(reactiveCount[mid2]||1)===n?"#FF2D6B":"transparent",
                      color:(reactiveCount[mid2]||1)===n?"#fff":"var(--text4)",
                      fontFamily:"Space Mono",fontSize:"9px",fontWeight:700,cursor:"pointer",
                    }}>{n}</button>;
                  })}
                </div>
                <button onClick={()=>doReactiveImmediate(m,reactiveCount[m.match_id||m.team1+m.team2]||1)}
                  style={{flex:1,padding:"8px",borderRadius:6,background:"#FF2D6B",color:"#fff",border:"none",
                    fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontSize:"12px",fontWeight:700,cursor:"pointer"}}>
                  ⚡ Generate + Post {reactiveCount[m.match_id||m.team1+m.team2]||1} Live Update{(reactiveCount[m.match_id||m.team1+m.team2]||1)>1?"s":""}
                </button>
              </>}
            </div>

            {/* Reactive status */}
            {reactiveStatus[m.match_id||m.team1+m.team2]&&reactiveStatus[m.match_id||m.team1+m.team2]!=="idle"&&<div style={{
              marginTop:6,fontFamily:"Space Mono",fontSize:"9px",
              color:reactiveStatus[m.match_id||m.team1+m.team2]==="done"?"#ADFF2F":"#00CFFF",
            }}>
              {(()=>{
                const mid3=m.match_id||m.team1+m.team2;
                const rs3=reactiveStatus[mid3];
                const prog=reactiveProgress[mid3];
                if(rs3==="done") return <span>✓ {prog?.total||1} video{(prog?.total||1)>1?"s":""} posted to YouTube!</span>;
                if(rs3==="err")  return <span style={{color:"#FF2D6B"}}>Failed — {prog?.step||"check server"}</span>;
                return <span style={{display:"flex",alignItems:"center",gap:6}}>
                  <Spinner size={9}/>
                  Video {prog?.current||1}/{prog?.total||1} — {prog?.step||"Processing…"}
                </span>;
              })()}
            </div>}
          </div>)}
        </div>}

        {matches.length===0&&matchStatus!=="loading"&&matchStatus!=="err"&&<div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)",padding:"10px 0"}}>
          Click "↺ Live Refresh" to load today's World Cup matches and scores.
        </div>}
      </div>}
    </div>

    {/* Single video preview modal */}
    {modal&&slot&&slot.has_video&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setModal(false)}>
      <div style={{background:"var(--card)",borderRadius:16,width:"100%",maxWidth:360,padding:20,position:"relative"}} onClick={e=>e.stopPropagation()}>
        <button onClick={()=>setModal(false)} style={{position:"absolute",top:14,right:14,background:"none",border:"none",fontSize:"1.2rem",cursor:"pointer",color:"var(--text4)"}}>✕</button>
        <div style={{fontWeight:700,fontSize:"14px",marginBottom:12,paddingRight:24}}>{slot.topic||activeTopic}</div>
        <video controls style={{width:"100%",aspectRatio:"9/16",borderRadius:10,background:"#000",marginBottom:12}}
          src={SERVER+"/file/football_"+slot.id+".mp4"}/>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:12}}>"{slot.hook}"</div>
        <div style={{display:"flex",gap:8}}>
          <Btn small variant="ghost" onClick={()=>{setModal(false);doAssemble();}}>↺ Regenerate</Btn>
          <Btn small onClick={()=>{setModal(false);setOpenStage(5);}}>Schedule →</Btn>
        </div>
      </div>
    </div>}

    {/* Batch video preview modal */}
    {batchModal!==null&&batchSlots[batchModal]&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setBatchModal(null)}>
      <div style={{background:"var(--card)",borderRadius:16,width:"100%",maxWidth:400,padding:20,position:"relative"}} onClick={e=>e.stopPropagation()}>
        <button onClick={()=>setBatchModal(null)} style={{position:"absolute",top:14,right:14,background:"none",border:"none",fontSize:"1.2rem",cursor:"pointer",color:"var(--text4)"}}>✕</button>
        {/* Nav between batch videos */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,paddingRight:24}}>
          <button onClick={()=>setBatchModal(i=>Math.max(0,i-1))} disabled={batchModal===0}
            style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"4px 8px",cursor:"pointer",color:"var(--text4)",fontSize:"12px"}}>←</button>
          <div style={{flex:1,fontWeight:700,fontSize:"12px",textAlign:"center"}}>{batchSlots[batchModal].title}</div>
          <button onClick={()=>setBatchModal(i=>Math.min(batchSlots.length-1,i+1))} disabled={batchModal===batchSlots.length-1}
            style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"4px 8px",cursor:"pointer",color:"var(--text4)",fontSize:"12px"}}>→</button>
        </div>
        <video controls style={{width:"100%",aspectRatio:"9/16",borderRadius:10,background:"#000",marginBottom:10}}
          src={SERVER+"/file/football_"+batchSlots[batchModal].id+".mp4"}/>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:6}}>"{batchSlots[batchModal].hook}"</div>
        {batchSlots[batchModal].publish_at&&<div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)"}}>
          Scheduled: {new Date(batchSlots[batchModal].publish_at).toLocaleString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}
        </div>}
        <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",marginTop:4}}>
          Video {batchModal+1} of {batchSlots.length}
        </div>
      </div>
    </div>}

  </div>;
}

// ── Queue Tab ─────────────────────────────────────────────────
function QueueTab(){
  const [queue,setQueue]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState("all"); // all|pending|scheduled|posted
  const [saving,setSaving]=useState({}); // {id: bool}
  const [saved,setSaved]=useState({});   // {id: bool}
  const [edits,setEdits]=useState({});   // {id: {date,time}}
  const [preview,setPreview]=useState(null);

  async function load(){
    setLoading(true);
    try{
      const r=await fetch(SERVER+"/queue");
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      setQueue(d.queue||[]);
    }catch(e){console.error("Queue load failed",e);}
    setLoading(false);
  }

  React.useEffect(()=>{load();},[]);

  function getEdit(v){
    return edits[v.id]||{date:v.publish_date||"",time:v.publish_time||""};
  }

  function setEdit(id, field, val){
    setEdits(e=>({...e,[id]:{...( e[id]||{}), [field]:val}}));
    setSaved(s=>({...s,[id]:false}));
  }

  async function reschedule(v){
    const ed = getEdit(v);
    if(!ed.date||!ed.time) return;
    setSaving(s=>({...s,[v.id]:true}));
    try{
      const r=await fetch(SERVER+"/football/reschedule",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id:v.id, date:ed.date, time:ed.time})
      });
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      // Update queue locally
      setQueue(q=>q.map(item=>item.id===v.id
        ?{...item, publish_at:d.publish_at,
          publish_date:ed.date, publish_time:ed.time,
          publish_ist: new Date(d.publish_at).toLocaleString("en-IN",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}),
          status: item.youtube_id ? "scheduled" : "pending"
        }:item
      ));
      setSaved(s=>({...s,[v.id]:true}));
      setTimeout(()=>setSaved(s=>({...s,[v.id]:false})),3000);
    }catch(e){console.error("Reschedule failed",e);}
    setSaving(s=>({...s,[v.id]:false}));
  }

  const STATUS_COLOR={posted:"#ADFF2F",scheduled:"#00CFFF",pending:"#FF6B35"};
  const STATUS_BG   ={posted:"rgba(173,255,47,0.08)",scheduled:"rgba(0,207,255,0.08)",pending:"rgba(255,107,53,0.08)"};

  const filtered = queue.filter(v=>filter==="all"||v.status===filter);
  const counts   = {
    all:queue.length,
    pending:queue.filter(v=>v.status==="pending").length,
    scheduled:queue.filter(v=>v.status==="scheduled").length,
    posted:queue.filter(v=>v.status==="posted").length,
  };

  return <div className="fade-up" style={{paddingBottom:60}}>

    {/* Header */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
      <div>
        <div style={{fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontSize:"20px",fontWeight:700,letterSpacing:".06em",marginBottom:4}}>
          Schedule Queue
        </div>
        <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)"}}>
          Set exact date and time for each video · IST timezone
        </div>
      </div>
      <button onClick={load} style={{padding:"8px 14px",borderRadius:8,border:"1px solid var(--border)",background:"transparent",color:"var(--text4)",fontFamily:"Space Mono",fontSize:"11px",cursor:"pointer"}}>
        {loading?"Loading…":"↺ Refresh"}
      </button>
    </div>

    {/* Filter tabs */}
    <div style={{display:"flex",gap:6,marginBottom:20}}>
      {["all","pending","scheduled","posted"].map(f=>(
        <button key={f} onClick={()=>setFilter(f)} style={{
          padding:"6px 14px", borderRadius:20,
          border:"1px solid "+(filter===f?STATUS_COLOR[f]||"#ADFF2F":"var(--border)"),
          background:filter===f?(STATUS_BG[f]||"rgba(173,255,47,0.08)"):"transparent",
          color:filter===f?(STATUS_COLOR[f]||"#ADFF2F"):"var(--text4)",
          fontFamily:"Space Mono", fontSize:"10px", cursor:"pointer",
          textTransform:"uppercase", letterSpacing:".06em",
        }}>
          {f} {counts[f]>0&&<span style={{opacity:.7}}>({counts[f]})</span>}
        </button>
      ))}
    </div>

    {loading&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"20px 0",fontFamily:"Space Mono",fontSize:"12px",color:"var(--text4)"}}>
      <Spinner size={14}/>Loading queue...
    </div>}

    {!loading&&filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",fontFamily:"Space Mono",fontSize:"12px",color:"var(--text4)"}}>
      {queue.length===0
        ? "No videos in queue. Generate some in the ⚽ tab first."
        : `No ${filter} videos.`}
    </div>}

    {/* Queue rows */}
    {!loading&&filtered.map((v,i)=>{
      const ed = getEdit(v);
      const isSaving = saving[v.id];
      const isSaved  = saved[v.id];
      const changed  = edits[v.id] && (edits[v.id].date!==v.publish_date || edits[v.id].time!==v.publish_time);

      return <div key={v.id||i} style={{
        border:"1px solid var(--border)",
        borderRadius:12, padding:16, marginBottom:10,
        background:"var(--card)",
        transition:"border .15s",
      }}>
        <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>

          {/* Thumbnail */}
          <div onClick={()=>setPreview(v)} style={{
            width:72, aspectRatio:"9/16", borderRadius:8,
            background:"var(--bg3)", overflow:"hidden",
            cursor:"pointer", flexShrink:0,
            border:"1px solid var(--border)",
            display:"flex",alignItems:"center",justifyContent:"center",
          }}>
            {v.thumb_url
              ? <img src={v.thumb_url} alt="thumb" style={{width:"100%",height:"100%",objectFit:"cover"}}
                  onError={e=>e.target.style.display="none"}/>
              : <span style={{fontSize:"1.5rem",opacity:.4}}>🎬</span>}
          </div>

          {/* Main content */}
          <div style={{flex:1,minWidth:0}}>

            {/* Title + status */}
            <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8}}>
              <div style={{flex:1,fontWeight:700,fontSize:"13px",lineHeight:1.4,
                overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
                {v.title||"Untitled"}
              </div>
              <span style={{
                padding:"2px 8px",borderRadius:4,flexShrink:0,
                fontFamily:"Space Mono",fontSize:"9px",fontWeight:700,
                textTransform:"uppercase",letterSpacing:".06em",
                background:STATUS_BG[v.status],color:STATUS_COLOR[v.status],
                border:"1px solid "+STATUS_COLOR[v.status],
              }}>{v.status}</span>
            </div>

            {/* Date + Time pickers */}
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <div>
                <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",marginBottom:3,textTransform:"uppercase",letterSpacing:".06em"}}>Date (IST)</div>
                <input
                  type="date"
                  value={ed.date}

                  disabled={v.status==="posted"}
                  onChange={e=>setEdit(v.id,"date",e.target.value)}
                  style={{
                    padding:"7px 10px", borderRadius:7,
                    border:"1px solid "+(changed?"#ADFF2F":"var(--border)"),
                    background:"var(--input-bg)", color:"var(--text)",
                    fontFamily:"Space Mono", fontSize:"11px",
                    cursor:v.status==="posted"?"not-allowed":"pointer",
                  }}
                />
              </div>
              <div>
                <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",marginBottom:3,textTransform:"uppercase",letterSpacing:".06em"}}>Time (IST)</div>
                <input
                  type="time"
                  value={ed.time}
                  disabled={v.status==="posted"}
                  onChange={e=>setEdit(v.id,"time",e.target.value)}
                  style={{
                    padding:"7px 10px", borderRadius:7,
                    border:"1px solid "+(changed?"#ADFF2F":"var(--border)"),
                    background:"var(--input-bg)", color:"var(--text)",
                    fontFamily:"Space Mono", fontSize:"11px",
                    cursor:v.status==="posted"?"not-allowed":"pointer",
                  }}
                />
              </div>

              {/* Save / status button */}
              {v.status!=="posted"&&<div style={{paddingTop:18}}>
                {isSaved
                  ? <span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F"}}>✓ Saved</span>
                  : <button
                      onClick={()=>reschedule(v)}
                      disabled={isSaving||!ed.date||!ed.time}

                        padding:"7px 16px", borderRadius:7, border:"none",

                      }}>
                      {isSaving?<><Spinner size={10}/> Saving…</>:"Save"}

            </div>

            {v.publish_ist&&<div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",marginTop:6}}>

              </a>}

          </div>
        </div>
      </div>;
    })}

    {/* Video preview modal */}
    {preview&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setPreview(null)}>

          src={SERVER+"/file/football_"+preview.id+".mp4"}
          onError={e=>{e.target.style.display="none";}}/>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)"}}>
          {preview.publish_ist||"Not scheduled"}
          {preview.youtube_url&&<a href={preview.youtube_url} target="_blank" rel="noreferrer"
            style={{color:"#ADFF2F",marginLeft:10,textDecoration:"none"}}>Open on YouTube ↗</a>}
        </div>
      </div>
    </div>}

  </div>;
}

// ── Storage Tab ───────────────────────────────────────────────
function StorageTab(){
  const [videos,setVideos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState("all"); // all|posted|scheduled|pending
  const [search,setSearch]=useState("");
  const [sortBy,setSortBy]=useState("date"); // date|status|title
  const [preview,setPreview]=useState(null);

  async function load(){
    setLoading(true);
    try{
      const r=await fetch(SERVER+"/storage");
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      setVideos(d.videos||[]);
    }catch(e){console.error("Storage load failed",e);}
    setLoading(false);
  }

  useState(()=>{load();},[]);
  React.useEffect(()=>{load();},[]);

  const STATUS_COLOR={posted:"#ADFF2F",scheduled:"#00CFFF",pending:"#FF6B35"};
  const STATUS_BG={posted:"rgba(173,255,47,0.1)",scheduled:"rgba(0,207,255,0.1)",pending:"rgba(255,107,53,0.1)"};

  const filtered = videos
    .filter(v=> filter==="all" || v.status===filter)
    .filter(v=> !search || v.title.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      if(sortBy==="date")   return a.publish_at.localeCompare(b.publish_at);
      if(sortBy==="status") return a.status.localeCompare(b.status);
      if(sortBy==="title")  return a.title.localeCompare(b.title);
      return 0;
    });

  const counts={
    all:videos.length,
    posted:videos.filter(v=>v.status==="posted").length,
    scheduled:videos.filter(v=>v.status==="scheduled").length,
    pending:videos.filter(v=>v.status==="pending").length,

  return <div className="fade-up" style={{paddingBottom:60}}>

    {/* Header */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
      <div>
        <div style={{fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontSize:"20px",fontWeight:700,letterSpacing:".06em",marginBottom:4}}>
          Content Storage
        </div>
        <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)"}}>
          All football videos · thumbnails · schedules · status
        </div>
      </div>
      <button onClick={load} style={{padding:"8px 14px",borderRadius:8,border:"1px solid var(--border)",background:"transparent",color:"var(--text4)",fontFamily:"Space Mono",fontSize:"11px",cursor:"pointer"}}>
        {loading?"Loading…":"↺ Refresh"}
      </button>
    </div>

    {/* Stats bar */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
      {[
        {key:"all",   label:"Total",     icon:"📦"},
        {key:"posted",label:"Posted",    icon:"✅"},
        {key:"scheduled",label:"Scheduled",icon:"📅"},
        {key:"pending",label:"Pending",  icon:"⏳"},
      ].map(({key,label,icon})=>(
        <div key={key} onClick={()=>setFilter(key)} style={{
          background:filter===key?"rgba(173,255,47,0.08)":"var(--card)",
          border:"1px solid "+(filter===key?"rgba(173,255,47,0.4)":"var(--border)"),
          borderRadius:10,padding:"12px 14px",cursor:"pointer",transition:"all .15s"
        }}>
          <div style={{fontSize:"18px",marginBottom:4}}>{icon}</div>
          <div style={{fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontSize:"22px",fontWeight:700,color:filter===key?"#ADFF2F":"var(--text)",marginBottom:2}}>{counts[key]}</div>
          <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:".06em"}}>{label}</div>
        </div>
      ))}
    </div>

    {/* Search + Sort */}
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
      <input
        className="fb-inp"
        style={{flex:1,minWidth:180}}
        placeholder="Search by title..."
        value={search}
        onChange={e=>setSearch(e.target.value)}
      />
      <select className="fb-sel" style={{width:"auto",flexShrink:0}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
        <option value="date">Sort: Date</option>
        <option value="status">Sort: Status</option>
        <option value="title">Sort: Title</option>
      </select>
    </div>

    {/* Loading */}
    {loading&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"20px 0",fontFamily:"Space Mono",fontSize:"12px",color:"var(--text4)"}}>
      <Spinner size={14}/>Loading videos...
    </div>}

    {/* Empty */}
    {!loading&&filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",fontFamily:"Space Mono",fontSize:"12px",color:"var(--text4)"}}>
      {videos.length===0?"No football videos generated yet. Use the ⚽ tab to create some.":"No videos match your filter."}
    </div>}

    {/* Video grid */}
    {!loading&&filtered.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
      {filtered.map((v,i)=>(
        <div key={v.id||i} style={{
          background:"var(--card)",
          border:"1px solid var(--border)",
          borderRadius:10,overflow:"hidden",
          cursor:"pointer",transition:"border .15s"
        }}
          onClick={()=>setPreview(v)}
          onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(173,255,47,0.4)"}
          onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}
        >
          {/* Thumbnail */}
          <div style={{aspectRatio:"9/16",background:"var(--bg3)",position:"relative",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
            {v.thumb_url
              ? <img src={v.thumb_url} alt="thumb"

            }
            {/* Status badge */}
            <div style={{
              position:"absolute",top:6,right:6,
              padding:"2px 7px",borderRadius:4,

            {v.youtube_url&&<a href={v.youtube_url} target="_blank" rel="noreferrer"

          </div>
          {/* Info */}
          <div style={{padding:"8px 10px"}}>
            <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text)",lineHeight:1.4,marginBottom:5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>

            </div>
            <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",lineHeight:1.5}}>

        </div>

    </div>}

    {/* Preview modal */}
    {preview&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setPreview(null)}>
      <div style={{background:"var(--card)",borderRadius:16,width:"100%",maxWidth:420,padding:20,position:"relative",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <button onClick={()=>setPreview(null)} style={{position:"absolute",top:14,right:14,background:"none",border:"none",fontSize:"1.2rem",cursor:"pointer",color:"var(--text4)"}}>✕</button>

        {/* Status badge */}
        <div style={{display:"inline-block",padding:"3px 10px",borderRadius:6,background:STATUS_BG[preview.status],border:"1px solid "+STATUS_COLOR[preview.status],fontFamily:"Space Mono",fontSize:"9px",fontWeight:700,color:STATUS_COLOR[preview.status],textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>
          {preview.status}
        </div>

        <div style={{fontWeight:700,fontSize:"14px",lineHeight:1.4,marginBottom:12,paddingRight:24}}>
          {preview.title}
        </div>

        {/* Video player if has file */}
        {preview.id&&<video controls style={{width:"100%",aspectRatio:"9/16",borderRadius:10,background:"#000",marginBottom:12}}
          src={SERVER+"/file/football_"+preview.id+".mp4"}
          onError={e=>{e.target.style.display="none";}}
        />}

        {/* Details */}
        <div style={{display:"flex",flexDirection:"column",gap:8,fontFamily:"Space Mono",fontSize:"11px"}}>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:"var(--bg3)",borderRadius:8}}>
            <span style={{color:"var(--text4)"}}>Scheduled</span>
            <span style={{color:"var(--text)"}}>{preview.publish_ist||"—"}</span>
          </div>
          {preview.youtube_id&&<div style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:"var(--bg3)",borderRadius:8}}>
            <span style={{color:"var(--text4)"}}>YouTube ID</span>
            <a href={preview.youtube_url} target="_blank" rel="noreferrer" style={{color:"#ADFF2F",textDecoration:"none"}}>{preview.youtube_id} ↗</a>
          </div>}
          {preview.id&&<div style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:"var(--bg3)",borderRadius:8}}>
            <span style={{color:"var(--text4)"}}>Video ID</span>
            <span style={{color:"var(--text)",fontSize:"9px"}}>{preview.id.slice(0,18)}...</span>
          </div>}
        </div>
      </div>
    </div>}

  </div>;
}

// ── Aggregation Views ─────────────────────────────────────────
function AggregateView({weeks,period}){
  const withA=weeks.filter(w=>w.analytics);
  if(!withA.length) return <div style={{padding:"20px",textAlign:"center",color:"var(--text4)",fontFamily:"Space Mono",fontSize:"12px"}}>No analytics data yet. Analytics appear here after weeks complete.</div>;
  const sum=(field)=>withA.reduce((s,w)=>s+(w.analytics[field]||0),0);
  const avg=(field)=>+(sum(field)/withA.length).toFixed(2);
  return <div style={{display:"flex",flexDirection:"column",gap:"16px",padding:"16px"}}>
    <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)"}}>{period} OVERVIEW — {withA.length} week{withA.length!==1?"s":""} of data</div>
    <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
      <StatBox label="Total Views"   value={sum("views").toLocaleString()} accent="#ADFF2F"/>
      <StatBox label="Avg CTR"       value={avg("ctr")+"%"} accent="#00CFFF"/>
      <StatBox label="Avg Retention" value={avg("avgRetention")+"%"} accent="#B06EF3"/>
      <StatBox label="Total Subs"    value={"+"+sum("subscribersGained")} accent="#FF9F43"/>
      <StatBox label="Total Revenue" value={"$"+sum("estimatedRevenue").toFixed(2)} accent="#ADFF2F"/>
      <StatBox label="Watch Hours"   value={Math.round(sum("watchMinutes")/60)} accent="#FF6B35"/>
    </div>
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px"}}>
      <SL>WEEK BY WEEK</SL>
      {withA.map(w=><div key={w.id} style={{display:"flex",gap:"10px",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
        <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)",width:"50px",flexShrink:0}}>WK {w.number}</div>
        <div style={{flex:1,fontSize:"13px",fontWeight:600}}>{w.niche}</div>
        <div style={{display:"flex",gap:"8px"}}>
          <Tag color="#ADFF2F">{(w.analytics.views||0).toLocaleString()} views</Tag>
          <Tag color="#00CFFF">{w.analytics.ctr||0}% CTR</Tag>
          <Tag color="#FF9F43">+{w.analytics.subscribersGained||0} subs</Tag>
        </div>
      </div>)}
    </div>
  </div>;
}

// ── App Root ──────────────────────────────────────────────────

  const [syncStatus,setSyncStatus]=useState("");
  const [sbReady,setSbReady]=useState(false);
  const [showSetup,setShowSetup]=useState(false);
  const [ytToken,setYtToken]=useState(null);
  const [serverOnline,setServerOnline]=useState(false);

  // Theme
  useEffect(()=>{document.body.className=theme;try{localStorage.setItem("r00m_theme",theme);}catch{};},[theme]);

  // Manual sync — works even when credentials entered after load
  const syncFromSupabase = async (s) => {
    const cfg = s || settings;
    const {supabaseUrl,supabaseKey,channelKey} = cfg;
    if(!supabaseUrl||!supabaseKey||!channelKey) return;
    setSyncStatus("syncing");
    try {
      const data = await sbLoad(supabaseUrl,supabaseKey,channelKey);
      if(data&&data.weeks) setWeeksRaw(data.weeks);
      if(data&&data.settings) setSettingsRaw(prev=>({...data.settings,supabaseUrl:prev.supabaseUrl,supabaseKey:prev.supabaseKey,channelKey:prev.channelKey}));
      setSyncStatus("synced");
    } catch(e) { setSyncStatus("error"); }
    setSbReady(true);
  };

  // Supabase
  useEffect(()=>{
    const {supabaseUrl,supabaseKey,channelKey}=settings;
    if(supabaseUrl&&supabaseKey&&channelKey){
      syncFromSupabase(settings);
    } else { setSbReady(true); }
    // eslint-disable-next-line
  },[]);

  useEffect(()=>{ // dummy to satisfy linter
    const {supabaseUrl,supabaseKey,channelKey}=settings;
    if(supabaseUrl&&supabaseKey&&channelKey){
      sbLoad(supabaseUrl,supabaseKey,channelKey).then(data=>{
        if(data&&data.weeks){setWeeksRaw(data.weeks);}
        setSyncStatus("synced");setSbReady(true);
      }).catch(()=>setSbReady(true));
    }else{setSbReady(true);}
  },[]);

  useEffect(()=>{try{localStorage.setItem("r00m_weeks2",JSON.stringify(weeks));}catch{}},[weeks]);
  useEffect(()=>{try{localStorage.setItem("r00m_settings",JSON.stringify(settings));}catch{}},[settings]);

  useEffect(()=>{
    if(!sbReady)return;
    const {supabaseUrl,supabaseKey,channelKey}=settings;
    if(supabaseUrl&&supabaseKey&&channelKey){sbSave(supabaseUrl,supabaseKey,channelKey,{weeks});setSyncStatus("saved");}
  },[weeks,sbReady]);

  const setSettings=v=>setSettingsRaw(v);

  const updateWeek=(idx,data)=>{setWeeksRaw(prev=>prev.map((w,i)=>i===idx?{...w,...data}:w));};

  const addWeek=()=>{const n=weeks.length+1;setWeeksRaw(prev=>[...prev,initWeek(n)]);setActiveTab("w"+(weeks.length));};

  // YouTube OAuth
  const connectYT=()=>{
    if(!settings.youtubeClientId){setShowSetup(true);return;}
    if(!window.google){alert("Google library not loaded. Check connection.");return;}
    const tc=google.accounts.oauth2.initTokenClient({client_id:settings.youtubeClientId,scope:"https://www.googleapis.com/auth/yt-analytics.readonly",callback:(resp)=>{if(!resp.error)setYtToken(resp.access_token);}});
    tc.requestAccessToken();
  };

  // Server check — auto-connect if running on localhost
  const checkServer=async()=>{const ok=await pingServer();setServerOnline(ok);return ok;};
  useEffect(()=>{if(IS_LOCAL){checkServer();}}, []);

  const activeWeekIdx=activeTab.startsWith("w")?parseInt(activeTab.slice(1)):-1;
  const isAggView=["month","quarter","year"].includes(activeTab);

  // Analytics ready + next week nudge
  const analyticsAlerts = weeks.filter(w=>{
    if(!w.scheduledAt||!w.locked) return false;
    const daysSince=(Date.now()-new Date(w.scheduledAt).getTime())/(1000*60*60*24);
    const scheduled=(w.slots||[]).filter(s=>s.scheduleStatus==="youtube_done").length;
    return daysSince>=3&&scheduled>0&&!w.analytics;
  });
  const nextUnplanned=weeks.find(w=>!w.locked&&!w.niche);

  return <div style={{minHeight:"100vh",background:"var(--bg)"}}>
    {/* Analytics alerts — shown above topbar as a sticky banner */}
    {analyticsAlerts.map(w=><div key={w.id} style={{background:"rgba(0,207,255,0.12)",borderBottom:"1px solid rgba(0,207,255,0.3)",padding:"10px 16px",display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
      <div style={{width:8,height:8,borderRadius:"50%",background:"#00CFFF",animation:"pulse 2s infinite",flexShrink:0}}/>
      <div style={{flex:1,fontFamily:"Space Mono",fontSize:"11px",color:"#00CFFF"}}>WEEK {w.number} ANALYTICS READY — Connect YouTube in Stage 6 to see performance</div>
      <button onClick={()=>setActiveTab("w"+(w.number-1))} style={{background:"rgba(0,207,255,0.15)",border:"1px solid rgba(0,207,255,0.4)",borderRadius:"6px",padding:"4px 10px",color:"#00CFFF",fontFamily:"Syne",fontWeight:700,fontSize:"11px",cursor:"pointer"}}>View →</button>
    </div>)}
    {analyticsAlerts.length>0&&nextUnplanned&&<div style={{background:"rgba(173,255,47,0.08)",borderBottom:"1px solid rgba(173,255,47,0.25)",padding:"10px 16px",display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
      <div style={{width:8,height:8,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite",flexShrink:0}}/>
      <div style={{flex:1,fontFamily:"Space Mono",fontSize:"11px",color:"#ADFF2F"}}>TIME TO PLAN WEEK {nextUnplanned.number} — Analytics are in, engine ready to optimise next week</div>
      <button onClick={()=>{setActiveTab("w"+(nextUnplanned.number-1));}} style={{background:"rgba(173,255,47,0.15)",border:"1px solid rgba(173,255,47,0.4)",borderRadius:"6px",padding:"4px 10px",color:"#ADFF2F",fontFamily:"Syne",fontWeight:700,fontSize:"11px",cursor:"pointer"}}>Plan Week {nextUnplanned.number} →</button>
    </div>}
    {/* Topbar */}
    <div style={{position:"sticky",top:0,zIndex:200,background:"var(--topbar)",backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",borderBottom:"1px solid var(--border)",padding:"8px 12px",display:"flex",alignItems:"center",gap:"6px"}}>
      {/* Brand */}
      <a href="https://www.youtube.com/@rand00mscroll" target="_blank" rel="noopener" style={{fontWeight:800,fontSize:"15px",letterSpacing:"-0.02em",color:"#ADFF2F",flexShrink:0,marginRight:"4px",textDecoration:"none",cursor:"pointer"}}>Rand00mscroll</a>
      {/* Week tabs — scrollable */}
      <div style={{flex:1,display:"flex",gap:"3px",overflowX:"auto",scrollbarWidth:"none"}}>
        {weeks.map((w,i)=>{
          const isActive=activeTab==="w"+i;
          const hasDot=w.locked;
          const dotColor=w.scheduled&&w.analytics?"#ADFF2F":w.scheduled?"#FF6B35":w.locked?"#00CFFF":"var(--border2)";
          return <button key={w.id} onClick={()=>setActiveTab("w"+i)} style={{background:isActive?"#ADFF2F":"var(--bg4)",color:isActive?"#08080E":"var(--text3)",border:"1px solid "+(isActive?"#ADFF2F":"var(--border)"),borderRadius:"8px",padding:"5px 10px",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:700,fontSize:"12px",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,display:"flex",alignItems:"center",gap:"5px",transition:"all .15s"}}>
            {hasDot&&<div style={{width:5,height:5,borderRadius:"50%",background:isActive?"#08080E":dotColor,flexShrink:0}}/>}
            W{i+1}{w.niche?" · "+w.niche.slice(0,10):""}
          </button>;
        })}
        <button onClick={addWeek} style={{background:"transparent",border:"1px dashed var(--border)",borderRadius:"8px",padding:"5px 10px",color:"var(--text4)",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:700,fontSize:"12px",cursor:"pointer",flexShrink:0}}>+ Week</button>
        <div style={{width:"1px",background:"var(--border)",margin:"0 2px",flexShrink:0}}/>
        {[["month","Month"],["quarter","Quarter"],["year","Year"]].map(([id,label])=><button key={id} onClick={()=>setActiveTab(id)} style={{background:activeTab===id?"var(--bg4)":"transparent",color:activeTab===id?"var(--text)":"var(--text4)",border:"1px solid "+(activeTab===id?"var(--border)":"transparent"),borderRadius:"8px",padding:"5px 10px",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:600,fontSize:"11px",cursor:"pointer",flexShrink:0}}>{label}</button>)}
        <div style={{width:"1px",background:"var(--border)",margin:"0 2px",flexShrink:0}}/>
        <button onClick={()=>setActiveTab("football")} style={{background:activeTab==="football"?"#ADFF2F":"transparent",color:activeTab==="football"?"#08080E":"var(--text4)",border:"1px solid "+(activeTab==="football"?"#ADFF2F":"transparent"),borderRadius:"8px",padding:"5px 10px",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:700,fontSize:"13px",cursor:"pointer",flexShrink:0}}>⚽</button>
        <button onClick={()=>setActiveTab("storage")} style={{background:activeTab==="storage"?"#00CFFF":"transparent",color:activeTab==="storage"?"#08080E":"var(--text4)",border:"1px solid "+(activeTab==="storage"?"#00CFFF":"transparent"),borderRadius:"8px",padding:"5px 10px",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:700,fontSize:"13px",cursor:"pointer",flexShrink:0}}>📦</button>
        <button onClick={()=>setActiveTab("queue")} style={{background:activeTab==="queue"?"#f59e0b":"transparent",color:activeTab==="queue"?"#08080E":"var(--text4)",border:"1px solid "+(activeTab==="queue"?"#f59e0b":"transparent"),borderRadius:"8px",padding:"5px 10px",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:700,fontSize:"13px",cursor:"pointer",flexShrink:0}}>📅</button>
      </div>
      {/* Right controls */}
      <div style={{display:"flex",gap:"5px",alignItems:"center",flexShrink:0}}>
        {ytToken&&<div style={{fontFamily:"Space Mono",fontSize:"9px",color:"#ADFF2F"}}>YT✓</div>}
        {serverOnline&&<div style={{fontFamily:"Space Mono",fontSize:"9px",color:"#00CFFF"}}>SRV✓</div>}
        <button onClick={()=>setShowSetup(true)} style={{background:"var(--bg4)",border:"1px solid var(--border)",borderRadius:"8px",padding:"5px 8px",cursor:"pointer",fontSize:"14px"}}>⚙️</button>
        <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} style={{background:"var(--bg4)",border:"1px solid var(--border)",borderRadius:"8px",padding:"5px 8px",cursor:"pointer",fontSize:"14px"}}>{theme==="dark"?"☀️":"🌙"}</button>
        <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
          <div style={{width:5,height:5,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite"}}/>
          <span style={{fontFamily:"Space Mono",fontSize:"9px",color:syncStatus==="saved"||syncStatus==="synced"?"#ADFF2F":syncStatus==="syncing"?"#FF6B35":"#ADFF2F"}}>{syncStatus==="syncing"?"SYNC":syncStatus==="synced"?"SYNC'd":syncStatus==="saved"?"SAVED":"LIVE"}</span>
        </div>
      </div>
    </div>

    {/* Main content */}
    <div style={{maxWidth:"860px",margin:"0 auto",padding:"16px 12px 80px"}}>
      {activeTab==="football"
        ? <FootballTab settings={settings}/>
        : activeTab==="storage"
          ? <StorageTab/>
          : activeTab==="queue"
            ? <QueueTab/>
            : isAggView
            ? <AggregateView weeks={weeks} period={activeTab.toUpperCase()}/>
            : activeWeekIdx>=0&&activeWeekIdx<weeks.length
              ? <WeekWorkspace
                  week={weeks[activeWeekIdx]}
                  updateWeek={(data)=>updateWeek(activeWeekIdx,data)}
                  settings={settings}
                  ytToken={ytToken}
                  connectYT={connectYT}
                  serverOnline={serverOnline}
                  onCheckServer={checkServer}
                  allWeeks={weeks}
                />
              : <div style={{padding:"40px",textAlign:"center",color:"var(--text4)"}}>Select a week above</div>
      }
    </div>

    {/* Setup overlay */}
    {showSetup&&<SetupOverlay settings={settings} setSettings={setSettings} onClose={()=>setShowSetup(false)} onSync={syncFromSupabase}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
