function makeSlots(types, topics) {
  const t  = types.length  ? types  : ["engaging"];
  const tp = topics && topics.length ? topics : ["general"];
  const s  = []; let ti = 0;
  // Interleave topics across days — each day gets all topics, no monotony
  // e.g. 3 topics: Mon=T1/T2/T3, Tue=T1/T2/T3, Wed=T1/T2/T3...
  // e.g. 2 topics: Mon=T1/T2/T1, Tue=T2/T1/T2, alternating
  // e.g. 1 topic: all same (no choice)
  for (let d=0;d<7;d++) for (let x=0;x<3;x++) {
    const slotIndex = d*3+x;
    // Rotate through topics at each slot position
    const topicIdx = slotIndex % tp.length;
    // Also shuffle content types independently
    s.push({id:uid(),day:d,time:x,contentType:t[ti++%t.length],
            topic:tp[topicIdx],
            status:"pending",script:null,footage:[],videoUrl:null,
            scheduleStatus:"unscheduled",youtubeId:null});
  }
  return s;
}

const INIT_SETTINGS = {bufferToken:"",bufferYTProfile:"6a058c6e090476fb991b0ba5",pexelsKey:"",youtubeClientId:"",postingTimes:["07:00","13:00","18:00"],voiceId:"en-US-ChristopherNeural",targetDuration:55,instagramEnabled:false,bufferIGProfile:"",supabaseUrl:"",supabaseKey:"",channelKey:"",openaiKey:"",visualSource:"pexels",footballDataKey:"",footballVideosPerDay:2};

// ── Claude API ────────────────────────────────────────────────
async function claudeCall(msgs,opts){
  const body={model:"claude-sonnet-4-20250514",max_tokens:(opts&&opts.maxTokens)||1000,messages:msgs};
  // Use Vercel proxy when on localhost, relative path when on Vercel
  const apiUrl = (window.location.hostname==="localhost"||window.location.hostname==="127.0.0.1")
    ? "https://randoomscroll.vercel.app/api/claude"
    : "/api/claude";
  const r=await fetch(apiUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error("Claude "+r.status);
  return r.json();
}
const getText=d=>(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("")||"";
const tryJSON=t=>{try{return JSON.parse(t.replace(/```json|```/g,"").trim());}catch{return null;}};

async function genScripts(slots,evolved){
  const d=await claudeCall([{role:"user",content:"Write "+slots.length+" YouTube Shorts scripts. Match each to its exact topic and content type.\n\nSlots:\n"+slots.map((s,i)=>(i+1)+". Topic: \""+s.topic+"\" | Type: "+s.contentType).join("\n")+"\n\n"+(evolved?"Style guidance: "+evolved+"\n\n":"")+"Rules: max 60 words, punchy, hook-first, voiceover-ready.\n\nReturn ONLY valid JSON:\n[{\"title\":\"t\",\"type\":\"t\",\"topic\":\"t\",\"script\":\"s\",\"hook\":\"h\",\"ytCaption\":\"caption #hashtag1 #hashtag2 #Shorts\"}]"}],{maxTokens:2000});
  return tryJSON(getText(d))||[];
}

// ── Pexels ────────────────────────────────────────────────────
async function pexelsSearch(keyword, apiKey){
  if(!apiKey) return [];
  try{const r=await fetch("https://api.pexels.com/videos/search?query="+encodeURIComponent(keyword)+"&per_page=6&orientation=portrait",{headers:{Authorization:apiKey}});const d=await r.json();return(d.videos||[]).map(v=>({id:v.id,preview:v.image,url:(v.video_files||[]).find(f=>f.quality==="sd")?.link||(v.video_files||[])[0]?.link,duration:v.duration}));}catch{return[];}
}

// Visual keyword pools — unique footage per content type
const FOOTAGE_POOLS = {
  cliffhanger: ["suspense dark corridor","mystery shadow person","tense dramatic face","night city thriller","countdown stress timer","secret door reveal"],
  ragebait:    ["angry crowd street","shocking news breaking","frustrated reaction close","controversy heated debate","protest signs crowd","viral outrage moment"],
  clickbait:   ["money cash success luxury","secret hidden treasure","amazing transformation before","shocking discovery moment","viral celebrity life","wealth lifestyle car"],
  explanatory: ["whiteboard marker writing","professional explaining desk","office team meeting","data charts screen","teacher classroom clear","expert interview studio"],
  infographic: ["data visualization display","statistics clean minimal","digital interface tech","information screen modern","flat design elements","analytics dashboard glow"],
  brainrot:    ["neon lights city energy","gaming setup rgb glow","fast cut chaos street","zoom dramatic reaction","loud crowd festival","viral dance trend"],
  engaging:    ["person talking direct camera","authentic outdoor candid","real conversation coffee","street interview spontaneous","genuine laugh natural","casual storytelling home"],
  storytime:   ["nostalgic memory soft light","old photograph album","walking alone reflection road","emotional sunset silhouette","personal journey nature","past flashback blur"],
};

// Generate unique keyword per slot using content type + topic context + position
function slotKeyword(slot, indexInTopic) {
  const pool = FOOTAGE_POOLS[slot.contentType] || FOOTAGE_POOLS.engaging;
  const base = pool[indexInTopic % pool.length];
  // Add 1-2 meaningful topic words for visual context
  const topicWords = (slot.topic||"").split(" ").filter(w=>w.length>4).slice(0,2).join(" ");
  return topicWords ? base+" "+topicWords : base;
}

// ── Stage 1: Plan ─────────────────────────────────────────────
function PlanStage({week,updateWeek}){
  const [niche,setNiche]=useState(week.niche||"");
  const [topics,setTopics]=useState(week.topics&&week.topics.length?week.topics:["","",""]);
  const [selTypes,setSelTypes]=useState(week.contentTypes&&week.contentTypes.length?week.contentTypes:["cliffhanger","explanatory"]);
  const [trending,setTrending]=useState([]);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const valid=validTopics(topics);
  const canLock=niche.trim()&&valid.length>0&&selTypes.length>0;
  function validTopics(t){return t.filter(x=>x.trim());}
  const doSearch=async()=>{if(!niche.trim()){setErr("Enter niche first");return;}setErr("");setLoading(true);setTrending([]);try{const t=await genTopics(niche.trim());setTrending(t);}catch{setErr("Search failed");}setLoading(false);};
  const pick=txt=>{const e=topics.findIndex(t=>!t.trim());const u=[...topics];u[e>=0?e:2]=txt;setTopics(u);};
  const toggleType=id=>setSelTypes(p=>p.includes(id)?p.filter(t=>t!==id):[...p,id]);
  const lock=()=>{
    if(!canLock)return;
    const filled=validTopics(topics);
    const newSlots=makeSlots(selTypes,filled);
    updateWeek({niche:niche.trim(),topics:filled,contentTypes:selTypes,slots:newSlots,locked:true});
  };
  if(week.locked)return <div>
    <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"8px"}}><Tag color="#FF6B35">{week.niche}</Tag>{week.topics.map((t,i)=><Tag key={i} color="#00CFFF">{t.slice(0,30)}</Tag>)}</div>

      {[0,1,2].map(i=><div key={i} style={{marginBottom:"6px"}}><input value={topics[i]} onChange={e=>{const u=[...topics];u[i]=e.target.value;setTopics(u);}} placeholder={i===0?"Main topic (required)...":i===1?"Second angle (optional)...":"Third angle (optional)..."} style={{...inp,background:topics[i]?"rgba(13,26,13,0.4)":"var(--input-bg)",border:"1px solid "+(topics[i]?"rgba(173,255,47,0.3)":"var(--input-border)")}}/></div>)}
      <div style={{marginTop:"8px",display:"flex",gap:"8px",alignItems:"center"}}>
        <Btn variant="outline" small onClick={doSearch}>{loading?<><Spinner size={12}/>Searching...</>:"Find Trending Topics"}</Btn>
        {err&&<span style={{fontSize:"12px",color:"#FF2D6B"}}>{err}</span>}

      {trending.length>0&&<div style={{marginTop:"8px",display:"flex",flexDirection:"column",gap:"4px"}}>

          <span style={{fontFamily:"Space Mono",fontSize:"9px",color:added?"#ADFF2F":"var(--text4)"}}>{added?"✓":"tap"}</span>
        </div>;})}

    </div>
    {canLock&&<div style={{background:"rgba(13,26,13,0.3)",border:"1px solid rgba(173,255,47,0.15)",borderRadius:"8px",padding:"10px 12px",fontSize:"13px",color:"var(--text3)",lineHeight:1.8}}>
      <strong style={{color:"var(--text)"}}>Week {week.number}:</strong> {niche} · {validTopics(topics).join(" / ")} · {selTypes.length} formats · 21 videos
    </div>}
    <Btn onClick={lock} disabled={!canLock}>Lock Week {week.number} and Start →</Btn>
  </div>;
}

// ── Stage 2: Scripts ──────────────────────────────────────────
function ScriptsStage({week,updateWeek}){
  const [generating,setGenerating]=useState(false);
  const [progress,setProgress]=useState(0);
  const [total,setTotal]=useState(0);
  const [currentTitle,setCurrentTitle]=useState("");
  const [expanded,setExpanded]=useState(null);
  const slots=week.slots||[];
  const pending=slots.filter(s=>!s.script);
  const done=slots.filter(s=>s.script);
  const generateAll=async()=>{
    const p=week.slots.filter(s=>!s.script);
    if(!p.length) return;
    setGenerating(true);setProgress(0);setTotal(p.length);
    // Process in batches of 3 but run ALL batches automatically — no stops
    for(let i=0;i<p.length;i+=3){
      const batch=p.slice(i,i+3);
      setCurrentTitle(batch[0].topic||batch[0].contentType);
      try{
        const si=batch.map(s=>({topic:s.topic,contentType:s.contentType}));
        const scripts=await genScripts(si,week.evolvedPrompt);
        const updated=week.slots.map(s=>{
          const j=batch.findIndex(b=>b.id===s.id);
          return j>=0&&scripts[j]?{...s,script:scripts[j],status:"script_ready"}:s;
        });
        updateWeek({slots:updated});
      }catch(e){console.error(e);}
      setProgress(Math.min(i+3,p.length));
    }
    setGenerating(false);setCurrentTitle("");
  };
  return <div>
    {generating&&<div style={{background:"rgba(13,26,13,0.8)",border:"1px solid rgba(173,255,47,0.3)",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
      <Spinner size={13}/>
      <div style={{flex:1}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:"2px"}}>GENERATING SCRIPTS — DO NOT CLOSE</div>
        <div style={{fontSize:"12px",color:"#fff"}}>{progress}/{total} done · {currentTitle}</div>
      </div>
      <div style={{fontFamily:"Space Mono",fontSize:"18px",fontWeight:700,color:"#ADFF2F"}}>{done.length}/21</div>
    </div>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
      <div style={{fontFamily:"Space Mono",fontSize:"11px",color:done.length===21?"#ADFF2F":"var(--text3)"}}>{done.length===21?"✓ All 21 scripts ready":done.length+"/21 scripts ready"}</div>
      {!generating&&<Btn small onClick={generateAll} disabled={!pending.length}>{pending.length?"Generate All "+pending.length+" Scripts →":"All Done ✓"}</Btn>}
    </div>
    {done.length>0&&<div style={{background:"var(--bg4)",borderRadius:"4px",height:"4px",marginBottom:"12px"}}><div style={{width:(done.length/21*100)+"%",height:"100%",background:"#FF6B35",borderRadius:"4px",transition:"width .5s"}}/></div>}
    <div style={{display:"flex",flexDirection:"column",gap:"4px",maxHeight:"400px",overflowY:"auto"}}>
      {DAYS.map((day,di)=>{
        const daySlots=slots.filter(s=>s.day===di);
        return <div key={day}>
          <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",padding:"6px 0 4px",letterSpacing:"0.1em"}}>{day.toUpperCase()}</div>
          {daySlots.map(slot=>{
            const ct=CTYPES.find(c=>c.id===slot.contentType);
            return <div key={slot.id} style={{background:slot.script?"var(--card2)":"var(--bg3)",border:"1px solid "+(expanded===slot.id?"rgba(173,255,47,0.3)":"var(--border)"),borderRadius:"8px",marginBottom:"4px",overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",cursor:slot.script?"pointer":"default"}} onClick={()=>slot.script&&setExpanded(expanded===slot.id?null:slot.id)}>
                <div style={{width:5,height:5,borderRadius:"50%",background:slot.script?"#ADFF2F":"var(--border2)",flexShrink:0}}/>
                <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",width:"44px",flexShrink:0}}>{TIMES[slot.time]}</div>
                <div style={{flex:1,fontSize:"12px",color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{slot.script?slot.script.title:(slot.topic||"Waiting...")}</div>
                {ct&&<Tag color={ct.color}>{ct.label}</Tag>}
              </div>
              {expanded===slot.id&&slot.script&&<div style={{padding:"0 10px 10px",borderTop:"1px solid var(--border)"}}>
                <div style={{fontSize:"12px",color:"#ADFF2F",fontStyle:"italic",margin:"8px 0 6px"}}>"{slot.script.hook}"</div>
                <div style={{fontSize:"12px",color:"var(--text2)",lineHeight:1.7,marginBottom:"6px"}}>{slot.script.script}</div>
                <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)"}}>{slot.script.ytCaption}</div>
              </div>}
            </div>;
          })}
        </div>;
      })}
    </div>
  </div>;
}

// ── Stage 3: Footage ──────────────────────────────────────────
function FootageStage({week,updateWeek,pexelsKey}){
  const [loading,setLoading]=useState({});
  const [results,setResults]=useState({});
  const slots=week.slots||[];
  const slotsWithScript=slots.filter(s=>s.script);
  const slotsWithFootage=slots.filter(s=>s.footage&&s.footage.length>0);
  const fetchAll=async()=>{
    // Track how many slots per topic we have processed — for keyword rotation
    const topicCounts = {};
    for(const slot of slotsWithScript){
      if(slot.footage&&slot.footage.length>0) continue;
      setLoading(p=>({...p,[slot.id]:true}));
      // Count position within this topic for keyword variety
      const tk = slot.topic||"general";
      topicCounts[tk] = (topicCounts[tk]||0);
      const kw = slotKeyword(slot, topicCounts[tk]);
      topicCounts[tk]++;
      const clips = await pexelsSearch(kw, pexelsKey);
      // Fallback to broader topic search if no results
      const finalClips = clips.length > 0 ? clips : await pexelsSearch(slot.topic||"nature", pexelsKey);
      setResults(p=>({...p,[slot.id]:finalClips}));
      if(finalClips.length>0){
        const updated=week.slots.map(s=>s.id===slot.id?{...s,footage:finalClips}:s);
        updateWeek({slots:updated});
      }
      setLoading(p=>({...p,[slot.id]:false}));
    }
  };
  const selectClip=(slotId,clip)=>{const updated=week.slots.map(s=>s.id===slotId?{...s,footage:[clip]}:s);updateWeek({slots:updated});};
  const [fetching,setFetching]=useState(false);
  const [fetchProg,setFetchProg]=useState(0);
  const [fetchTitle,setFetchTitle]=useState("");
  const fetchAllWithProgress=async()=>{
    const toFetch=slotsWithScript.filter(s=>!s.footage||s.footage.length===0);
    if(!toFetch.length||!pexelsKey) return;
    setFetching(true);setFetchProg(0);
    const topicCounts={};
    for(let i=0;i<toFetch.length;i++){
      const slot=toFetch[i];
      setFetchTitle(slot.script?slot.script.title:slot.topic);
      setFetchProg(i);
      const tk=slot.topic||"general";
      topicCounts[tk]=(topicCounts[tk]||0);
      const kw=slotKeyword(slot,topicCounts[tk]);
      topicCounts[tk]++;
      const clips=await pexelsSearch(kw,pexelsKey);
      const finalClips=clips.length>0?clips:await pexelsSearch(slot.topic||"nature",pexelsKey);
      setResults(p=>({...p,[slot.id]:finalClips}));
      if(finalClips.length>0){
        const updated=week.slots.map(s=>s.id===slot.id?{...s,footage:finalClips}:s);
        updateWeek({slots:updated});
      }
    }
    setFetching(false);setFetchTitle("");
  };
  return <div>
    {fetching&&<div style={{background:"rgba(0,10,26,0.8)",border:"1px solid rgba(0,207,255,0.3)",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
      <Spinner size={13}/>
      <div style={{flex:1}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#00CFFF",marginBottom:"2px"}}>FETCHING FOOTAGE — DO NOT CLOSE</div>
        <div style={{fontSize:"12px",color:"#fff"}}>{fetchProg}/{slotsWithScript.filter(s=>!s.footage||s.footage.length===0).length+fetchProg} done · {fetchTitle}</div>
      </div>
      <div style={{fontFamily:"Space Mono",fontSize:"18px",fontWeight:700,color:"#00CFFF"}}>{slotsWithFootage.length}/21</div>
    </div>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
      <div style={{fontFamily:"Space Mono",fontSize:"11px",color:slotsWithFootage.length===21?"#ADFF2F":"var(--text3)"}}>{slotsWithFootage.length===21?"✓ All 21 slots have footage":slotsWithFootage.length+"/21 slots have footage"}</div>
      {!fetching&&<Btn small onClick={fetchAllWithProgress} disabled={!pexelsKey||slotsWithScript.length===0}>{!pexelsKey?"Add Pexels Key in Setup":slotsWithFootage.length===slotsWithScript.length?"Refresh All":"Fetch All Footage →"}</Btn>}
    </div>
    {!pexelsKey&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"8px",padding:"12px",fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)"}}>Add your Pexels API key in Setup ⚙ to fetch stock footage.</div>}
    <div style={{display:"flex",flexDirection:"column",gap:"8px",maxHeight:"440px",overflowY:"auto"}}>
      {slotsWithScript.map(slot=>{
        const clips=results[slot.id]||slot.footage||[];
        const selected=slot.footage&&slot.footage[0];
        return <div key={slot.id} style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:"8px",padding:"10px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}>
            <div style={{fontSize:"12px",fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{slot.script.title}</div>
            {loading[slot.id]&&<Spinner size={12}/>}
            {selected&&<Tag color="#ADFF2F">✓</Tag>}
          </div>
          <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",marginBottom:"8px"}}>
            Search: {(()=>{const pool=FOOTAGE_POOLS[slot.contentType]||FOOTAGE_POOLS.engaging;const idx=slotsWithScript.indexOf(slot);const topicSlots=slotsWithScript.filter(s=>s.topic===slot.topic);const posInTopic=topicSlots.indexOf(slot);return slotKeyword(slot,posInTopic);})()}
          </div>
          {clips.length>0?<div style={{display:"flex",gap:"6px",overflowX:"auto"}}>
            {clips.slice(0,6).map((c,i)=><div key={i} onClick={()=>selectClip(slot.id,c)} style={{width:64,height:48,borderRadius:"6px",overflow:"hidden",flexShrink:0,cursor:"pointer",border:"2px solid "+(selected&&selected.id===c.id?"#ADFF2F":"transparent"),transition:"border .15s"}}>
              <img src={c.preview} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            </div>)}
          </div>:<div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)"}}>No footage yet — tap Fetch All</div>}
        </div>;
      })}
    </div>

    {/* Export jobs — available as soon as footage is fetched */}
    {slotsWithFootage.length>0&&<div style={{marginTop:"14px",background:"rgba(13,26,13,0.4)",border:"1px solid rgba(173,255,47,0.2)",borderRadius:"10px",padding:"12px 14px"}}>
      <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:"8px"}}>READY TO GENERATE VIDEOS</div>
      <div style={{fontSize:"12px",color:"var(--text3)",lineHeight:1.8,marginBottom:"10px"}}>
        <div>1. Download the jobs file below</div>
        <div>2. Move it to your <span style={{color:"#00CFFF"}}>rand00mscroll_pipeline</span> folder</div>
        <div>3. Open Claude Code → type: <span style={{color:"#00CFFF"}}>"Run pipeline with week{week.number}_jobs.json --no-upload"</span></div>
        <div>4. Once done, start <span style={{color:"#00CFFF"}}>server.py</span> → come back to Stage 4 to preview</div>
      </div>
      <Btn onClick={()=>{
        const jobs=slotsWithScript.map(s=>({jobId:s.id,weekId:week.id,niche:week.niche,topic:s.topic,day:DAYS[s.day],time:TIMES[s.time],contentType:s.contentType,voiceId:"en-US-ChristopherNeural",targetDuration:55,script:s.script?.script||"",hook:s.script?.hook||"",title:s.script?.title||"",ytCaption:s.script?.ytCaption||"",keywords:[slotKeyword(s,slotsWithScript.filter(x=>x.topic===s.topic).indexOf(s))],footage:(s.footage||[]).map(c=>({id:c.id,url:c.url,duration:c.duration}))}));
        const blob=new Blob([JSON.stringify(jobs,null,2)],{type:"application/json"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download="week"+week.number+"_jobs.json";a.click();
        URL.revokeObjectURL(url);
      }}>↓ Download week{week.number}_jobs.json</Btn>
    </div>}
  </div>;
}

// ── Stage 4: Videos ───────────────────────────────────────────
function VideoStage({week,updateWeek,serverOnline,onCheckServer}){
  const [generating,setGenerating]=useState({});
  const [batchRunning,setBatchRunning]=useState(false); // true for entire batch
  const [activePreview,setActivePreview]=useState(null);
  const [modal,setModal]=useState(null);
  const slots=week.slots||[];
  const withScript=slots.filter(s=>s.script);
  const withVideo=slots.filter(s=>s.videoUrl);

  const generateOne=async(slot)=>{
    setGenerating(p=>({...p,[slot.id]:true}));
    if(activePreview===slot.id) setActivePreview(null);
    try{
      const jobData={jobId:slot.id,script:slot.script.script,hook:slot.script.hook,title:slot.script.title,ytCaption:slot.script.ytCaption,keywords:[slot.topic],footage:slot.footage||[],contentType:slot.contentType,topic:slot.topic,day:DAYS[slot.day],time:TIMES[slot.time],voiceId:"en-US-ChristopherNeural",targetDuration:55};
      const r=await generateOneVideo(jobData);
      if(r.success){
        const updated=week.slots.map(s=>s.id===slot.id?{...s,videoUrl:SERVER+"/file/"+slot.id+".mp4"}:s);
        updateWeek({slots:updated});
      }
    }catch(e){console.error(e);}
    setGenerating(p=>({...p,[slot.id]:false}));
  };

  const generateAll=async()=>{
    const toGenerate=withScript.filter(s=>!s.videoUrl);
    if(!toGenerate.length||batchRunning) return;
    setBatchRunning(true); // lock button for entire batch — not just per video
    for(let i=0;i<toGenerate.length;i++){
      await generateOne(toGenerate[i]);
      await new Promise(r=>setTimeout(r,300));
    }
    setBatchRunning(false);
  };
  const isGeneratingAny = Object.values(generating).some(Boolean);
  const currentlyGenerating = withScript.find(s=>generating[s.id]);
  const remaining = withScript.filter(s=>!s.videoUrl).length;

  return <div>
    {/* Live status banner */}
    {(batchRunning||isGeneratingAny)&&currentlyGenerating&&<div style={{background:"rgba(13,26,13,0.9)",border:"1px solid rgba(173,255,47,0.4)",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
      <Spinner size={14}/>
      <div style={{flex:1}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:"2px"}}>GENERATING VIDEO {withVideo.length+1} OF {withScript.length}</div>
        <div style={{fontSize:"13px",color:"#ffffff",fontWeight:700}}>{currentlyGenerating.script.title}</div>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#888",marginTop:"2px"}}>{remaining-1} more in queue after this · ~{Math.round((remaining-1)*60/60)} min remaining</div>
      </div>
      <div style={{fontFamily:"Space Mono",fontSize:"20px",fontWeight:700,color:"#ADFF2F"}}>{withVideo.length}/{withScript.length}</div>
    </div>}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px",marginBottom:"12px"}}>
      <div style={{fontFamily:"Space Mono",fontSize:"11px",color:withVideo.length===21?"#ADFF2F":"var(--text3)"}}>
        {withVideo.length===21?"✓ All 21 videos generated":withVideo.length+"/21 videos generated"}
      </div>
      <div style={{display:"flex",gap:"8px"}}>
        <Btn small variant={serverOnline?"green":"outline"} onClick={onCheckServer}>{serverOnline?"● Server Online":IS_LOCAL?"Checking...":"Open http://localhost:8080"}</Btn>
        {serverOnline&&<Btn small onClick={generateAll} disabled={withScript.length===0||batchRunning||remaining===0}>
          {batchRunning?<><Spinner size={12}/>{withVideo.length}/{withScript.length}</>:remaining===0?"All Generated ✓":"Generate Remaining "+remaining}
        </Btn>}
      </div>
    </div>
    {!serverOnline&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px",marginBottom:"12px"}}>
      <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:"8px"}}>HOW TO GENERATE VIDEOS</div>
      <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)",lineHeight:2.2}}>
        <div>1. Download jobs file from Stage 3</div>
        <div>2. Move it to your <span style={{color:"#00CFFF"}}>rand00mscroll_pipeline</span> folder</div>
        <div>3. Run: <span style={{color:"#00CFFF"}}>python video_pipeline.py --jobs weekX_jobs.json --no-upload</span></div>
        <div>4. Run: <span style={{color:"#00CFFF"}}>python server.py</span></div>
        <div>5. <strong style={{color:"#ADFF2F"}}>Open http://localhost:8080 in your browser</strong></div>
        <div style={{color:"var(--text3)",fontSize:"10px"}}>The app reloads from localhost — server connects automatically.</div>
      </div>
    </div>}
    <div style={{display:"flex",flexDirection:"column",gap:"6px",maxHeight:"500px",overflowY:"auto"}}>
      {withScript.map(slot=>{
        const ct=CTYPES.find(c=>c.id===slot.contentType);
        const isActive=activePreview===slot.id;
        return <div key={slot.id}
          onClick={()=>setModal(slot)}
          style={{background:"#1a1a2a",border:"2px solid "+(generating[slot.id]?"#ADFF2F":slot.videoUrl?"rgba(173,255,47,0.3)":"#2a2a3a"),borderRadius:"10px",overflow:"hidden",marginBottom:"2px",cursor:"pointer",transition:"border .2s"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px"}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:generating[slot.id]?"#ADFF2F":slot.videoUrl?"#ADFF2F":"#555",flexShrink:0,...(generating[slot.id]?{animation:"pulse 1s infinite"}:{})}}/>
            <div style={{flex:1,fontSize:"13px",fontWeight:600,color:"#ffffff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0}}>{slot.script.title}</div>
            <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#888",flexShrink:0}}>{DAYS[slot.day]} {TIMES[slot.time]}</div>

        <button onClick={()=>setModal(null)} style={{position:"absolute",top:"14px",right:"14px",background:"#2a2a3a",border:"none",borderRadius:"50%",width:28,height:28,cursor:"pointer",color:"#888",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>

          {(()=>{const ct=CTYPES.find(c=>c.id===modal.contentType);return ct?<Tag color={ct.color}>{ct.label}</Tag>:null;})()}
          <span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#888"}}>{DAYS[modal.day]} {TIMES[modal.time]}</span>
          {modal.videoUrl&&!generating[modal.id]&&<span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginLeft:"auto"}}>● Video Ready</span>}
          {generating[modal.id]&&<span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginLeft:"auto"}}>● Generating...</span>}
        </div>
        <div style={{fontSize:"18px",fontWeight:800,color:"#ffffff",marginBottom:"8px",lineHeight:1.3}}>{modal.script&&modal.script.title}</div>
        {modal.script&&modal.script.hook&&<div style={{fontSize:"13px",color:"#ADFF2F",fontStyle:"italic",marginBottom:"14px",padding:"10px 12px",background:"rgba(173,255,47,0.05)",borderRadius:"8px",borderLeft:"3px solid rgba(173,255,47,0.4)"}}>"{modal.script.hook}"</div>}
        {modal.videoUrl&&!generating[modal.id]&&<video src={modal.videoUrl} controls autoPlay style={{width:"100%",borderRadius:"10px",background:"#000",maxHeight:"400px",marginBottom:"14px"}}/>}
        {generating[modal.id]&&<div style={{marginBottom:"14px",background:"#0A0A12",borderRadius:"10px",height:"180px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px"}}><Spinner size={24}/><div style={{fontFamily:"Space Mono",fontSize:"11px",color:"#ADFF2F"}}>Generating video...</div></div>}
        {!modal.videoUrl&&!generating[modal.id]&&<div style={{marginBottom:"14px",background:"#0A0A12",borderRadius:"10px",padding:"16px",textAlign:"center"}}><div style={{fontFamily:"Space Mono",fontSize:"11px",color:"#555",marginBottom:"12px"}}>Video not generated yet</div>{serverOnline&&<button onClick={e=>{e.stopPropagation();generateOne(modal);}} style={{background:"rgba(13,26,13,0.9)",border:"1px solid rgba(173,255,47,0.3)",color:"#ADFF2F",padding:"8px 20px",borderRadius:"8px",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:700,fontSize:"13px",cursor:"pointer"}}>Generate This Video</button>}</div>}
        {modal.script&&modal.script.script&&<div style={{marginBottom:"14px"}}><div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#555",marginBottom:"6px",letterSpacing:"0.1em"}}>SCRIPT</div><div style={{fontSize:"13px",color:"#ccc",lineHeight:1.8,background:"#0A0A12",borderRadius:"8px",padding:"12px"}}>{modal.script.script}</div></div>}
        {modal.script&&modal.script.ytCaption&&<div style={{marginBottom:"14px"}}><div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#555",marginBottom:"6px",letterSpacing:"0.1em"}}>CAPTION</div><div style={{fontSize:"12px",color:"#888",fontFamily:"Space Mono",background:"#0A0A12",borderRadius:"8px",padding:"10px"}}>{modal.script.ytCaption}</div></div>}
        {modal.videoUrl&&!generating[modal.id]&&serverOnline&&<button onClick={e=>{e.stopPropagation();generateOne(modal);}} style={{background:"#1a1a2a",border:"1px solid #2a2a3a",color:"#888",padding:"7px 16px",borderRadius:"8px",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:700,fontSize:"12px",cursor:"pointer"}}>↺ Regenerate Video</button>}
      </div>
    </div>}
  </div>;
}

// ── Stage 5: Schedule ─────────────────────────────────────────
function shuffleSlotSchedule(slots){
  const positions=slots.map(s=>({day:s.day,time:s.time}));
  for(let i=positions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[positions[i],positions[j]]=[positions[j],positions[i]];}
  const byTopic={};slots.forEach(s=>{(byTopic[s.topic]=byTopic[s.topic]||[]).push(s);});
  const topics=Object.keys(byTopic);const maxLen=Math.max(...topics.map(t=>byTopic[t].length));
  const ordered=[];
  for(let i=0;i<maxLen;i++)topics.forEach(t=>{if(byTopic[t][i])ordered.push(byTopic[t][i]);});
  return ordered.map((slot,i)=>({...slot,day:positions[i].day,time:positions[i].time}));
}

function ScheduleStage({week,updateWeek,prevWeeks}){
  const [comparison,setComparison]=useState(week.comparison||null);
  const [loadingComp,setLoadingComp]=useState(false);
  const [manifest,setManifest]=useState("");
  const [importErr,setImportErr]=useState("");
  const [importOk,setImportOk]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const slots=week.slots||[];
  const withVideo=slots.filter(s=>s.videoUrl);
  const scheduled=slots.filter(s=>s.scheduleStatus==="youtube_done");
  const prevWithAnalytics=prevWeeks.filter(w=>w.analytics);

  const loadComparison=async()=>{
    if(!prevWithAnalytics.length)return;
    setLoadingComp(true);
    const avg={avgViews:0,avgCTR:0,avgRetention:0,avgSubs:0};
    prevWithAnalytics.forEach(w=>{avg.avgViews+=w.analytics.views||0;avg.avgCTR+=w.analytics.ctr||0;avg.avgRetention+=w.analytics.avgRetention||0;avg.avgSubs+=w.analytics.subscribersGained||0;});
    const n=prevWithAnalytics.length;
    avg.avgViews=Math.round(avg.avgViews/n);avg.avgCTR=+(avg.avgCTR/n).toFixed(2);avg.avgRetention=+(avg.avgRetention/n).toFixed(1);avg.avgSubs=Math.round(avg.avgSubs/n);
    try{const c=await compareWeeks(week,avg);setComparison(c);updateWeek({comparison:c});}catch(e){console.error(e);}
    setLoadingComp(false);
  };

  const exportJobs=()=>{
    const getSlotDate=(slot)=>{
      if(slot.scheduleDate) return slot.scheduleDate;
      const now=new Date();const dayOffset=(slot.day-now.getDay()+7)%7||7;
      const d=new Date(now);d.setDate(d.getDate()+dayOffset);return d.toISOString().slice(0,10);
    };
    const jobs=slots.filter(s=>s.script).map(s=>({jobId:s.id,weekId:week.id,niche:week.niche,topic:s.topic,day:DAYS[s.day],time:s.scheduleTime||TIMES[s.time],scheduleDate:getSlotDate(s),contentType:s.contentType,voiceId:"en-US-ChristopherNeural",targetDuration:55,script:s.script?.script||"",hook:s.script?.hook||"",title:s.script?.title||"",ytCaption:s.script?.ytCaption||"",keywords:[s.topic],footage:(s.footage||[]).map(c=>({id:c.id,url:c.url,duration:c.duration}))}));
    const blob=new Blob([JSON.stringify(jobs,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="week"+week.number+"_jobs.json";a.click();URL.revokeObjectURL(url);
  };

  const doImport=()=>{
    setImportErr("");
    try{
      const m=JSON.parse(manifest);
      if(!Array.isArray(m))throw new Error();
      updateWeek({scheduled:true,scheduledAt:new Date().toISOString(),
        slots:slots.map(s=>{const e=m.find(x=>x.jobId===s.id);return e&&e.scheduleStatus==="youtube_done"?{...s,scheduleStatus:"youtube_done",bufferUpdateId:e.bufferUpdateId||""}:s;})
      });
      setImportOk(true);setShowImport(false);setManifest("");
    }catch{setImportErr("Invalid JSON — paste the full manifest.json content");}
  };

  return <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
    {prevWithAnalytics.length>0&&<div style={{background:"var(--bg3)",border:"1px solid rgba(0,207,255,0.15)",borderRadius:"10px",padding:"14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#00CFFF"}}>HOW WEEK {week.number} BEATS PREVIOUS WEEKS</div>
        {!comparison&&<Btn small variant="outline" onClick={loadComparison} disabled={loadingComp}>{loadingComp?<><Spinner size={12}/>Analysing...</>:"Run Comparison"}</Btn>}
      </div>
      {comparison?<div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
          <StatBox label="Confidence" value={comparison.confidence+"%"} accent="#ADFF2F"/>
          <StatBox label="CTR Change" value={comparison.predictedCTRChange||"—"} accent="#00CFFF"/>
          <StatBox label="Retention"  value={comparison.predictedRetentionChange||"—"} accent="#B06EF3"/>
        </div>
        <div style={{background:"rgba(173,255,47,0.05)",border:"1px solid rgba(173,255,47,0.2)",borderRadius:"8px",padding:"10px 12px"}}>
          <div style={{fontWeight:700,fontSize:"13px",color:"#ADFF2F",marginBottom:"6px"}}>{comparison.overallVerdict}</div>
          {comparison.hookImprovement&&<div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}><strong>Hooks:</strong> {comparison.hookImprovement}</div>}
          {comparison.topicStrength&&<div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}><strong>Topics:</strong> {comparison.topicStrength}</div>}
          {comparison.timingAdvantage&&<div style={{fontSize:"12px",color:"var(--text2)"}}><strong>Timing:</strong> {comparison.timingAdvantage}</div>}
        </div>
        {comparison.risks&&comparison.risks.length>0&&<div style={{fontSize:"11px",color:"#FF6B35",fontFamily:"Space Mono"}}>Risks: {comparison.risks.join(" · ")}</div>}
      </div>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Compare vs {prevWithAnalytics.length} previous week{prevWithAnalytics.length!==1?"s":""} to see prediction</div>}
    </div>}

    <div style={{background:"var(--card)",border:"1px solid "+(scheduled.length===21?"rgba(173,255,47,0.3)":"var(--border)"),borderRadius:"10px",padding:"14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"10px",marginBottom:"12px"}}>
        <div>
          <div style={{fontWeight:700,fontSize:"14px",marginBottom:"2px"}}>{scheduled.length===21?"✓ All 21 Videos Scheduled":"Schedule to YouTube"}</div>
          <div style={{fontSize:"12px",color:"var(--text3)"}}>{withVideo.length}/21 videos ready · {scheduled.length}/21 scheduled</div>
        </div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
          <Btn small variant="ghost" onClick={()=>updateWeek({slots:shuffleSlotSchedule(slots)})}>⇄ Shuffle</Btn>
          <Btn small variant="ghost" onClick={exportJobs}>↓ Export Jobs</Btn>
        </div>
      </div>
      {scheduled.length<21&&<div style={{background:"var(--bg3)",border:"1px solid rgba(173,255,47,0.15)",borderRadius:"8px",padding:"12px 14px",marginBottom:"12px"}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:"8px"}}>UPLOAD TO YOUTUBE — RUN IN TERMINAL</div>
        <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"#00CFFF",background:"var(--bg4)",borderRadius:"6px",padding:"8px 12px",marginBottom:"10px",userSelect:"all"}}>python video_pipeline.py --jobs week{week.number}_jobs.json --upload-only</div>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",lineHeight:2,marginBottom:"10px"}}>
          <div>Uploads all {withVideo.length} videos to Buffer sequentially</div>
          <div>Takes ~2-3 min total · no browser required · reliable</div>
          <div>When done → paste manifest.json below to sync status</div>
        </div>
        <Btn small variant="outline" onClick={()=>setShowImport(!showImport)}>{importOk?"✓ Synced":"Import manifest.json"}</Btn>
      </div>}
      {scheduled.length===21&&<div style={{display:"flex",alignItems:"center",gap:"8px",padding:"10px 14px",background:"rgba(13,26,13,0.5)",borderRadius:"8px"}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite"}}/>
        <span style={{fontFamily:"Space Mono",fontSize:"11px",color:"#ADFF2F"}}>LIVE ON YOUTUBE · Publishing 3×/day via Buffer</span>
      </div>}
    </div>

    {showImport&&<div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px"}}>
      <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",marginBottom:"8px"}}>PASTE output_videos/manifest.json CONTENTS</div>
      <textarea value={manifest} onChange={e=>setManifest(e.target.value)} rows={5}
        placeholder='[{"jobId":"abc","scheduleStatus":"youtube_done"},...]'
        style={{width:"100%",padding:"10px",fontSize:"11px",fontFamily:"Space Mono",lineHeight:1.6,marginBottom:"10px",borderRadius:"8px"}}/>
      {importErr&&<div style={{fontSize:"12px",color:"#FF2D6B",marginBottom:"8px"}}>{importErr}</div>}
      <div style={{display:"flex",gap:"8px"}}>
        <Btn small onClick={doImport}>Sync Status</Btn>
        <Btn small variant="ghost" onClick={()=>{setShowImport(false);setManifest("");setImportErr("");}}>Cancel</Btn>
      </div>
    </div>}

    {/* Slot list with inline date + time pickers */}
    <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
      {DAYS.map((day,di)=>{
        const daySlots=slots.filter(s=>s.day===di);
        if(!daySlots.length) return null;
        return <div key={day}>
          <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",padding:"8px 0 4px",letterSpacing:"0.1em"}}>{day.toUpperCase()}</div>
          {daySlots.map(slot=>{
            const ct=CTYPES.find(c=>c.id===slot.contentType);
            const done=slot.scheduleStatus==="youtube_done";
            const getDefaultDate=()=>{
              const now=new Date();
              const ahead=(slot.day-now.getDay()+7)%7||7;
              const d=new Date(now);d.setDate(d.getDate()+ahead);
              return d.toISOString().slice(0,10);
            };
            const slotDate=slot.scheduleDate||getDefaultDate();
            const slotTime=slot.scheduleTime||TIMES[slot.time];
            const upd=(f,v)=>updateWeek({slots:slots.map(s=>s.id===slot.id?{...s,[f]:v}:s)});

            return <div key={slot.id} style={{background:done?"rgba(13,26,13,0.4)":"var(--card2)",border:"1px solid "+(done?"rgba(173,255,47,0.2)":"var(--border)"),borderRadius:"10px",padding:"10px 12px",marginBottom:"3px"}}>
              {/* Row 1: dot + title + type tag */}
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:done?"0":"8px"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:done?"#ADFF2F":slot.videoUrl?"#FF6B35":"var(--border2)",flexShrink:0}}/>
                <div style={{flex:1,fontSize:"13px",fontWeight:700,color:done?"#ADFF2F":"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{slot.script?slot.script.title:(slot.topic||"Untitled")}</div>
                {ct&&<Tag color={done?"rgba(173,255,47,0.5)":ct.color}>{ct.label}</Tag>}
                {done&&<span style={{fontFamily:"Space Mono",fontSize:"9px",color:"#ADFF2F",flexShrink:0}}>✓ Scheduled</span>}
              </div>
              {/* Row 2: date + time pickers (only if not done) */}
              {!done&&<div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",marginBottom:"3px"}}>DATE</div>
                  <div style={{position:"relative"}}>
                    <input type="date" value={slotDate}
                      onClick={e=>e.target.showPicker&&e.target.showPicker()}
                      onChange={e=>upd("scheduleDate",e.target.value)}
                      style={{width:"100%",fontFamily:"Space Mono",fontSize:"12px",padding:"6px 8px",borderRadius:"7px",border:"1px solid var(--input-border)",background:"var(--input-bg)",color:"var(--text)",cursor:"pointer",WebkitAppearance:"none",colorScheme:"dark"}}/>
                    <span onClick={e=>{const inp=e.currentTarget.previousSibling;inp.showPicker&&inp.showPicker();}} style={{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",fontSize:"14px",cursor:"pointer",pointerEvents:"all"}}>📅</span>
                  </div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",marginBottom:"3px"}}>TIME</div>
                  <input type="time"
                    value={(()=>{
                      // Convert "7:00 AM" / "13:00" to HH:MM for input[type=time]
                      if(!slotTime) return "07:00";
                      if(slotTime.includes("AM")||slotTime.includes("PM")){
                        const [t,m]=slotTime.split(" ");
                        let [h,min]=t.split(":");
                        h=parseInt(h);
                        if(m==="PM"&&h!==12) h+=12;
                        if(m==="AM"&&h===12) h=0;
                        return String(h).padStart(2,"0")+":"+min;
                      }
                      return slotTime.slice(0,5);
                    })()}
                    onChange={e=>{
                      // Store as HH:MM (24h) for pipeline compatibility
                      upd("scheduleTime", e.target.value);
                    }}
                    style={{width:"100%",fontFamily:"Space Mono",fontSize:"12px",padding:"6px 8px",borderRadius:"7px",border:"1px solid var(--input-border)",background:"var(--input-bg)",color:"var(--text)"}}/>
                </div>
                <div style={{flexShrink:0,paddingTop:"16px"}}>
                  <div style={{fontFamily:"Space Mono",fontSize:"9px",color:slot.videoUrl?"#FF6B35":"var(--text4)"}}>{slot.videoUrl?"READY":"NO VID"}</div>
                </div>
              </div>}
            </div>;
          })}
        </div>;
      })}
    </div>

    {/* Export + Schedule CTA */}
    {slots.some(s=>s.scheduleStatus!=="youtube_done"&&s.videoUrl)&&<div style={{background:"rgba(13,26,13,0.5)",border:"1px solid rgba(173,255,47,0.3)",borderRadius:"12px",padding:"14px 16px",marginTop:"8px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px",flexWrap:"wrap"}}>
      <div>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:"3px"}}>READY TO SCHEDULE</div>
        <div style={{fontSize:"12px",color:"var(--text3)"}}>Set your dates and times above, then export</div>
      </div>
      <Btn onClick={exportJobs}>↓ Export Jobs →</Btn>
    </div>}
  </div>;
}


// ── Stage 6: Analytics ────────────────────────────────────────
function AnalyticsStage({week,updateWeek,ytToken,connectYT,allWeeks}){
  const [loading,setLoading]=useState(false);
  const [insight,setInsight]=useState(null);
  const a=week.analytics;
  const prevWeeks=allWeeks.filter(w=>w.number<week.number&&w.analytics);
  const loadAnalytics=async()=>{
    if(!ytToken){connectYT();return;}
    if(!week.scheduledAt){alert("Schedule videos first before loading analytics");return;}
    setLoading(true);
    try{
      const end=new Date().toISOString().slice(0,10);
      const start=new Date(week.scheduledAt).toISOString().slice(0,10);
      const d=await fetchYTAnalytics(ytToken,start,end);
      if(d.rows&&d.rows.length>0){
        const rows=d.rows;const headers=(d.columnHeaders||[]).map(h=>h.name);
        const get=(row,name)=>row[headers.indexOf(name)]||0;
        const analytics={views:rows.reduce((s,r)=>s+get(r,"views"),0),watchMinutes:rows.reduce((s,r)=>s+get(r,"estimatedMinutesWatched"),0),avgRetention:+(rows.reduce((s,r)=>s+get(r,"averageViewPercentage"),0)/rows.length).toFixed(1),subscribersGained:rows.reduce((s,r)=>s+get(r,"subscribersGained"),0),estimatedRevenue:+rows.reduce((s,r)=>s+get(r,"estimatedRevenue"),0).toFixed(2),ctr:+(rows.reduce((s,r)=>s+get(r,"impressionClickThroughRate"),0)/rows.length*100).toFixed(2),topVideo:{id:rows[0]&&rows[0][0],views:rows[0]&&get(rows[0],"views")},fetchedAt:new Date().toISOString()};
        updateWeek({analytics});
        const ins=await generateWeekInsight(analytics,week.niche,prevWeeks);
        setInsight(ins);updateWeek({analytics,evolvedPrompt:ins.evolvedPrompt||week.evolvedPrompt});
      }
    }catch(e){console.error(e);}
    setLoading(false);
  };
  const calcDelta=(current,field)=>{if(!prevWeeks.length||!current)return null;const avg=prevWeeks.reduce((s,w)=>s+(w.analytics[field]||0),0)/prevWeeks.length;const diff=((current-avg)/avg*100).toFixed(1);return(diff>0?"+":"")+diff+"%";};
  return <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text3)"}}>{a?"Last fetched: "+new Date(a.fetchedAt).toLocaleDateString():"No data yet"}</div>
      <Btn small onClick={loadAnalytics} disabled={loading}>{loading?<><Spinner size={12}/>Loading...</>:ytToken?"Refresh Analytics":"Connect YouTube →"}</Btn>
    </div>
    {!a&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"8px",padding:"12px",fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)",lineHeight:1.8}}>
      Analytics appear here after your videos go live on YouTube.<br/>Connect your YouTube account and click "Refresh Analytics".
    </div>}
    {a&&<div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
        <StatBox label="Views"      value={a.views?.toLocaleString()||"—"}  accent="#ADFF2F" delta={calcDelta(a.views,"views")}/>
        <StatBox label="CTR"        value={(a.ctr||0)+"%"}                   accent="#00CFFF" delta={calcDelta(a.ctr,"ctr")}/>
        <StatBox label="Retention"  value={(a.avgRetention||0)+"%"}          accent="#B06EF3" delta={calcDelta(a.avgRetention,"avgRetention")}/>
        <StatBox label="New Subs"   value={"+"+(a.subscribersGained||0)}     accent="#FF9F43" delta={calcDelta(a.subscribersGained,"subscribersGained")}/>
        <StatBox label="Watch Hrs"  value={Math.round((a.watchMinutes||0)/60)} accent="#FF6B35"/>
        <StatBox label="Revenue"    value={"$"+(a.estimatedRevenue||0)}      accent="#ADFF2F" sub={a.estimatedRevenue>0?"monetized":"pre-YPP"}/>
      </div>
      {prevWeeks.length>0&&<div style={{background:"var(--bg3)",border:"1px solid rgba(0,207,255,0.1)",borderRadius:"10px",padding:"12px"}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#00CFFF",marginBottom:"8px"}}>COMPARED TO PREVIOUS {prevWeeks.length} WEEK{prevWeeks.length>1?"S":""} AVERAGE</div>

            </div>;

        </div>
      </div>}

}

// ── Week Workspace ────────────────────────────────────────────
function WeekWorkspace({week,updateWeek,settings,ytToken,connectYT,serverOnline,onCheckServer,allWeeks}){
  const prevWeeks=allWeeks.filter(w=>w.number<week.number);
  const slots=week.slots||[];
  const scriptsDone=slots.filter(s=>s.script).length;
  const footageDone=slots.filter(s=>s.footage&&s.footage.length>0).length;
  const videosDone=slots.filter(s=>s.videoUrl).length;
  const scheduled=slots.filter(s=>s.scheduleStatus==="youtube_done").length;
  const stageStatus=(stage)=>{
    if(stage==="plan")    return week.locked?"done":week.niche?"active":"active";
    if(stage==="scripts") return !week.locked?"pending":scriptsDone===21?"done":scriptsDone>0?"active":"active";
    if(stage==="footage") return scriptsDone===0?"pending":footageDone===21?"done":footageDone>0?"active":"active";
    if(stage==="video")   return footageDone===0?"pending":videosDone===21?"done":videosDone>0?"active":"active";
    if(stage==="schedule")return videosDone===0?"pending":scheduled===21?"done":"active";
    if(stage==="analytics")return !week.scheduled?"pending":week.analytics?"done":"active";
    return "pending";
  };
  const initExpanded=()=>{
    if(!week.locked) return "plan";
    if(scriptsDone<21) return "scripts";
    if(footageDone<21) return "footage";
    if(videosDone<21)  return "video";
    if(scheduled<21)   return "schedule";
    return "analytics";
  };
  const [expanded,setExpanded]=useState(initExpanded());
  const toggle=id=>setExpanded(expanded===id?null:id);
  return <div className="fade-up" style={{display:"flex",flexDirection:"column"}}>
    {/* Week header */}
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"12px",padding:"14px 16px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"12px",flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",marginBottom:"3px"}}>WEEK {week.number}</div>
        <div style={{fontWeight:800,fontSize:"16px",color:week.niche?"var(--text)":"var(--text4)",letterSpacing:"-0.01em"}}>{week.niche||"Not planned yet"}</div>
        {week.topics&&week.topics.length>0&&<div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginTop:"5px"}}>{week.topics.map((t,i)=><Tag key={i} color="#00CFFF">{t.slice(0,24)}</Tag>)}</div>}
      </div>
      <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
        <Tag color={scriptsDone===21?"#ADFF2F":"var(--text4)"}>{scriptsDone}/21 scripts</Tag>
        <Tag color={videosDone>0?"#B06EF3":"var(--text4)"}>{videosDone}/21 videos</Tag>
        <Tag color={scheduled===21?"#ADFF2F":scheduled>0?"#FF6B35":"var(--text4)"}>{scheduled}/21 on YT</Tag>
      </div>
    </div>
    {/* Stage accordions */}
    <StageCard number={1} title="Plan Week" status={stageStatus("plan")} expanded={expanded==="plan"} onToggle={()=>toggle("plan")}>
      <PlanStage week={week} updateWeek={updateWeek}/>
    </StageCard>
    <StageCard number={2} title="Generate Scripts" status={stageStatus("scripts")} expanded={expanded==="scripts"} onToggle={()=>week.locked&&toggle("scripts")}>
      {week.locked?<ScriptsStage week={week} updateWeek={updateWeek}/>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Lock the week plan first.</div>}
    </StageCard>
    <StageCard number={3} title="Get Pexels Footage" status={stageStatus("footage")} expanded={expanded==="footage"} onToggle={()=>scriptsDone>0&&toggle("footage")}>
      {scriptsDone>0?<FootageStage week={week} updateWeek={updateWeek} pexelsKey={settings.pexelsKey}/>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Generate scripts first.</div>}
    </StageCard>
    <StageCard number={4} title="Generate Videos + Preview" status={stageStatus("video")} expanded={expanded==="video"} onToggle={()=>footageDone>0&&toggle("video")}>
      {footageDone>0||videosDone>0?<VideoStage week={week} updateWeek={updateWeek} serverOnline={serverOnline} onCheckServer={onCheckServer}/>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Get footage first.</div>}
    </StageCard>
    <StageCard number={5} title="Review + Schedule" status={stageStatus("schedule")} expanded={expanded==="schedule"} onToggle={()=>videosDone>0&&toggle("schedule")}>
      {videosDone>0?<ScheduleStage week={week} updateWeek={updateWeek} prevWeeks={prevWeeks}/>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Generate videos first.</div>}
    </StageCard>
    <StageCard number={6} title="YouTube Analytics" status={stageStatus("analytics")} expanded={expanded==="analytics"} onToggle={()=>week.scheduled&&toggle("analytics")}>
      {week.scheduled?<AnalyticsStage week={week} updateWeek={updateWeek} ytToken={ytToken} connectYT={connectYT} allWeeks={allWeeks}/>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Schedule videos first. Analytics appear after your content goes live.</div>}
    </StageCard>
  </div>;
}

// ── Football Tab ──────────────────────────────────────────────
function FootballTab({settings}){
  const [mode,setMode]=useState("evergreen");
  const [cat,setCat]=useState("");
  const [topic,setTopic]=useState("");
  const [custom,setCustom]=useState("");
  const [style,setStyle]=useState("shocking facts");
  const [ctx,setCtx]=useState("");
  const [openStage,setOpenStage]=useState(1);
  const [scriptStatus,setScriptStatus]=useState("idle");
  const [script,setScript]=useState(null);
  const [visualStatus,setVisualStatus]=useState("idle");
  const [visuals,setVisuals]=useState([]);
  const [videoStatus,setVideoStatus]=useState("idle");
  const [slot,setSlot]=useState(null);
  const [matchStatus,setMatchStatus]=useState("idle");
  const [matches,setMatches]=useState([]);
  const [upsets,setUpsets]=useState([]);
  const [liveMatches,setLiveMatches]=useState([]); // currently LIVE matches
  const [reactiveStatus,setReactiveStatus]=useState({}); // {matchId: "idle|generating|uploading|done|err"}
  const [modal,setModal]=useState(false);

  // Poll for live matches every 3 minutes while tab is open
  React.useEffect(()=>{
    if(!settings.footballDataKey) return;
    doMatches(); // initial load
    const interval = setInterval(()=>{
      const key = settings.footballDataKey||"";
      const url = SERVER+"/football/matches"+(key?`?key=${encodeURIComponent(key)}`:"");
      fetch(url)
        .then(r=>r.json())
        .then(d=>{
          const live = d.live||(d.matches||[]).filter(m=>m.status==="LIVE");
          setLiveMatches(live);
          setMatches(d.matches||[]);
          setUpsets(d.upsets||[]);
        })
        .catch(()=>{});
    }, 3*60*1000); // 3 min
    return ()=>clearInterval(interval);
  },[settings.footballDataKey]);
  // Batch mode state
  const [batchMode,setBatchMode]=useState(false);
  const [batchCount,setBatchCount]=useState(10);
  const [batchStatus,setBatchStatus]=useState("idle"); // idle|angles|generating|done|err
  const [batchAngles,setBatchAngles]=useState([]);
  const [batchSlots,setBatchSlots]=useState([]);
  const [batchProgress,setBatchProgress]=useState(0);
  const [batchModal,setBatchModal]=useState(null); // slot index for preview

  const activeTopic = custom.trim() ? custom.trim() : topic;
  const dalleReady = settings.visualSource === "dalle3" && settings.openaiKey && settings.openaiKey.length > 10;
  const visualSource = settings.visualSource || "pexels";

  const tog = (n) => setOpenStage(s => s===n ? 0 : n);

  const FbHdr = ({n,label,done})=>(
    <div className="fb-stage-hdr" onClick={()=>tog(n)}>
      <div className={`fb-stage-num ${done?"done":""}`}>{done?"✓":n}</div>
      <div style={{flex:1,fontWeight:700,fontSize:"14px"}}>{label}</div>
      <div style={{color:"var(--text4)",fontSize:"12px"}}>{openStage===n?"▲":"▼"}</div>
    </div>
  );

  const Banner = ({st,msgs})=>{
    if(!st||st==="idle") return null;
    const cls = st==="loading"?"info":st==="done"?"ok":"err";
    return <div className={`fb-banner ${cls}`}>
      {st==="loading"&&<Spinner size={12}/>}
      {st==="loading"?msgs[0]:st==="done"?msgs[1]:msgs[2]}
    </div>;
  };

  async function doScript(){
    if(!activeTopic) return;
    setScriptStatus("loading"); setScript(null);
    try{
      const r=await fetch(SERVER+"/football/script",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({topic:activeTopic,content_style:style,mode,match_context:ctx,visual_source:visualSource})});
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      setScript(d); setScriptStatus("done"); setOpenStage(2);
    }catch(e){setScriptStatus("err");}
  }

  async function doVisuals(){
    if(!script) return;
    setVisualStatus("loading"); setVisuals([]);
    try{
      const r=await fetch(SERVER+"/football/visuals",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({script,visual_source:visualSource,pexels_api_key:settings.pexelsKey,openai_api_key:settings.openaiKey})});
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      setVisuals(d.visuals||[]); setVisualStatus("done"); setOpenStage(3);
    }catch(e){setVisualStatus("err");}
  }

  async function doAssemble(){
    if(!visuals.length) return;
    setVideoStatus("loading");
    try{
      const r=await fetch(SERVER+"/football/assemble",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({script,visuals,mode})});
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      setSlot(d); setVideoStatus("done"); setOpenStage(4);
    }catch(e){setVideoStatus("err");}
  }

  async function doSchedule(){
    if(!slot||!slot.has_video) return;
    try{
      const r=await fetch(SERVER+"/football/schedule",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({slot})});
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      setSlot(s=>({...s,scheduled:true,publish_at:d.publish_at}));
    }catch(e){console.error("Schedule failed",e);}
  }

  async function doMatches(){
    setMatchStatus("loading");
    try{
      const key = settings.footballDataKey||"";
      const url = SERVER+"/football/matches"+(key?`?key=${encodeURIComponent(key)}`:"");
      const r=await fetch(url);
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      setMatches(d.matches||[]); setUpsets(d.upsets||[]);
      setLiveMatches(d.live||[]);
      setMatchStatus("done");
    }catch(e){setMatchStatus("err");}
  }

  function triggerFromUpset(u){
    setCustom(u.team1+" vs "+u.team2+" — Shock "+u.score+" Result");
    setCtx(u.team1+" beat "+u.team2+" "+u.score+" in "+u.round+". "+u.upset_reason);
    setMode("reactive"); setOpenStage(1);
    window.scrollTo({top:0,behavior:"smooth"});
  }

  // ── Immediate reactive post ───────────────────────────────
  const [reactiveCount,setReactiveCount]=useState({}); // {matchId: 1|2|3}
  const [reactiveProgress,setReactiveProgress]=useState({}); // {matchId: {current,total,step}}

  // Angles + styles for multi-video reactive — each must be genuinely different
  const REACTIVE_ANGLES = [
    {angle:"Full match reaction — what just happened and why it matters",        style:"cliffhanger"},
    {angle:"Tactical breakdown — how did this result happen, what went wrong",   style:"documentary-lite"},
    {angle:"Emotional angle — the human story behind this result",               style:"storytime"},
  ];

  async function doReactiveImmediate(match, countOverride){
    const matchId = match.match_id||match.team1+match.team2;
    const count = countOverride || reactiveCount[matchId] || 1;

    setReactiveStatus(s=>({...s,[matchId]:"generating"}));
    setReactiveProgress(s=>({...s,[matchId]:{current:0,total:count,step:""}}));

    const goalText = (match.goals||[]).map(g=>`${g.scorer} ${g.minute}'`).join(", ");
    const context  = `${match.team1} vs ${match.team2}, score: ${match.score}, `+
      `${match.status==="LIVE"?"currently live, minute "+match.minute:"full time"}`+
      `${goalText?", goals: "+goalText:""}. Round: ${match.round}.`;

    const usedAngles = [];

    try{
      for(let i=0; i<count; i++){
        const prog = (step)=>setReactiveProgress(s=>({...s,[matchId]:{current:i+1,total:count,step}}));

        // Pick angle + style — different for each video
        const angleObj = REACTIVE_ANGLES[i % REACTIVE_ANGLES.length];
        const avoidText = usedAngles.length>0
          ? ` Do NOT repeat these angles already used: ${usedAngles.join("; ")}.`
          : "";

        const topic = count===1
          ? (match.status==="LIVE"
              ? `${match.team1} vs ${match.team2} — Live Update`
              : `${match.team1} ${match.score} ${match.team2}`)
          : `${match.team1} vs ${match.team2} — ${angleObj.angle.split("—")[0].trim()}`;

        // 1. Script
        prog("Writing script…");
        const sr = await fetch(SERVER+"/football/script",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            topic,
            content_style: angleObj.style,
            mode:"reactive",
            match_context: context + avoidText +
              ` Angle for this video: ${angleObj.angle}.`,
            visual_source: visualSource,
          })
        });
        if(!sr.ok) throw new Error("Script failed "+sr.status);
        const script = await sr.json();
        usedAngles.push(angleObj.angle);

        // 2. Visuals
        prog("Fetching visuals…");
        const vr = await fetch(SERVER+"/football/visuals",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            script, visual_source:visualSource,
            pexels_api_key:settings.pexelsKey,
            openai_api_key:settings.openaiKey,
          })
        });
        if(!vr.ok) throw new Error("Visuals failed "+vr.status);
        const vd = await vr.json();

        // 3. Assemble
        prog("Assembling… (~60s)");
        const ar = await fetch(SERVER+"/football/assemble",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({script, visuals:vd.visuals||[], mode:"reactive"})
        });
        if(!ar.ok) throw new Error("Assembly failed "+ar.status);
        const slot = await ar.json();
        if(!slot.has_video) throw new Error("Video not created");

        // 4. Upload NOW
        prog("Uploading to YouTube…");
        const ur = await fetch(SERVER+"/football/upload-now",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({slot, title:topic})
        });
        if(!ur.ok) throw new Error("Upload failed "+ur.status);
        const ud = await ur.json();
        console.log(`Reactive video ${i+1}/${count} posted:`, ud.youtube_url);
      }

      setReactiveStatus(s=>({...s,[matchId]:"done"}));
      setReactiveProgress(s=>({...s,[matchId]:{current:count,total:count,step:"All posted!"}}));

    }catch(e){
      console.error("Reactive immediate failed:", e);
      setReactiveStatus(s=>({...s,[matchId]:"err"}));
      setReactiveProgress(s=>({...s,[matchId]:{...s[matchId],step:e.message}}));
    }
  }

  const [playerSpotlightStatus,setPlayerSpotlightStatus]=useState({}); // {scorerKey: status}

  async function doPlayerSpotlight(goal, match){
    const key = goal.scorer+"_"+match.match_id;
    setPlayerSpotlightStatus(s=>({...s,[key]:"generating"}));
    try{
      const r=await fetch(SERVER+"/football/player-spotlight",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          scorer:goal.scorer, team:goal.team||match.team1,
          nation:goal.team||"", match_context:`${match.team1} vs ${match.team2}, ${match.score}, ${match.round}`,
          visual_source:visualSource, pexels_api_key:settings.pexelsKey, openai_api_key:settings.openaiKey,
          post_now:true,
        })
      });
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      if(d.has_video){
        setPlayerSpotlightStatus(s=>({...s,[key]:"uploading"}));
        // Auto post now
        const ur=await fetch(SERVER+"/football/upload-now",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({slot:d, title:d.topic})
        });
        setPlayerSpotlightStatus(s=>({...s,[key]:ur.ok?"done":"err"}));
      } else {
        setPlayerSpotlightStatus(s=>({...s,[key]:"err"}));
      }
    }catch(e){
      setPlayerSpotlightStatus(s=>({...s,[key]:"err"}));
    }
  }

    generating:"Writing script…",
    visuals:"Fetching visuals…",
    assembling:"Assembling video… (~60s)",
    uploading:"Uploading to YouTube…",
    done:"✓ Posted live!",

  async function doBatchAngles(){

  async function doBatchGenerate(){

    setBatchStatus("generating"); setBatchSlots([]); setBatchProgress(0);
    try{
      const r=await fetch(SERVER+"/football/batch-generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        topic:activeTopic,

        mode,

        visual_source:visualSource,
        pexels_api_key:settings.pexelsKey,
        openai_api_key:settings.openaiKey,
        auto_schedule:true,

      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      setBatchSlots(d.results||[]);
      setBatchProgress(d.successful||0);
      setBatchStatus("done");
      setOpenStage(4);
    }catch(e){setBatchStatus("err");}
  }

  async function doAddMore(extraCount){
    if(!activeTopic) return;
    setBatchStatus("angles");
    try{
      const r=await fetch(SERVER+"/football/batch-angles",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({topic:activeTopic,content_style:style,count:extraCount})});
      if(!r.ok) throw new Error(r.status);
      const d=await r.json();
      const newAngles=d.angles||[];
      setBatchAngles(prev=>[...prev,...newAngles]);
      setBatchStatus("generating");
      const r2=await fetch(SERVER+"/football/batch-generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        topic:activeTopic,content_style:style,mode,angles:newAngles,
        visual_source:visualSource,pexels_api_key:settings.pexelsKey,openai_api_key:settings.openaiKey,auto_schedule:true,
      })});
      if(!r2.ok) throw new Error(r2.status);
      const d2=await r2.json();
      setBatchSlots(prev=>[...prev,...(d2.results||[])]);
      setBatchProgress(prev=>prev+(d2.successful||0));
      setBatchStatus("done");
    }catch(e){setBatchStatus("err");}
  }

    {/* ── LIVE MATCH ALERT BANNER ── */}
    {liveMatches.map((m,i)=>{

        {rs!=="idle"&&rs!=="done"&&rs!=="err"&&<div style={{
