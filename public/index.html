function makeSlots(types) {
  const t = types.length ? types : ["engaging"];
  const s = [];
  let ti = 0;
  for (let d = 0; d < 7; d++)
    for (let x = 0; x < 3; x++)
      s.push({
        id: uid(), day: d, time: x,
        contentType: t[ti++ % t.length],
        status: "pending", script: null,
        keywords: [], footage: [],
        youtubeId: null, scheduleStatus: "unscheduled", igScheduled: false,
      });
  return s;
}

// ── Supabase helpers ───────────────────────────────────────────
async function sbLoad(url, key, ch) {
  if (!url || !key || !ch) return null;
  try {
    const r = await fetch(
      url + "/rest/v1/r00m_data?channel_key=eq." + encodeURIComponent(ch) + "&select=*",
      {headers: {apikey: key, Authorization: "Bearer " + key}}
    );
    const d = await r.json();
    return Array.isArray(d) && d[0] ? d[0] : null;
  } catch { return null; }
}

async function sbSave(url, key, ch, payload) {
  if (!url || !key || !ch) return;
  try {
    await fetch(url + "/rest/v1/r00m_data", {
      method: "POST",
      headers: {
        apikey: key,
        Authorization: "Bearer " + key,
        "Content-Type": "application/json",
        Prefer: "resolution=merge-duplicates",
      },
      body: JSON.stringify({
        channel_key: ch,
        weeks: payload.weeks,
        insight: payload.insight,
        settings: payload.settings,
        updated_at: new Date().toISOString(),
      }),
    });
  } catch {}
}

// ── Claude API ─────────────────────────────────────────────────
async function claudeCall(messages, opts) {
  const tools = opts && opts.tools;
  const maxTokens = (opts && opts.maxTokens) || 1000;
  const body = {model:"claude-sonnet-4-20250514", max_tokens:maxTokens, messages};
  if (tools) body.tools = tools;
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body),
  });
  if (!r.ok) throw new Error("Claude " + r.status);
  return r.json();
}

function getText(d) {
  return (d.content || []).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("") || "";
}

function tryJSON(t) {
  try { return JSON.parse(t.replace(/```json|```/g,"").trim()); }
  catch { return null; }
}

async function fetchTrending(niche) {
  const d = await claudeCall(
    [{role:"user", content:"Search for 8 trending topics RIGHT NOW for faceless YouTube Shorts in the \"" + niche + "\" niche. Use YouTube trending, Google Trends, Reddit. Return ONLY a JSON array:\n[{\"topic\":\"full topic\",\"heat\":95,\"source\":\"YouTube\"},...]"}],
    {tools:[{type:"web_search_20250305", name:"web_search"}], maxTokens:900}
  );
  return tryJSON(getText(d)) || [];
}

async function genScripts(topic, types, evolved) {
  const d = await claudeCall(
    [{role:"user", content:"Write " + types.length + " short-form faceless YouTube Shorts scripts.\nTopic: \"" + topic + "\"\nTypes: " + types.map(function(t,i){return (i+1)+"="+t;}).join(", ") + "\n" + (evolved ? "Style guidance: " + evolved : "") + "\n\nRules: max 60 words, punchy sentences, strong hook first 8 sec, voiceover-ready.\n\nReturn ONLY valid JSON array:\n[{\"title\":\"video title\",\"type\":\"content type\",\"script\":\"full script\",\"hook\":\"opening line only\",\"ytCaption\":\"YouTube caption with 3 hashtags\"}]"}],
    {maxTokens:2000}
  );
  return tryJSON(getText(d)) || [];
}

async function extractKW(script) {
  const d = await claudeCall(
    [{role:"user", content:"Extract 5 Pexels stock video search keywords from this script. Short, specific, searchable. Return ONLY a JSON array:\n[\"kw1\",\"kw2\",...]\n\nScript: \"" + script + "\""}],
    {maxTokens:150}
  );
  return tryJSON(getText(d)) || [];
}

async function weeklyInsight(data, niche, prev) {
  const d = await claudeCall(
    [{role:"user", content:"You are the intelligence engine for a faceless YouTube channel. Analyse this week.\n\nNiche: " + niche + "\nAnalytics: " + JSON.stringify(data) + "\nPrevious prompt: " + (prev || "none") + "\n\nReturn ONLY valid JSON:\n{\"summary\":\"2-3 sentence analysis\",\"topFormat\":\"best content type\",\"recommendation\":\"specific next week action\",\"evolvedPrompt\":\"improved script instructions\",\"nextNiches\":[\"top pick\",\"second\",\"third\"],\"adjustments\":[\"adj1\",\"adj2\",\"adj3\",\"adj4\"]}"}],
    {maxTokens:900}
  );
  return tryJSON(getText(d)) || {};
}

async function pexelsSearch(kw, key) {
  if (!key) return [];
  try {
    const r = await fetch(
      "https://api.pexels.com/videos/search?query=" + encodeURIComponent(kw) + "&per_page=4&orientation=portrait",
      {headers:{Authorization:key}}
    );
    const d = await r.json();
    return (d.videos || []).map(function(v) {
      return {
        id: v.id,
        preview: v.image,
        url: (v.video_files && v.video_files.find(function(f){return f.quality==="sd";})) ? v.video_files.find(function(f){return f.quality==="sd";}).link : (v.video_files && v.video_files[0] ? v.video_files[0].link : ""),
        duration: v.duration,
      };
    });
  } catch { return []; }
}

// ── Shared UI ──────────────────────────────────────────────────
function Tag(props) {
  var color = props.color || "#ADFF2F";
  return React.createElement("span", {style:{fontFamily:"Space Mono",fontSize:"10px",color:color,background:color+"18",border:"1px solid "+color+"44",padding:"3px 9px",borderRadius:"20px",letterSpacing:"0.05em"}}, props.children);
}
function Spinner(props) {
  var size = props.size || 14;
  return React.createElement("span", {style:{display:"inline-block",width:size,height:size,border:"2px solid #ADFF2F",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite",flexShrink:0}});
}
function SL(props) {
  return React.createElement("div", {style:{fontFamily:"Space Mono",fontSize:"10px",color:props.color||"#555",letterSpacing:"0.1em",marginBottom:"12px"}}, props.children);
}
function Card(props) {
  return React.createElement("div", {style:{background:"#111118",border:"1px solid "+(props.accent||"#1E1E2E"),borderRadius:"12px",padding:"18px",...(props.style||{})}}, props.children);
}
function StatBox(props) {
  var accent = props.accent || "#ADFF2F";
  return React.createElement("div", {style:{flex:1,minWidth:"90px",background:"#111118",border:"1px solid #1E1E2E",borderRadius:"10px",padding:"12px 14px"}},
    React.createElement("div", {style:{fontFamily:"Space Mono",fontSize:"20px",fontWeight:700,color:accent,lineHeight:1}}, props.value),
    React.createElement("div", {style:{fontSize:"11px",color:"#888",fontWeight:600,marginTop:"5px"}}, props.label),
    props.sub ? React.createElement("div", {style:{fontFamily:"Space Mono",fontSize:"10px",color:"#444",marginTop:"2px"}}, props.sub) : null
  );
}
function Btn(props) {
  var variant = props.variant || "primary";
  var look = {
    primary: {background:props.disabled?"#1c1c28":"#ADFF2F", color:props.disabled?"#444":"#08080E", border:"none"},
    outline:  {background:"transparent", color:"#ADFF2F", border:"1px solid #ADFF2F55"},
    danger:   {background:"transparent", color:"#FF2D6B", border:"1px solid #FF2D6B44"},
    ghost:    {background:"#111118",     color:"#888",    border:"1px solid #1E1E2E"},
    green:    {background:"#0D1A0D",     color:"#ADFF2F", border:"1px solid #ADFF2F44"},
  }[variant] || {};
  return React.createElement("button", {
    onClick:props.onClick, disabled:props.disabled,
    style:{...look,fontFamily:"Syne",fontWeight:700,fontSize:props.small?"12px":"14px",padding:props.small?"7px 14px":"11px 22px",borderRadius:"8px",cursor:props.disabled?"not-allowed":"pointer",transition:"all .15s",width:props.full?"100%":undefined,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:"6px"},
  }, props.children);
}

function ZoneCard(props) {
  var done = props.frozen && props.status !== "live";
  var cfgMap = {
    live:      {label:"LIVE",  bg:"#0A1A0A", border:"#ADFF2F", dot:"#ADFF2F", pulse:true},
    draft:     {label:"DRAFT", bg:"#1A1200", border:"#FF6B35", dot:"#FF6B35", pulse:false},
    intention: {label:"OPEN",  bg:"#111118", border:"#1E1E2E", dot:"#333",    pulse:false},
    done:      {label:"DONE",  bg:"#0d0d0d", border:"#1a1a1a", dot:"#222",    pulse:false},
  };
  var cfg = cfgMap[done ? "done" : props.status] || cfgMap.intention;
  return (
    <div onClick={!done && props.status !== "live" ? props.onClick : undefined}
      style={{background:cfg.bg, border:"1px solid "+(props.selected?"#ADFF2F":cfg.border), borderRadius:"12px", padding:"12px", minHeight:"84px", cursor:done||props.status==="live"?"default":"pointer", opacity:done?0.4:1, transition:"all .2s", outline:props.selected?"2px solid #ADFF2F22":"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
        <span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#444"}}>WK {props.week}</span>
        <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:cfg.dot,...(cfg.pulse?{animation:"pulse 2s infinite"}:{})}}/>
          <span style={{fontFamily:"Space Mono",fontSize:"9px",color:cfg.dot}}>{cfg.label}</span>
        </div>
      </div>
      <div style={{fontWeight:700,fontSize:"13px",color:done?"#333":"#E8E8F0",marginBottom:"5px",lineHeight:1.3}}>{props.niche||"Plan this week"}</div>
      {props.score!=null && <div style={{fontFamily:"Space Mono",fontSize:"14px",color:"#ADFF2F"}}>{props.score}<span style={{fontSize:"10px",color:"#555"}}>/100</span></div>}
      {props.status==="intention"&&!done && <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"#333",marginTop:"3px"}}>tap to plan</div>}
    </div>
  );
}

// ── Command Center ─────────────────────────────────────────────
function CommandCenter({weeks, onNavigate, instagramEnabled}) {
  const live  = weeks.find(w => w.status === "live");
  const draft = weeks.find(w => w.status === "draft" && w.slots && w.slots.length > 0);
  const open  = weeks.find(w => w.status === "intention");
  const pending   = draft ? draft.slots.filter(s => s.status === "pending").length : 0;
  const scheduled = draft ? draft.slots.filter(s => s.scheduleStatus === "youtube_done").length : 0;

  const nextAction = !live && !draft
    ? {msg:"Start here: Planner → pick a niche → lock Week 1", tab:"planner"}
    : !draft
      ? {msg:"Planner → lock Week " + (open ? open.id : 2), tab:"planner"}
      : pending > 0
        ? {msg:"Content Engine → generate " + pending + " scripts for Week " + draft.id, tab:"engine"}
        : scheduled < 21
          ? {msg:"Content Engine → run pipeline → upload " + (21 - scheduled) + " remaining", tab:"engine"}
          : {msg:"All done. Check back Sunday for analytics.", tab:null};

  const steps = [
    {s:live?"done":"pending", t:"Week 1", text:live?"Week "+live.id+" live — "+live.niche:"Lock Week 1 in Planner to begin"},
    {s:draft?"done":live?"active":"pending", t:"Next", text:draft?"Week "+draft.id+" drafted — "+draft.niche:"Lock next week in Planner"},
    {s:pending===0&&draft?"done":"pending", t:"Scripts", text:"Scripts: "+(draft?(21-pending)+"/21":"0/21")},
    {s:scheduled>0?"done":"pending", t:"YouTube", text:"YouTube scheduled: "+scheduled+"/21"},
    {s:"pending", t:"Sunday", text:"Analytics in → engine evolves → next niche recommended"},
  ];

  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite"}}/>
          <span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",letterSpacing:"0.08em"}}>ENGINE READY</span>
        </div>
        <h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Command Center</h2>
        <p style={{color:"#555",fontSize:"13px",marginTop:"3px"}}>
          {live ? "Week "+live.id+" live — "+live.niche : draft ? "Week "+draft.id+" in draft — "+draft.niche : "No weeks planned yet — start in Planner"}
        </p>
      </div>

      <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
        <StatBox label="Live Score"    value={live ? (live.score || "—") : "—"} sub="live week"/>
        <StatBox label="Scripts Done"  value={(21-pending)+"/21"} sub={"wk "+(draft?draft.id:"—")} accent="#FF6B35"/>
        <StatBox label="YT Scheduled"  value={scheduled+"/21"} sub="this draft" accent="#00CFFF"/>
        <StatBox label="Weeks Open"    value={weeks.filter(w=>w.status==="intention").length} sub="to plan" accent="#B06EF3"/>
      </div>

      <div>
        <SL>ROLLING RUNWAY</SL>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}}>
          {weeks.map(w => (
            <ZoneCard key={w.id} week={w.id} niche={w.niche} status={w.status} score={w.score} frozen={w.frozen}
              onClick={() => onNavigate(w.status==="intention" ? "planner" : "engine")}/>
          ))}
        </div>
      </div>

      {!live && !draft && (
        <div style={{background:"#0A1A0A",border:"1px solid #ADFF2F33",borderRadius:"12px",padding:"16px"}}>
          <SL color="#ADFF2F">HOW TO START</SL>
          {["1. Go to Planner → enter your niche (e.g. Personal Finance, AI Tools)",
            "2. Search for trending topics → pick one",
            "3. Select content type mix → Lock Week 1",
            "4. Go to Content Engine → generate all 21 scripts",
            "5. Export jobs → run Python pipeline → upload to YouTube"
          ].map((s,i) => <div key={i} style={{fontSize:"13px",color:"#888",marginBottom:"4px"}}>{s}</div>)}
        </div>
      )}

      <Card>
        <SL>PIPELINE STATUS</SL>
        {steps.map((step, i) => {
          const dc = step.s==="done" ? "#ADFF2F" : step.s==="active" ? "#FF6B35" : "#2a2a3a";
          return (
            <div key={i} style={{display:"flex",gap:"12px",alignItems:"flex-start",marginBottom:"10px"}}>
              <div style={{width:18,height:18,borderRadius:"50%",flexShrink:0,marginTop:"2px",display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid "+dc,background:dc+"18",fontSize:"9px",color:dc,...(step.s==="active"?{animation:"pulse 2s infinite"}:{})}}>
                {step.s==="done" ? "✓" : step.s==="active" ? "◉" : "○"}
              </div>
              <div style={{flex:1,fontSize:"13px",color:step.s==="pending"?"#444":"#CCC"}}>{step.text}</div>
              <span style={{fontFamily:"Space Mono",fontSize:"9px",color:"#333",flexShrink:0}}>{step.t}</span>
            </div>
          );
        })}
      </Card>

      <div style={{background:"#0D1A0D",border:"1px solid #ADFF2F33",borderRadius:"12px",padding:"14px 16px"}}>
        <SL color="#ADFF2F">YOUR NEXT ACTION</SL>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px",flexWrap:"wrap"}}>
          <p style={{fontSize:"14px",color:"#CCC",flex:1}}>{nextAction.msg}</p>
          {nextAction.tab && <Btn small variant="green" onClick={() => onNavigate(nextAction.tab)}>Go</Btn>}
        </div>
      </div>
    </div>
  );
}

// ── Weekly Planner ─────────────────────────────────────────────
function WeeklyPlanner({weeks, setWeeks, lastInsight}) {
  const firstOpen = weeks.find(x => x.status === "intention");
  const [selWeek,  setSelWeek]  = useState(firstOpen ? firstOpen.id : 1);
  const [niche,    setNiche]    = useState("");
  const [trending, setTrending] = useState([]);
  const [loading,  setLoading]  = useState(false);
  const [trendErr, setTrendErr] = useState("");
  const [selTopic, setSelTopic] = useState(null);
  const [custom,   setCustom]   = useState("");
  const [selTypes, setSelTypes] = useState(["cliffhanger","explanatory"]);
  const [usedRec,  setUsedRec]  = useState(false);

  const week = weeks.find(w => w.id === selWeek);
  const activeTopic = selTopic ? selTopic.topic : custom;
  const hasRecs = lastInsight && lastInsight.nextNiches && lastInsight.nextNiches.length > 0;

  const applyRec = (n) => { setCustom(n); setSelTopic(null); setNiche(n); setUsedRec(true); };

  const doSearch = async () => {
    if (!niche.trim()) { setTrendErr("Enter a niche first"); return; }
    setTrendErr(""); setLoading(true); setTrending([]);
    try {
      const t = await fetchTrending(niche.trim());
      setTrending(t.length ? t : [{topic:"No results — try a broader term", heat:0, source:"—"}]);
    } catch { setTrendErr("Search failed — check connection"); }
    setLoading(false);
  };

  const toggleType = (id) => setSelTypes(p => p.includes(id) ? p.filter(t => t !== id) : [...p, id]);

  const lockWeek = () => {
    if (!activeTopic || !selTypes.length) return;
    const isFirst = weeks.filter(x => x.status === "live").length === 0;
    setWeeks(prev => prev.map(w => w.id === selWeek ? {
      ...w,
      status: isFirst ? "live" : "draft",
      frozen: isFirst,
      niche: niche.trim() || activeTopic.slice(0, 22),
      topic: activeTopic,
      contentTypes: selTypes,
      slots: makeSlots(selTypes),
    } : w));
    setSelTopic(null); setCustom(""); setNiche(""); setTrending([]); setUsedRec(false);
  };

  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
      <div>
        <h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Weekly Planner</h2>
        <p style={{color:"#555",fontSize:"13px",marginTop:"3px"}}>One niche · One week · 21 videos · Rolling runway</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}}>
        {weeks.map(w => (
          <ZoneCard key={w.id} week={w.id} niche={w.niche} status={w.status} score={w.score} frozen={w.frozen}
            selected={selWeek === w.id} onClick={() => setSelWeek(w.id)}/>
        ))}
      </div>

      {week && (week.status === "live" || week.status === "draft") && !week.frozen && (
        <Card accent="#FF6B3544">
          <SL color="#FF6B35">WEEK {selWeek} LOCKED — {week.slots ? week.slots.length : 0} SLOTS READY</SL>
          <p style={{fontSize:"13px",color:"#888",marginBottom:"10px"}}>Go to <strong style={{color:"#ADFF2F"}}>Content Engine</strong> to generate scripts.</p>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
            <Tag color="#FF6B35">{week.niche}</Tag>
            <Tag color="#00CFFF">{(week.topic||"").slice(0,32)}</Tag>
          </div>
        </Card>
      )}

      {week && week.frozen && (
        <Card accent="#ADFF2F33">
          <SL color="#ADFF2F">WEEK {selWeek} — LIVE AND PUBLISHING</SL>
          <p style={{fontSize:"13px",color:"#888",lineHeight:1.75}}>Publishing automatically 3x/day. Analytics from this week feed the engine for future recommendations.</p>
        </Card>
      )}

      {week && week.status === "intention" && (
        <Card style={{display:"flex",flexDirection:"column",gap:"18px"}}>
          <div style={{fontWeight:700,fontSize:"16px"}}>
            Planning Week {selWeek}{weeks.filter(x=>x.status==="live").length===0 ? " — This becomes your live Week 1" : ""}
          </div>

          {hasRecs && (
            <div style={{background:"#070712",border:"1px solid #00CFFF22",borderRadius:"12px",padding:"14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#00CFFF14",border:"1px solid #00CFFF44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",color:"#00CFFF"}}>◈</div>
                <SL color="#00CFFF">ENGINE RECOMMENDS — FROM YOUR ANALYTICS</SL>
              </div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"8px"}}>
                {lastInsight.nextNiches.map((n,i) => (
                  <button key={i} onClick={() => applyRec(n)}
                    style={{background:usedRec&&custom===n?"#0D1A0D":"#0A0A12",border:"1px solid "+(usedRec&&custom===n?"#ADFF2F":i===0?"#FF6B3566":"#1A1A2A"),color:i===0?"#FF6B35":"#888",padding:"7px 14px",borderRadius:"8px",fontFamily:"Syne",fontWeight:i===0?700:400,fontSize:"13px",cursor:"pointer"}}>
                    {i===0 && "★ "}{n}
                  </button>
                ))}
              </div>
              {usedRec && custom && (
                <div style={{background:"#0D1A0D",border:"1px solid #ADFF2F33",borderRadius:"8px",padding:"8px 12px",fontSize:"13px"}}>
                  Applied: <strong style={{color:"#ADFF2F"}}>{custom}</strong>
                </div>
              )}
            </div>
          )}

          {!hasRecs && (
            <div style={{background:"#0A0A12",border:"1px solid #1A1A2A",borderRadius:"10px",padding:"12px"}}>
              <p style={{fontFamily:"Space Mono",fontSize:"11px",color:"#444",lineHeight:1.7}}>Engine recommendations appear here after your first analytics run. Enter your niche manually below.</p>
            </div>
          )}

          <div>
            <SL>STEP 1 — NICHE</SL>
            <input value={niche} onChange={e => { setNiche(e.target.value); setUsedRec(false); }}
              placeholder="e.g. Personal Finance, AI Tools, True Crime..."
              style={{width:"100%",background:"#0A0A12",border:"1px solid #1E1E2E",borderRadius:"8px",padding:"10px 14px",color:"#E8E8F0",fontSize:"13px"}}/>
          </div>

          <div>
            <SL>STEP 2 — TRENDING TOPIC</SL>
            <div style={{marginBottom:"10px"}}>
              <Btn variant="outline" small onClick={doSearch}>
                {loading ? <><Spinner size={12}/>Searching...</> : "Search Trending Now"}
              </Btn>
            </div>
            {trendErr && <div style={{fontSize:"12px",color:"#FF2D6B",marginBottom:"8px"}}>{trendErr}</div>}
            {trending.length > 0 && (
              <div style={{display:"flex",flexDirection:"column",gap:"5px",marginBottom:"10px"}}>
                {trending.map((t,i) => (
                  <div key={i} onClick={() => { setSelTopic(t); setCustom(""); setUsedRec(false); }}
                    style={{display:"flex",alignItems:"center",gap:"10px",padding:"9px 12px",borderRadius:"8px",cursor:"pointer",background:selTopic&&selTopic.topic===t.topic?"#0D1A0D":"#0A0A12",border:"1px solid "+(selTopic&&selTopic.topic===t.topic?"#ADFF2F":"#1A1A2A"),transition:"all .15s"}}>
                    <div style={{fontFamily:"Space Mono",fontSize:"12px",fontWeight:700,width:26,flexShrink:0,color:t.heat>92?"#FF2D6B":t.heat>87?"#FF6B35":"#ADFF2F"}}>{t.heat}</div>
                    <div style={{flex:1,fontSize:"13px"}}>{t.topic}</div>
                    <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"#444"}}>{t.source||t.src}</div>
                  </div>
                ))}
              </div>
            )}
            <input value={custom} onChange={e => { setCustom(e.target.value); setSelTopic(null); setUsedRec(false); }}
              placeholder="Or type a specific topic..."
              style={{width:"100%",background:"#0A0A12",border:"1px solid #1E1E2E",borderRadius:"8px",padding:"10px 14px",color:"#E8E8F0",fontSize:"13px"}}/>
            {activeTopic && (
              <div style={{marginTop:"8px",background:"#0D1A0D",border:"1px solid #ADFF2F33",borderRadius:"8px",padding:"8px 12px",fontSize:"13px"}}>
                Selected: <strong style={{color:"#ADFF2F"}}>{activeTopic}</strong>
              </div>
            )}
          </div>

          <div>
            <SL>STEP 3 — CONTENT TYPE MIX</SL>
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"8px"}}>
              {CTYPES.map(ct => (
                <button key={ct.id} onClick={() => toggleType(ct.id)}
                  style={{background:selTypes.includes(ct.id)?ct.color+"22":"#0A0A12",border:"1px solid "+(selTypes.includes(ct.id)?ct.color:"#1E1E2E"),color:selTypes.includes(ct.id)?ct.color:"#555",padding:"6px 12px",borderRadius:"20px",fontFamily:"Syne",fontWeight:700,fontSize:"12px",cursor:"pointer",transition:"all .15s"}}>
                  {ct.label}
                </button>
              ))}
            </div>
            <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#444"}}>
              21 videos · {selTypes.length} type{selTypes.length!==1?"s":""} · ~{Math.ceil(21/Math.max(selTypes.length,1))} each
            </div>
          </div>

          <Btn onClick={lockWeek} disabled={!activeTopic || !selTypes.length}>
            Lock Week {selWeek} and Start
          </Btn>
        </Card>
      )}
    </div>
  );
}

// ── Content Engine ─────────────────────────────────────────────
function ContentEngine({weeks, setWeeks, settings, onNavigate}) {
  const workable = weeks.filter(w => w.slots && w.slots.length > 0 && (w.status==="draft"||w.status==="live"));
  const lastWorkable = workable[workable.length - 1];
  const [activeId,     setActiveId]     = useState(lastWorkable ? lastWorkable.id : null);
  const [generating,   setGenerating]   = useState(false);
  const [genProgress,  setGenProgress]  = useState(0);
  const [genTotal,     setGenTotal]     = useState(0);
  const [expanded,     setExpanded]     = useState(null);
  const [extractingId, setExtractingId] = useState(null);
  const [footageId,    setFootageId]    = useState(null);
  const [exported,     setExported]     = useState(false);
  const [showImport,   setShowImport]   = useState(false);
  const [manifest,     setManifest]     = useState("");
  const [importErr,    setImportErr]    = useState("");
  const [importOk,     setImportOk]     = useState(false);

  const activeWeek = weeks.find(w => w.id === activeId) || workable[0];

  const updateSlot = (wid, sid, up) => {
    setWeeks(prev => prev.map(w => w.id === wid ? {
      ...w,
      slots: w.slots.map(s => s.id === sid ? {...s, ...up} : s),
    } : w));
  };

  const generateAll = async () => {
    if (!activeWeek || !activeWeek.slots) return;
    const pending = activeWeek.slots.filter(s => s.status === "pending");
    if (!pending.length) return;
    setGenerating(true); setGenTotal(pending.length); setGenProgress(0);
    for (let i = 0; i < pending.length; i += 3) {
      const batch = pending.slice(i, i + 3);
      try {
        const scripts = await genScripts(activeWeek.topic || "trending topic", batch.map(s => s.contentType), activeWeek.evolvedPrompt);
        batch.forEach((slot, j) => {
          if (scripts[j]) updateSlot(activeWeek.id, slot.id, {script:scripts[j], status:"script_ready"});
        });
      } catch(e) { console.error(e); }
      setGenProgress(Math.min(i + 3, pending.length));
    }
    setGenerating(false);
  };

  const doExtract = async (slot) => {
    setExtractingId(slot.id);
    try {
      const k = await extractKW(slot.script.script);
      updateSlot(activeWeek.id, slot.id, {keywords:k, status:"keywords_extracted"});
    } catch {}
    setExtractingId(null);
  };

  const doFootage = async (slot) => {
    setFootageId(slot.id);
    const clips = settings.pexelsKey
      ? await pexelsSearch(slot.keywords[0], settings.pexelsKey)
      : [{id:"mock", preview:null, url:"#", duration:10}];
    updateSlot(activeWeek.id, slot.id, {footage:clips, status:"footage_found"});
    setFootageId(null);
  };

  const doExport = () => {
    if (!activeWeek) return;
    const jobs = activeWeek.slots.map(s => ({
      jobId: s.id, weekId: activeWeek.id, niche: activeWeek.niche, topic: activeWeek.topic,
      day: DAYS[s.day], time: TIMES[s.time], contentType: s.contentType,
      voiceId: settings.voiceId, targetDuration: settings.targetDuration,
      script: s.script ? s.script.script : "",
      hook: s.script ? s.script.hook : "",
      title: s.script ? s.script.title : "",
      ytCaption: s.script ? s.script.ytCaption : "",
      keywords: s.keywords,
      footage: s.footage.map(c => ({id:c.id, url:c.url, duration:c.duration})),
      instagramEnabled: settings.instagramEnabled || false,
      bufferKey: settings.bufferKey || "",
      bufferInstagramProfileId: settings.bufferInstagramProfileId || "",
    }));
    const blob = new Blob([JSON.stringify(jobs, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "week" + activeWeek.id + "_jobs.json"; a.click();
    URL.revokeObjectURL(url); setExported(true);
  };

  const doImport = () => {
    setImportErr(""); setImportOk(false);
    try {
      const m = JSON.parse(manifest);
      if (!Array.isArray(m)) throw new Error();
      setWeeks(prev => prev.map(w => {
        if (w.id !== activeWeek.id) return w;
        return {...w, slots: w.slots.map(s => {
          const e = m.find(x => x.jobId === s.id);
          return e ? {...s, youtubeId:e.youtubeId||s.youtubeId, scheduleStatus:e.scheduleStatus||s.scheduleStatus, igScheduled:e.igScheduled||s.igScheduled} : s;
        })};
      }));
      setImportOk(true); setShowImport(false); setManifest("");
    } catch { setImportErr("Invalid JSON — paste the manifest.json from the pipeline"); }
  };

  if (!workable.length) {
    return (
      <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
        <h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Content Engine</h2>
        <Card>
          <SL>NO WEEKS LOCKED YET</SL>
          <p style={{fontSize:"13px",color:"#555",lineHeight:1.75,marginBottom:"14px"}}>
            Go to <strong style={{color:"#ADFF2F"}}>Planner</strong>, enter a niche, pick a topic, and lock a week first.
          </p>
          <Btn small variant="green" onClick={() => onNavigate("planner")}>Go to Planner</Btn>
        </Card>
      </div>
    );
  }

  const slots       = activeWeek ? activeWeek.slots : [];
  const pendingCt   = slots.filter(s => s.status === "pending").length;
  const readyCt     = slots.filter(s => s.status !== "pending").length;
  const footageCt   = slots.filter(s => s.status === "footage_found").length;
  const scheduledCt = slots.filter(s => s.scheduleStatus === "youtube_done").length;
  const pendingSch  = 21 - scheduledCt;
  const SC  = {pending:"#2a2a3a", script_ready:"#FF6B35", keywords_extracted:"#00CFFF", footage_found:"#B06EF3"};
  const SLM = {pending:"PENDING", script_ready:"SCRIPT",  keywords_extracted:"KW",      footage_found:"FOOTAGE"};

  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"10px"}}>
        <div>
          <h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Content Engine</h2>
          <p style={{color:"#555",fontSize:"13px",marginTop:"3px"}}>Generate · Assemble · Schedule to YouTube</p>
        </div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
          {generating
            ? <div style={{display:"flex",alignItems:"center",gap:"8px",background:"#111118",border:"1px solid #1E1E2E",borderRadius:"8px",padding:"9px 14px"}}><Spinner/><span style={{fontFamily:"Space Mono",fontSize:"12px",color:"#ADFF2F"}}>{genProgress}/{genTotal}</span></div>
            : <Btn onClick={generateAll} disabled={!pendingCt}>{pendingCt ? "Generate "+pendingCt+" Scripts" : "All Scripts Done"}</Btn>
          }
          {footageCt > 0 && <Btn variant="ghost" small onClick={doExport}>{exported ? "Exported" : "Export Jobs"}</Btn>}
        </div>
      </div>

      {workable.length > 1 && (
        <div style={{display:"flex",gap:"4px",background:"#111118",border:"1px solid #1A1A2A",padding:"4px",borderRadius:"10px",alignSelf:"flex-start"}}>
          {workable.map(w => (
            <button key={w.id} onClick={() => { setActiveId(w.id); setExpanded(null); setExported(false); setImportOk(false); }}
              style={{background:activeId===w.id?"#ADFF2F":"transparent",color:activeId===w.id?"#08080E":"#555",border:"none",padding:"6px 12px",borderRadius:"7px",fontFamily:"Syne",fontWeight:700,fontSize:"12px",cursor:"pointer"}}>
              Week {w.id}
            </button>
          ))}
        </div>
      )}

      {activeWeek && (
        <div style={{background:"#0A0A12",border:"1px solid #1A1A2A",borderRadius:"10px",padding:"10px 14px",display:"flex",gap:"10px",flexWrap:"wrap",alignItems:"center"}}>
          <Tag color="#FF6B35">Week {activeWeek.id}</Tag>
          <Tag color="#B06EF3">{activeWeek.niche}</Tag>
          <span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#555",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{activeWeek.topic}</span>
        </div>
      )}

      <div style={{background:"#070712",border:"1px solid #ADFF2F22",borderRadius:"12px",padding:"18px"}}>
        <SL color="#ADFF2F">SCHEDULING — YOUTUBE</SL>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"16px"}}>
          <StatBox label="Scripts"   value={readyCt+"/21"}   sub="generated"  accent="#FF6B35"/>
          <StatBox label="Footage"   value={footageCt+"/21"} sub="matched"    accent="#B06EF3"/>
          <StatBox label="Scheduled" value={scheduledCt+"/21"} sub="on YouTube" accent="#ADFF2F"/>
          <StatBox label="Pending"   value={pendingSch} sub="to upload" accent={pendingSch>0?"#FF2D6B":"#ADFF2F"}/>
        </div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center",marginBottom:"12px"}}>
          <Btn variant={pendingSch>0?"primary":"ghost"} disabled={!exported} onClick={() => setShowImport(true)}>
            {scheduledCt===0 ? "Schedule All" : pendingSch>0 ? "Schedule Pending ("+pendingSch+")" : "All Scheduled"}
          </Btn>
          {importOk && <Tag color="#ADFF2F">Synced</Tag>}
        </div>
        {exported && scheduledCt === 0 && (
          <div style={{background:"#0A0A12",border:"1px solid #1A1A2A",borderRadius:"8px",padding:"12px 14px"}}>
            <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:"6px"}}>RUN PIPELINE</div>
            <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#555",lineHeight:1.9}}>
              <div>Windows: <span style={{color:"#00CFFF"}}>python video_pipeline.py --jobs week{activeWeek ? activeWeek.id : ""}_jobs.json --upload</span></div>
              <div>Android: Google Colab — upload file — run — download manifest.json</div>
            </div>
          </div>
        )}
        {!exported && <p style={{fontFamily:"Space Mono",fontSize:"10px",color:"#444"}}>Generate scripts and match footage first, then export.</p>}
        {showImport && (
          <div style={{marginTop:"12px",background:"#0A0A12",border:"1px solid #ADFF2F33",borderRadius:"10px",padding:"14px"}}>
            <SL color="#ADFF2F">PASTE manifest.json FROM PIPELINE</SL>
            <textarea value={manifest} onChange={e => setManifest(e.target.value)} rows={4}
              placeholder='[{"jobId":"abc","scheduleStatus":"youtube_done","youtubeId":"xxxxx"},...]'
              style={{width:"100%",background:"#111",border:"1px solid #1E1E2E",borderRadius:"8px",padding:"10px",color:"#E8E8F0",fontSize:"12px",fontFamily:"Space Mono",lineHeight:1.6}}/>
            {importErr && <div style={{fontSize:"12px",color:"#FF2D6B",marginTop:"6px"}}>{importErr}</div>}
            <div style={{display:"flex",gap:"8px",marginTop:"10px"}}>
              <Btn small onClick={doImport}>Import and Sync</Btn>
              <Btn small variant="ghost" onClick={() => { setShowImport(false); setManifest(""); setImportErr(""); }}>Cancel</Btn>
            </div>
          </div>
        )}
      </div>

      {readyCt > 0 && (
        <div style={{background:"#1A1A2A",borderRadius:"4px",height:"4px"}}>
          <div style={{width:((readyCt/21)*100)+"%",height:"100%",background:"#ADFF2F",borderRadius:"4px",transition:"width .5s"}}/>
        </div>
      )}

      {DAYS.map((day, dayIdx) => {
        const daySlots = slots.filter(s => s.day === dayIdx);
        const dayReady = daySlots.filter(s => s.status !== "pending").length;
        const daySched = daySlots.filter(s => s.scheduleStatus === "youtube_done").length;
        return (
          <div key={day}>
            <SL>{day.toUpperCase()} — {dayReady}/3 scripts · {daySched}/3 on YouTube</SL>
            <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
              {daySlots.map(slot => {
                const ct = CTYPES.find(t => t.id === slot.contentType);
                return (
                  <div key={slot.id} style={{background:"#0A0A12",border:"1px solid "+(expanded===slot.id?"#ADFF2F33":"#1A1A2A"),borderRadius:"10px",overflow:"hidden"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",cursor:"pointer"}} onClick={() => setExpanded(expanded===slot.id ? null : slot.id)}>
                      <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#555",width:"50px",flexShrink:0}}>{TIMES[slot.time]}</div>
                      <div style={{width:6,height:6,borderRadius:"50%",background:SC[slot.status]||"#2a2a3a",flexShrink:0}}/>
                      <div style={{flex:1,fontSize:"13px",fontWeight:slot.script?600:400,color:slot.script?"#E8E8F0":"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {slot.script ? slot.script.title : "Waiting..."}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:"5px",flexShrink:0}}>
                        {slot.scheduleStatus==="youtube_done" && <span style={{fontFamily:"Space Mono",fontSize:"9px",color:"#ADFF2F"}}>YT</span>}
                        {ct && <span style={{fontSize:"11px",color:ct.color,fontWeight:700}}>{ct.label}</span>}
                        <span style={{fontFamily:"Space Mono",fontSize:"9px",color:SC[slot.status]||"#333"}}>{SLM[slot.status]}</span>
                      </div>
                    </div>
                    {expanded === slot.id && slot.script && (
                      <div style={{padding:"0 12px 12px",borderTop:"1px solid #1A1A2A"}}>
                        <div style={{background:"#0d0d12",borderRadius:"8px",padding:"12px",margin:"10px 0"}}>
                          <div style={{fontSize:"10px",color:"#555",fontWeight:700,marginBottom:"4px"}}>HOOK</div>
                          <div style={{fontSize:"13px",color:"#ADFF2F",fontStyle:"italic",marginBottom:"10px"}}>"{slot.script.hook}"</div>
                          <div style={{fontSize:"10px",color:"#555",fontWeight:700,marginBottom:"4px"}}>SCRIPT</div>
                          <div style={{fontSize:"13px",color:"#CCC",lineHeight:1.7}}>{slot.script.script}</div>
                        </div>
                        {slot.keywords && slot.keywords.length > 0 && (
                          <div style={{marginBottom:"10px"}}>
                            <div style={{fontSize:"10px",color:"#555",fontWeight:700,marginBottom:"6px"}}>KEYWORDS</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                              {slot.keywords.map((k,i) => <Tag key={i} color="#B06EF3">{k}</Tag>)}
                            </div>
                          </div>
                        )}
                        {slot.footage && slot.footage.length > 0 && (
                          <div style={{marginBottom:"10px"}}>
                            <div style={{fontSize:"10px",color:"#555",fontWeight:700,marginBottom:"6px"}}>CLIPS</div>
                            <div style={{display:"flex",gap:"5px"}}>
                              {slot.footage.slice(0,4).map((c,i) => (
                                <div key={i} style={{width:60,height:42,background:"#1a1a2a",borderRadius:"4px",overflow:"hidden",border:"1px solid #2a2a3a"}}>
                                  {c.preview ? <img src={c.preview} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"#444",fontSize:"9px"}}>clip</div>}
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                        {slot.youtubeId && (
                          <div style={{background:"#0A1A0A",border:"1px solid #ADFF2F33",borderRadius:"6px",padding:"7px 10px",fontSize:"11px",fontFamily:"Space Mono",color:"#ADFF2F",marginBottom:"8px"}}>
                            youtube.com/watch?v={slot.youtubeId}
                          </div>
                        )}
                        <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                          {slot.status==="script_ready" && (
                            <Btn small onClick={() => doExtract(slot)} disabled={extractingId===slot.id}>
                              {extractingId===slot.id ? <><Spinner size={12}/>Extracting...</> : "Extract Keywords"}
                            </Btn>
                          )}
                          {slot.status==="keywords_extracted" && (
                            <Btn small onClick={() => doFootage(slot)} disabled={footageId===slot.id}>
                              {footageId===slot.id ? <><Spinner size={12}/>Searching...</> : "Find Footage"}
                            </Btn>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Analytics Brain ────────────────────────────────────────────
function AnalyticsBrain({weeks, setWeeks, lastInsight, setLastInsight}) {
  const [rawData, setRawData] = useState(JSON.stringify(MOCK_ANALYTICS, null, 2));
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState("");
  const liveWeek = weeks.find(w => w.status === "live");

  const run = async () => {
    setLoading(true); setError("");
    try {
      const p = JSON.parse(rawData);
      const r = await weeklyInsight(p, liveWeek ? liveWeek.niche : "General", liveWeek ? liveWeek.evolvedPrompt : "");
      setLastInsight(r);
      if (r.evolvedPrompt && liveWeek)
        setWeeks(prev => prev.map(w => w.id===liveWeek.id ? {...w, evolvedPrompt:r.evolvedPrompt} : w));
    } catch { setError("Paste valid JSON analytics data."); }
    setLoading(false);
  };

  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
      <div>
        <h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Analytics Brain</h2>
        <p style={{color:"#555",fontSize:"13px",marginTop:"3px"}}>Paste YouTube data → Claude analyses → Engine evolves</p>
      </div>

      {lastInsight && (
        <div style={{background:"#0D1A0D",border:"1px solid #ADFF2F33",borderRadius:"10px",padding:"12px 14px"}}>
          <SL color="#ADFF2F">RECOMMENDATIONS SAVED — LIVE IN PLANNER</SL>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
            {lastInsight.nextNiches && lastInsight.nextNiches.map((n,i) => <Tag key={i} color={i===0?"#FF6B35":"#555"}>{i===0?"★ ":""}{n}</Tag>)}
          </div>
        </div>

      <Card>
        <SL>PASTE YOUTUBE ANALYTICS JSON (sample pre-loaded)</SL>

        {error && <div style={{fontSize:"12px",color:"#FF2D6B",marginTop:"6px"}}>{error}</div>}
        <div style={{marginTop:"12px"}}>
          <Btn onClick={run} disabled={loading}>{loading ? <><Spinner/>Analysing...</> : "Run Weekly Analysis"}</Btn>
        </div>
      </Card>

      {lastInsight && (
        <>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
            <StatBox label="Top Format" value={lastInsight.topFormat||"—"} sub="this week" accent="#FF6B35"/>
            <StatBox label="CTR"        value={MOCK_ANALYTICS.ctr+"%"}     sub="avg"       accent="#00CFFF"/>
            <StatBox label="Duration"   value={MOCK_ANALYTICS.duration+"%"} sub="avg"      accent="#B06EF3"/>
            <StatBox label="New Subs"   value={"+"+MOCK_ANALYTICS.newSubs}  sub="this week" accent="#ADFF2F"/>
          </div>
          <div style={{background:"#070712",border:"1px solid #00CFFF22",borderRadius:"12px",padding:"18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:"#00CFFF14",border:"1px solid #00CFFF44",display:"flex",alignItems:"center",justifyContent:"center",color:"#00CFFF",fontSize:"12px"}}>◈</div>
              <SL color="#00CFFF">CLAUDE INTELLIGENCE DEBRIEF</SL>
            </div>
            <p style={{fontSize:"13px",color:"#BBB",lineHeight:1.75,marginBottom:"12px"}}>{lastInsight.summary}</p>
            <div style={{background:"#0A0A18",borderRadius:"8px",padding:"10px 12px",borderLeft:"3px solid #00CFFF44"}}>
              <div style={{fontSize:"10px",color:"#00CFFF55",fontWeight:700,marginBottom:"4px"}}>RECOMMENDATION</div>
              <p style={{fontSize:"13px",color:"#CCC",lineHeight:1.6}}>{lastInsight.recommendation}</p>
            </div>
          </div>
          {lastInsight.adjustments && lastInsight.adjustments.length > 0 && (
            <Card>
              <SL>ENGINE AUTO-ADJUSTMENTS</SL>
              {lastInsight.adjustments.map((a,i) => (
                <div key={i} style={{display:"flex",gap:"10px",marginBottom:"9px"}}>
                  <div style={{color:"#ADFF2F",flexShrink:0}}>→</div>
                  <div style={{fontSize:"13px",color:"#CCC"}}>{a}</div>
                </div>
              ))}
            </Card>
          )}
          {lastInsight.evolvedPrompt && (
            <div style={{background:"#0A1A0A",border:"1px solid #ADFF2F22",borderRadius:"12px",padding:"16px"}}>
              <SL color="#ADFF2F">EVOLVED SCRIPT PROMPT — SAVED</SL>
              <p style={{fontSize:"11px",color:"#888",lineHeight:1.75,fontFamily:"Space Mono"}}>{lastInsight.evolvedPrompt}</p>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── Setup ──────────────────────────────────────────────────────
function Setup({settings, setSettings, onReset, syncStatus}) {
  const [local, setLocal] = useState({...settings});
  const [flash, setFlash] = useState(false);

  const set = (k, v) => {
    const updated = {...local, [k]: v};
    setLocal(updated);
    setSettings(updated);
    setFlash(true);
    setTimeout(() => setFlash(false), 1500);
  };

  const VOICES = [
    "en-US-ChristopherNeural","en-US-AriaNeural","en-US-GuyNeural",
    "en-GB-RyanNeural","en-GB-SoniaNeural","en-AU-WilliamNeural","en-IN-NeerjaNeural",

  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>

          <h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Setup</h2>
          <p style={{color:"#555",fontSize:"13px",marginTop:"3px"}}>All fields save automatically as you type</p>

      </div>

      {/* YouTube */}

            <div style={{fontSize:"12px",color:"#888",fontWeight:700,marginBottom:"4px"}}>{f.label}</div>
            <input type={f.type} value={local[f.key]} onChange={e => set(f.key, e.target.value)} placeholder={f.hint}

          <div style={{fontSize:"10px",color:"#444",fontFamily:"Space Mono"}}>ANTHROPIC API — connected via Claude.ai. No key needed here.</div>

          <span style={{fontSize:"16px"}}>☁️</span>
          <span style={{fontWeight:800,fontSize:"15px"}}>Supabase Sync</span>

        </div>
        <p style={{fontSize:"12px",color:"#555",lineHeight:1.7,marginBottom:"14px"}}>Enter once per device. Everything syncs automatically. On a new device, enter these 3 fields and all your data loads instantly.</p>

          {key:"supabaseKey",  label:"Supabase Anon Key",     type:"password", hint:"Supabase → Settings → API → anon public"},

              {key:"bufferKey",                label:"Buffer Access Token",        type:"password", hint:"buffer.com/developers → Create App → Access Token"},
              {key:"bufferInstagramProfileId", label:"Buffer Instagram Profile ID", type:"text",    hint:"GET api.bufferapp.com/1/profiles.json?access_token=..."},

              <div key={f.key}>
                <div style={{fontSize:"12px",color:"#888",fontWeight:700,marginBottom:"4px"}}>{f.label}</div>
                <input type={f.type} value={local[f.key]||""} onChange={e => set(f.key, e.target.value)} placeholder={f.hint}
                  style={{width:"100%",background:"#0A0A12",border:"1px solid #2a0015",borderRadius:"8px",padding:"10px 12px",color:"#E8E8F0",fontSize:"13px"}}/>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Memory */}
      <Card>
        <SL>MEMORY AND STORAGE</SL>

          All data saves automatically. With Supabase connected, everything syncs across all your devices. Without it, data lives in this browser only.
        </p>
        <Btn variant="danger" onClick={onReset}>Reset Schedule</Btn>

  );

// ── App Root ───────────────────────────────────────────────────
const TABS = [
  {id:"command",   label:"Overview"},
  {id:"planner",   label:"Planner"},
  {id:"engine",    label:"Engine"},
  {id:"analytics", label:"Analytics"},
  {id:"setup",     label:"Setup"},
];

function App() {
  const [tab, setTab] = useState("command");

  const [weeks, setWeeksRaw] = useState(() => {
    try { const s = localStorage.getItem("r00m_weeks"); return s ? JSON.parse(s) : INIT_WEEKS; }
    catch { return INIT_WEEKS; }
  });
  const [settings, setSettingsRaw] = useState(() => {
    try { const s = localStorage.getItem("r00m_settings"); return s ? JSON.parse(s) : INIT_SETTINGS; }
    catch { return INIT_SETTINGS; }
  });
  const [lastInsight, setLastInsightRaw] = useState(() => {
    try { const s = localStorage.getItem("r00m_insight"); return s ? JSON.parse(s) : null; }
    catch { return null; }
  });

  const [syncStatus, setSyncStatus] = useState("");
  const [sbReady,    setSbReady]    = useState(false);

  // On mount: load from Supabase if configured
  useEffect(() => {
    const url = settings.supabaseUrl;
    const key = settings.supabaseKey;
    const ch  = settings.channelKey;
    if (url && key && ch) {
      setSyncStatus("syncing");
      sbLoad(url, key, ch).then(function(data) {
        if (data) {
          if (data.weeks)   setWeeksRaw(data.weeks);
          if (data.insight) setLastInsightRaw(data.insight);
          if (data.settings) {
            setSettingsRaw(function(prev) {
              return {...data.settings, supabaseUrl:prev.supabaseUrl, supabaseKey:prev.supabaseKey, channelKey:prev.channelKey};
            });
          }
          setSyncStatus("synced");
        } else {
          setSyncStatus("new");
        }
        setSbReady(true);
      });
    } else {
      setSbReady(true);
    }
  }, []);

  // Save to localStorage
  useEffect(() => { try { localStorage.setItem("r00m_weeks",    JSON.stringify(weeks));   } catch {} }, [weeks]);
  useEffect(() => { try { localStorage.setItem("r00m_settings", JSON.stringify(settings));} catch {} }, [settings]);
  useEffect(() => { if (lastInsight) try { localStorage.setItem("r00m_insight", JSON.stringify(lastInsight)); } catch {} }, [lastInsight]);

  // Save to Supabase after initial load
  useEffect(() => {
    if (!sbReady) return;
    const url = settings.supabaseUrl;
    const key = settings.supabaseKey;
    const ch  = settings.channelKey;
    if (url && key && ch) {
      sbSave(url, key, ch, {weeks, insight:lastInsight, settings});
      setSyncStatus("saved");
    }
  }, [weeks, lastInsight, settings, sbReady]);

  const setWeeks       = v => setWeeksRaw(v);
  const setSettings    = v => setSettingsRaw(v);
  const setLastInsight = v => setLastInsightRaw(v);

  const handleReset = () => {
    if (!window.confirm("Reset schedule?\n\nThis clears all weeks and starts fresh.")) return;
    setWeeksRaw(INIT_WEEKS);
    setLastInsightRaw(null);
    try { localStorage.removeItem("r00m_weeks"); localStorage.removeItem("r00m_insight"); } catch {}
  };

  const draftWeek    = weeks.find(w => w.status === "draft" && w.slots && w.slots.length > 0);
  const pendingBadge = draftWeek ? draftWeek.slots.filter(s => s.status === "pending").length : 0;

  const VIEW = {
    command:   <CommandCenter  weeks={weeks} onNavigate={setTab} instagramEnabled={settings.instagramEnabled}/>,
    planner:   <WeeklyPlanner  weeks={weeks} setWeeks={setWeeks} lastInsight={lastInsight}/>,
    engine:    <ContentEngine  weeks={weeks} setWeeks={setWeeks} settings={settings} onNavigate={setTab}/>,
    analytics: <AnalyticsBrain weeks={weeks} setWeeks={setWeeks} lastInsight={lastInsight} setLastInsight={setLastInsight}/>,
    setup:     <Setup          settings={settings} setSettings={setSettings} onReset={handleReset} syncStatus={syncStatus}/>,
  };

  return (
    <div style={{minHeight:"100vh",background:"#08080E"}}>
      {/* Topbar */}
      <div style={{position:"sticky",top:0,zIndex:200,background:"rgba(8,8,14,0.95)",backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",borderBottom:"1px solid #1A1A2A",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px"}}>

        <div style={{display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
          <div style={{fontWeight:800,fontSize:"16px",letterSpacing:"-0.02em"}}>Rand00mscroll</div>
          <div style={{fontFamily:"Space Mono",fontSize:"8px",color:"#2a2a3a",background:"#111",border:"1px solid #1A1A2A",padding:"2px 6px",borderRadius:"4px"}}>v1</div>
        </div>

        <div style={{flex:1,display:"flex",justifyContent:"center"}}>
          <div style={{position:"relative",width:"100%",maxWidth:"200px"}}>
            <select value={tab} onChange={e => setTab(e.target.value)}
              style={{width:"100%",background:"#111118",border:"1px solid #1A1A2A",borderRadius:"10px",padding:"8px 32px 8px 14px",color:"#E8E8F0",fontFamily:"Syne",fontWeight:700,fontSize:"13px",cursor:"pointer",appearance:"none",WebkitAppearance:"none"}}>
              {TABS.map(t => (
                <option key={t.id} value={t.id}>
                  {t.label}{t.id==="engine" && pendingBadge>0 ? " ("+pendingBadge+")" : ""}
                </option>
              ))}
            </select>
            <div style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",pointerEvents:"none",color:"#ADFF2F",fontSize:"11px"}}>▾</div>
          </div>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:"5px",flexShrink:0}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite"}}/>
          <span style={{fontFamily:"Space Mono",fontSize:"9px",color:syncStatus==="synced"||syncStatus==="saved"?"#ADFF2F":syncStatus==="syncing"?"#FF6B35":"#ADFF2F"}}>
            {syncStatus==="syncing" ? "SYNC" : syncStatus==="synced" ? "SYNCED" : syncStatus==="saved" ? "SAVED" : "LIVE"}
          </span>
        </div>

      </div>

      <div style={{maxWidth:"860px",margin:"0 auto",padding:"24px 16px 80px"}}>
        {VIEW[tab]}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
