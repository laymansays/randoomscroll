function makeSlots(types, topics) {
  const t  = types.length  ? types  : ["engaging"];
  const tp = topics && topics.length ? topics : ["general"];
  const s  = []; let ti = 0;
  // Interleave topics across days — each day gets all topics, no monotony
  // e.g. 3 topics: Mon=T1/T2/T3, Tue=T1/T2/T3, Wed=T1/T2/T3...
  // e.g. 2 topics: Mon=T1/T2/T1, Tue=T2/T1/T2, alternating
  // e.g. 1 topic: all same (no choice)
  for (let d=0;d<7;d++) for (let x=0;x<3;x++) {
    const slotIndex = d*3+x;
    // Rotate through topics at each slot position
    const topicIdx = slotIndex % tp.length;
    // Also shuffle content types independently
    s.push({id:uid(),day:d,time:x,contentType:t[ti++%t.length],
            topic:tp[topicIdx],
            status:"pending",script:null,footage:[],videoUrl:null,
            scheduleStatus:"unscheduled",youtubeId:null});
  }
  return s;
}

// ── Claude API ────────────────────────────────────────────────
async function claudeCall(msgs,opts){
  const body={model:"claude-sonnet-4-20250514",max_tokens:(opts&&opts.maxTokens)||1000,messages:msgs};
  // Use Vercel proxy when on localhost, relative path when on Vercel
  const apiUrl = (window.location.hostname==="localhost"||window.location.hostname==="127.0.0.1")
    ? "https://randoomscroll.vercel.app/api/claude"
    : "/api/claude";
  const r=await fetch(apiUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error("Claude "+r.status);
  return r.json();
}
const getText=d=>(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("")||"";
const tryJSON=t=>{try{return JSON.parse(t.replace(/```json|```/g,"").trim());}catch{return null;}};

async function genScripts(slots,evolved){
  const d=await claudeCall([{role:"user",content:"Write "+slots.length+" YouTube Shorts scripts. Match each to its exact topic and content type.\n\nSlots:\n"+slots.map((s,i)=>(i+1)+". Topic: \""+s.topic+"\" | Type: "+s.contentType).join("\n")+"\n\n"+(evolved?"Style guidance: "+evolved+"\n\n":"")+"Rules: max 60 words, punchy, hook-first, voiceover-ready.\n\nReturn ONLY valid JSON:\n[{\"title\":\"t\",\"type\":\"t\",\"topic\":\"t\",\"script\":\"s\",\"hook\":\"h\",\"ytCaption\":\"caption #hashtag1 #hashtag2 #Shorts\"}]"}],{maxTokens:2000});
  return tryJSON(getText(d))||[];
}

async function genTopics(niche){
  const d=await claudeCall([{role:"user",content:"Generate 8 specific trending YouTube Shorts topic ideas for the \""+niche+"\" niche. High viral potential, specific and clickable. Return ONLY valid JSON:\n[{\"topic\":\"specific topic\",\"heat\":95,\"why\":\"one line reason\"}]"}],{maxTokens:700});

}

async function pexelsSearch(keyword, apiKey){

}

// Visual keyword pools — unique footage per content type
const FOOTAGE_POOLS = {
  cliffhanger: ["suspense dark corridor","mystery shadow person","tense dramatic face","night city thriller","countdown stress timer","secret door reveal"],
  ragebait:    ["angry crowd street","shocking news breaking","frustrated reaction close","controversy heated debate","protest signs crowd","viral outrage moment"],
  clickbait:   ["money cash success luxury","secret hidden treasure","amazing transformation before","shocking discovery moment","viral celebrity life","wealth lifestyle car"],
  explanatory: ["whiteboard marker writing","professional explaining desk","office team meeting","data charts screen","teacher classroom clear","expert interview studio"],
  infographic: ["data visualization display","statistics clean minimal","digital interface tech","information screen modern","flat design elements","analytics dashboard glow"],
  brainrot:    ["neon lights city energy","gaming setup rgb glow","fast cut chaos street","zoom dramatic reaction","loud crowd festival","viral dance trend"],
  engaging:    ["person talking direct camera","authentic outdoor candid","real conversation coffee","street interview spontaneous","genuine laugh natural","casual storytelling home"],
  storytime:   ["nostalgic memory soft light","old photograph album","walking alone reflection road","emotional sunset silhouette","personal journey nature","past flashback blur"],
};

// Generate unique keyword per slot using content type + topic context + position
function slotKeyword(slot, indexInTopic) {
  const pool = FOOTAGE_POOLS[slot.contentType] || FOOTAGE_POOLS.engaging;
  const base = pool[indexInTopic % pool.length];
  // Add 1-2 meaningful topic words for visual context
  const topicWords = (slot.topic||"").split(" ").filter(w=>w.length>4).slice(0,2).join(" ");
  return topicWords ? base+" "+topicWords : base;
}

// ── Stage 1: Plan ─────────────────────────────────────────────
function PlanStage({week,updateWeek}){
  const [niche,setNiche]=useState(week.niche||"");
  const [topics,setTopics]=useState(week.topics&&week.topics.length?week.topics:["","",""]);
  const [selTypes,setSelTypes]=useState(week.contentTypes&&week.contentTypes.length?week.contentTypes:["cliffhanger","explanatory"]);
  const [trending,setTrending]=useState([]);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const valid=validTopics(topics);
  const canLock=niche.trim()&&valid.length>0&&selTypes.length>0;
  function validTopics(t){return t.filter(x=>x.trim());}
  const doSearch=async()=>{if(!niche.trim()){setErr("Enter niche first");return;}setErr("");setLoading(true);setTrending([]);try{const t=await genTopics(niche.trim());setTrending(t);}catch{setErr("Search failed");}setLoading(false);};
  const pick=txt=>{const e=topics.findIndex(t=>!t.trim());const u=[...topics];u[e>=0?e:2]=txt;setTopics(u);};
  const toggleType=id=>setSelTypes(p=>p.includes(id)?p.filter(t=>t!==id):[...p,id]);
  const lock=()=>{
    if(!canLock)return;
    const filled=validTopics(topics);
    const newSlots=makeSlots(selTypes,filled);
    updateWeek({niche:niche.trim(),topics:filled,contentTypes:selTypes,slots:newSlots,locked:true});
  };
  if(week.locked)return <div>
    <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"8px"}}><Tag color="#FF6B35">{week.niche}</Tag>{week.topics.map((t,i)=><Tag key={i} color="#00CFFF">{t.slice(0,30)}</Tag>)}</div>
    <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>{week.contentTypes.map(id=>{const ct=CTYPES.find(c=>c.id===id);return ct?<Tag key={id} color={ct.color}>{ct.label}</Tag>:null;})}</div>
    <div style={{marginTop:"10px"}}><Btn small variant="ghost" onClick={()=>updateWeek({locked:false,slots:[]})}>Edit Plan</Btn></div>
  </div>;
  return <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
    <div><div style={{fontSize:"12px",color:"var(--text3)",fontWeight:700,marginBottom:"4px"}}>NICHE</div><input value={niche} onChange={e=>setNiche(e.target.value)} placeholder="e.g. AI Tools, Personal Finance, True Crime..." style={inp}/></div>
    <div>
      <div style={{fontSize:"12px",color:"var(--text3)",fontWeight:700,marginBottom:"8px"}}>TOPICS (up to 3, ~{Math.ceil(21/Math.max(validTopics(topics).length,1))} videos each)</div>
      {[0,1,2].map(i=><div key={i} style={{marginBottom:"6px"}}><input value={topics[i]} onChange={e=>{const u=[...topics];u[i]=e.target.value;setTopics(u);}} placeholder={i===0?"Main topic (required)...":i===1?"Second angle (optional)...":"Third angle (optional)..."} style={{...inp,background:topics[i]?"rgba(13,26,13,0.4)":"var(--input-bg)",border:"1px solid "+(topics[i]?"rgba(173,255,47,0.3)":"var(--input-border)")}}/></div>)}
      <div style={{marginTop:"8px",display:"flex",gap:"8px",alignItems:"center"}}>
        <Btn variant="outline" small onClick={doSearch}>{loading?<><Spinner size={12}/>Searching...</>:"Find Trending Topics"}</Btn>
        {err&&<span style={{fontSize:"12px",color:"#FF2D6B"}}>{err}</span>}
      </div>
      {trending.length>0&&<div style={{marginTop:"8px",display:"flex",flexDirection:"column",gap:"4px"}}>
        {trending.map((t,i)=>{const added=topics.some(tp=>tp===t.topic);return <div key={i} onClick={()=>!added&&pick(t.topic)} style={{display:"flex",gap:"10px",alignItems:"center",padding:"8px 10px",borderRadius:"8px",cursor:added?"default":"pointer",background:added?"rgba(13,26,13,0.4)":"var(--card2)",border:"1px solid "+(added?"rgba(173,255,47,0.3)":"var(--border)"),opacity:added?0.7:1}}>
          <span style={{fontFamily:"Space Mono",fontSize:"12px",fontWeight:700,color:t.heat>90?"#FF2D6B":t.heat>80?"#FF6B35":"#ADFF2F",width:24}}>{t.heat}</span>
          <span style={{flex:1,fontSize:"13px"}}>{t.topic}</span>
          {t.why&&<span style={{fontFamily:"Space Mono",fontSize:"9px",color:"var(--text4)",maxWidth:"120px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.why}</span>}
          <span style={{fontFamily:"Space Mono",fontSize:"9px",color:added?"#ADFF2F":"var(--text4)"}}>{added?"✓":"tap"}</span>
        </div>;})}
      </div>}
    </div>
    <div>
      <div style={{fontSize:"12px",color:"var(--text3)",fontWeight:700,marginBottom:"8px"}}>CONTENT TYPE MIX</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>{CTYPES.map(ct=><button key={ct.id} onClick={()=>toggleType(ct.id)} style={{background:selTypes.includes(ct.id)?ct.color+"22":"var(--card2)",border:"1px solid "+(selTypes.includes(ct.id)?ct.color:"var(--border)"),color:selTypes.includes(ct.id)?ct.color:"var(--text3)",padding:"5px 12px",borderRadius:"20px",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:700,fontSize:"12px",cursor:"pointer",transition:"all .15s"}}>{ct.label}</button>)}</div>
    </div>
    {canLock&&<div style={{background:"rgba(13,26,13,0.3)",border:"1px solid rgba(173,255,47,0.15)",borderRadius:"8px",padding:"10px 12px",fontSize:"13px",color:"var(--text3)",lineHeight:1.8}}>
      <strong style={{color:"var(--text)"}}>Week {week.number}:</strong> {niche} · {validTopics(topics).join(" / ")} · {selTypes.length} formats · 21 videos
    </div>}
    <Btn onClick={lock} disabled={!canLock}>Lock Week {week.number} and Start →</Btn>
  </div>;
}

// ── Stage 2: Scripts ──────────────────────────────────────────
function ScriptsStage({week,updateWeek}){
  const [generating,setGenerating]=useState(false);
  const [progress,setProgress]=useState(0);
  const [total,setTotal]=useState(0);
  const [currentTitle,setCurrentTitle]=useState("");
  const [expanded,setExpanded]=useState(null);
  const slots=week.slots||[];
  const pending=slots.filter(s=>!s.script);
  const done=slots.filter(s=>s.script);
  const generateAll=async()=>{
    const p=week.slots.filter(s=>!s.script);
    if(!p.length) return;
    setGenerating(true);setProgress(0);setTotal(p.length);
    // Process in batches of 3 but run ALL batches automatically — no stops
    for(let i=0;i<p.length;i+=3){
      const batch=p.slice(i,i+3);
      setCurrentTitle(batch[0].topic||batch[0].contentType);
      try{
        const si=batch.map(s=>({topic:s.topic,contentType:s.contentType}));

// ── Stage 3: Footage ──────────────────────────────────────────
function FootageStage({week,updateWeek,pexelsKey}){
  const [loading,setLoading]=useState({});
  const [results,setResults]=useState({});
  const slots=week.slots||[];
  const slotsWithScript=slots.filter(s=>s.script);
  const slotsWithFootage=slots.filter(s=>s.footage&&s.footage.length>0);
  const fetchAll=async()=>{
    // Track how many slots per topic we have processed — for keyword rotation
    const topicCounts = {};
    for(const slot of slotsWithScript){
      if(slot.footage&&slot.footage.length>0) continue;
      setLoading(p=>({...p,[slot.id]:true}));
      // Count position within this topic for keyword variety
      const tk = slot.topic||"general";
      topicCounts[tk] = (topicCounts[tk]||0);
      const kw = slotKeyword(slot, topicCounts[tk]);
      topicCounts[tk]++;
      const clips = await pexelsSearch(kw, pexelsKey);
      // Fallback to broader topic search if no results
      const finalClips = clips.length > 0 ? clips : await pexelsSearch(slot.topic||"nature", pexelsKey);
      setResults(p=>({...p,[slot.id]:finalClips}));
      if(finalClips.length>0){
        const updated=week.slots.map(s=>s.id===slot.id?{...s,footage:finalClips}:s);
        updateWeek({slots:updated});
      }
      setLoading(p=>({...p,[slot.id]:false}));
    }
  };
  const selectClip=(slotId,clip)=>{const updated=week.slots.map(s=>s.id===slotId?{...s,footage:[clip]}:s);updateWeek({slots:updated});};
  const [fetching,setFetching]=useState(false);
  const [fetchProg,setFetchProg]=useState(0);
  const [fetchTitle,setFetchTitle]=useState("");
  const fetchAllWithProgress=async()=>{
    const toFetch=slotsWithScript.filter(s=>!s.footage||s.footage.length===0);
    if(!toFetch.length||!pexelsKey) return;
    setFetching(true);setFetchProg(0);
    const topicCounts={};
    for(let i=0;i<toFetch.length;i++){
      const slot=toFetch[i];
      setFetchTitle(slot.script?slot.script.title:slot.topic);
      setFetchProg(i);
      const tk=slot.topic||"general";
      topicCounts[tk]=(topicCounts[tk]||0);
      const kw=slotKeyword(slot,topicCounts[tk]);
      topicCounts[tk]++;
      const clips=await pexelsSearch(kw,pexelsKey);
      const finalClips=clips.length>0?clips:await pexelsSearch(slot.topic||"nature",pexelsKey);
      setResults(p=>({...p,[slot.id]:finalClips}));
      if(finalClips.length>0){
        const updated=week.slots.map(s=>s.id===slot.id?{...s,footage:finalClips}:s);
        updateWeek({slots:updated});
      }
    }
    setFetching(false);setFetchTitle("");

// ── Stage 5: Schedule ─────────────────────────────────────────
function shuffleSlotSchedule(slots) {
  // Collect all day/time combinations
  const positions = slots.map(s => ({day:s.day, time:s.time}));
  // Fisher-Yates shuffle
  for (let i = positions.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [positions[i],positions[j]] = [positions[j],positions[i]];
  }
  // Reassign shuffled positions to slots, keeping topic grouping in mind
  // Sort slots by topic so same-topic videos are spread across days
  const byTopic = {};
  slots.forEach(s => { (byTopic[s.topic]=byTopic[s.topic]||[]).push(s); });
  const topics = Object.keys(byTopic);
  // Interleave: T1[0], T2[0], T3[0], T1[1], T2[1], T3[1]...
  const ordered = [];
  const maxLen = Math.max(...topics.map(t=>byTopic[t].length));
  for (let i=0;i<maxLen;i++) topics.forEach(t=>{ if(byTopic[t][i]) ordered.push(byTopic[t][i]); });
  // Now assign positions in order
  return ordered.map((slot,i) => ({...slot, day:positions[i].day, time:positions[i].time}));
}

function ScheduleStage({week,updateWeek,prevWeeks,serverOnline,onCheckServer}){
  const [scheduling,setScheduling]=useState(false);
  const [schedProg,setSchedProg]=useState(0);
  const [comparison,setComparison]=useState(week.comparison||null);
  const [loadingComp,setLoadingComp]=useState(false);
  const slots=week.slots||[];
  const withVideo=slots.filter(s=>s.videoUrl);
  const scheduled=slots.filter(s=>s.scheduleStatus==="youtube_done");
  const prevWithAnalytics=prevWeeks.filter(w=>w.analytics);

  const loadComparison=async()=>{
    if(!prevWithAnalytics.length) return;
    setLoadingComp(true);
    const avg={avgViews:0,avgCTR:0,avgRetention:0,avgSubs:0};
    prevWithAnalytics.forEach(w=>{avg.avgViews+=w.analytics.views||0;avg.avgCTR+=w.analytics.ctr||0;avg.avgRetention+=w.analytics.avgRetention||0;avg.avgSubs+=w.analytics.subscribersGained||0;});
    const n=prevWithAnalytics.length;
    avg.avgViews=Math.round(avg.avgViews/n);avg.avgCTR=+(avg.avgCTR/n).toFixed(2);avg.avgRetention=+(avg.avgRetention/n).toFixed(1);avg.avgSubs=Math.round(avg.avgSubs/n);
    try{const c=await compareWeeks(week,avg);setComparison(c);updateWeek({comparison:c});}catch(e){console.error(e);}
    setLoadingComp(false);
  };

  // uploadOne: upload a single video independently — doesn't block other operations
  const uploadOne = async(slot) => {
    try {
      // Pass all metadata so server can build manifest entry if missing
      const r = await fetch(SERVER+"/upload-one", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          jobId:    slot.id,
          title:    slot.script?.title||slot.topic||"Untitled",
          ytCaption:slot.script?.ytCaption||"#Shorts",
          day:      DAYS[slot.day],
          time:     TIMES[slot.time],
        })
      });
      const d = await r.json();
      if(d.success||d.already) {
        updateWeek({slots:week.slots.map(s=>s.id===slot.id?{...s,scheduleStatus:"youtube_done"}:s)});
        return true;
      }
      console.warn("upload-one failed:", d.error);
    } catch(e){ console.error("uploadOne error:",e); }
    return false;
  };

  const doSchedule=async()=>{
    if(!serverOnline){onCheckServer();return;}
    setScheduling(true);setSchedProg(0);

    const POLL_MS  = 12000; // poll every 12 seconds
    const MAX_WAIT = 90*60*1000;
    const start    = Date.now();
    let done = 0;

    // Upload all slots that already have videos
    const readyNow = week.slots.filter(s=>s.videoUrl&&s.scheduleStatus!=="youtube_done");
    for(const slot of readyNow){
      const ok = await uploadOne(slot);
      if(ok){ done++; setSchedProg(done); }
    }

    // Watch for remaining slots to finish generating, upload each as it appears
    const stillPending = ()=>week.slots.filter(s=>s.scheduleStatus!=="youtube_done");
    while(stillPending().length>0 && Date.now()-start < MAX_WAIT){
      await new Promise(r=>setTimeout(r,POLL_MS));
      // Check server for newly generated videos
      try {
        const vr = await fetch(SERVER+"/videos");
        const serverVids = await vr.json();
        // Find slots that now have videos but aren't scheduled yet
        const newlyReady = week.slots.filter(s=>{
          if(s.scheduleStatus==="youtube_done") return false;
          const sv = serverVids.find(v=>v.jobId===s.id);
          return sv && sv.hasVideo;
        });
        for(const slot of newlyReady){
          // Update local state with video URL
          updateWeek({slots:week.slots.map(s=>s.id===slot.id?{...s,videoUrl:SERVER+"/file/"+s.id+".mp4"}:s)});
          const ok = await uploadOne({...slot,videoUrl:SERVER+"/file/"+slot.id+".mp4"});
          if(ok){ done++; setSchedProg(done); }
        }
        // Stop if all done
        if(serverVids.every(v=>v.scheduleStatus==="youtube_done")) break;
      } catch(e){ console.error(e); }
    }

    updateWeek({scheduled:done>0,scheduledAt:new Date().toISOString()});
    setScheduling(false);
  };

  const exportJobs=()=>{
    const jobs=week.slots.filter(s=>s.script).map(s=>({jobId:s.id,weekId:week.id,niche:week.niche,topic:s.topic,day:DAYS[s.day],time:TIMES[s.time],contentType:s.contentType,voiceId:"en-US-ChristopherNeural",targetDuration:55,script:s.script?.script||"",hook:s.script?.hook||"",title:s.script?.title||"",ytCaption:s.script?.ytCaption||"",keywords:[s.topic],footage:(s.footage||[]).map(c=>({id:c.id,url:c.url,duration:c.duration}))}));
    const blob=new Blob([JSON.stringify(jobs,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="week"+week.number+"_jobs.json";a.click();URL.revokeObjectURL(url);
  };

  return <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
    {/* Comparison panel — weeks 2+ only */}
    {prevWithAnalytics.length>0&&<div style={{background:"var(--bg3)",border:"1px solid rgba(0,207,255,0.15)",borderRadius:"10px",padding:"14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#00CFFF"}}>HOW WEEK {week.number} BEATS PREVIOUS WEEKS</div>
        {!comparison&&<Btn small variant="outline" onClick={loadComparison} disabled={loadingComp}>{loadingComp?<><Spinner size={12}/>Analysing...</>:"Run Comparison"}</Btn>}
      </div>
      {comparison?<div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
          <StatBox label="Hook Score" value={comparison.confidence+"%"} sub="confidence" accent="#ADFF2F"/>
          <StatBox label="CTR Change" value={comparison.predictedCTRChange||"—"} sub="predicted" accent={comparison.predictedCTRChange&&comparison.predictedCTRChange.startsWith("+")?"#ADFF2F":"#FF2D6B"}/>
          <StatBox label="Retention" value={comparison.predictedRetentionChange||"—"} sub="predicted" accent="#00CFFF"/>
        </div>
        <div style={{background:"rgba(173,255,47,0.05)",border:"1px solid rgba(173,255,47,0.2)",borderRadius:"8px",padding:"10px 12px"}}>
          <div style={{fontWeight:700,fontSize:"13px",color:"#ADFF2F",marginBottom:"6px"}}>{comparison.overallVerdict}</div>
          {comparison.hookImprovement&&<div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}><strong>Hooks:</strong> {comparison.hookImprovement}</div>}
          {comparison.topicStrength&&<div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}><strong>Topics:</strong> {comparison.topicStrength}</div>}
          {comparison.formatOptimisation&&<div style={{fontSize:"12px",color:"var(--text2)",marginBottom:"4px"}}><strong>Format:</strong> {comparison.formatOptimisation}</div>}
          {comparison.timingAdvantage&&<div style={{fontSize:"12px",color:"var(--text2)"}}><strong>Timing:</strong> {comparison.timingAdvantage}</div>}
        </div>
        {comparison.risks&&comparison.risks.length>0&&<div style={{fontSize:"11px",color:"#FF6B35",fontFamily:"Space Mono"}}>Risks: {comparison.risks.join(" · ")}</div>}
      </div>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Compare against {prevWithAnalytics.length} previous week{prevWithAnalytics.length!==1?"s":""} avg to see prediction</div>}
    </div>}

    {/* Schedule controls */}
    <div style={{background:"var(--card)",border:"1px solid "+(scheduled.length===21?"rgba(173,255,47,0.3)":"var(--border)"),borderRadius:"10px",padding:"14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
        <div>
          <div style={{fontWeight:700,fontSize:"14px",marginBottom:"2px"}}>{scheduled.length===21?"All 21 Videos on YouTube ✓":"Schedule to YouTube"}</div>
          <div style={{fontSize:"12px",color:"var(--text3)"}}>{withVideo.length}/21 videos ready · {scheduled.length}/21 scheduled</div>
        </div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
          <Btn small variant="ghost" onClick={()=>{
            const shuffled = shuffleSlotSchedule(week.slots);
            updateWeek({slots:shuffled});
          }}>⇄ Shuffle Schedule</Btn>
          <Btn small variant="ghost" onClick={exportJobs}>↓ Export Jobs</Btn>
          {scheduled.length<21&&(scheduling
          ?<div style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 14px",background:"rgba(13,26,13,0.8)",border:"1px solid rgba(173,255,47,0.3)",borderRadius:"8px"}}>
              <Spinner size={11}/>
              <div>
                <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"#ADFF2F"}}>{schedProg} uploaded · watching for more...</div>
                <div style={{fontFamily:"Space Mono",fontSize:"9px",color:"#555",marginTop:"2px"}}>uploads each video as it finishes generating</div>
              </div>
            </div>
          :<Btn onClick={doSchedule} disabled={withVideo.length===0}>{withVideo.length?"Schedule "+withVideo.length+" Videos →":"Generate Videos First"}</Btn>
        )}
          {scheduled.length===21&&<div style={{display:"flex",alignItems:"center",gap:"6px"}}><div style={{width:8,height:8,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite"}}/><span style={{fontFamily:"Space Mono",fontSize:"11px",color:"#ADFF2F"}}>LIVE ON YOUTUBE</span></div>}
        </div>
      </div>
      {!serverOnline&&withVideo.length===0&&<div style={{fontSize:"12px",color:"var(--text4)",fontFamily:"Space Mono"}}>Start server.py on your laptop then click "Connect Server" in the Videos stage to generate videos here.</div>}
    </div>
  </div>;
}

// ── Stage 6: Analytics ────────────────────────────────────────
function AnalyticsStage({week,updateWeek,ytToken,connectYT,allWeeks}){
  const [loading,setLoading]=useState(false);
  const [insight,setInsight]=useState(null);
  const a=week.analytics;
  const prevWeeks=allWeeks.filter(w=>w.number<week.number&&w.analytics);
  const loadAnalytics=async()=>{
    if(!ytToken){connectYT();return;}
    if(!week.scheduledAt){alert("Schedule videos first before loading analytics");return;}
    setLoading(true);
    try{
      const end=new Date().toISOString().slice(0,10);
      const start=new Date(week.scheduledAt).toISOString().slice(0,10);
      const d=await fetchYTAnalytics(ytToken,start,end);
      if(d.rows&&d.rows.length>0){
        const rows=d.rows;const headers=(d.columnHeaders||[]).map(h=>h.name);
        const get=(row,name)=>row[headers.indexOf(name)]||0;
        const analytics={views:rows.reduce((s,r)=>s+get(r,"views"),0),watchMinutes:rows.reduce((s,r)=>s+get(r,"estimatedMinutesWatched"),0),avgRetention:+(rows.reduce((s,r)=>s+get(r,"averageViewPercentage"),0)/rows.length).toFixed(1),subscribersGained:rows.reduce((s,r)=>s+get(r,"subscribersGained"),0),estimatedRevenue:+rows.reduce((s,r)=>s+get(r,"estimatedRevenue"),0).toFixed(2),ctr:+(rows.reduce((s,r)=>s+get(r,"impressionClickThroughRate"),0)/rows.length*100).toFixed(2),topVideo:{id:rows[0]&&rows[0][0],views:rows[0]&&get(rows[0],"views")},fetchedAt:new Date().toISOString()};
        updateWeek({analytics});
        const ins=await generateWeekInsight(analytics,week.niche,prevWeeks);
        setInsight(ins);updateWeek({analytics,evolvedPrompt:ins.evolvedPrompt||week.evolvedPrompt});
      }
    }catch(e){console.error(e);}
    setLoading(false);
  };
  const calcDelta=(current,field)=>{if(!prevWeeks.length||!current)return null;const avg=prevWeeks.reduce((s,w)=>s+(w.analytics[field]||0),0)/prevWeeks.length;const diff=((current-avg)/avg*100).toFixed(1);return(diff>0?"+":"")+diff+"%";};
  return <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text3)"}}>{a?"Last fetched: "+new Date(a.fetchedAt).toLocaleDateString():"No data yet"}</div>
      <Btn small onClick={loadAnalytics} disabled={loading}>{loading?<><Spinner size={12}/>Loading...</>:ytToken?"Refresh Analytics":"Connect YouTube →"}</Btn>
    </div>
    {!a&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"8px",padding:"12px",fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)",lineHeight:1.8}}>
      Analytics appear here after your videos go live on YouTube.<br/>Connect your YouTube account and click "Refresh Analytics".
    </div>}
    {a&&<div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
        <StatBox label="Views"      value={a.views?.toLocaleString()||"—"}  accent="#ADFF2F" delta={calcDelta(a.views,"views")}/>
        <StatBox label="CTR"        value={(a.ctr||0)+"%"}                   accent="#00CFFF" delta={calcDelta(a.ctr,"ctr")}/>
        <StatBox label="Retention"  value={(a.avgRetention||0)+"%"}          accent="#B06EF3" delta={calcDelta(a.avgRetention,"avgRetention")}/>
        <StatBox label="New Subs"   value={"+"+(a.subscribersGained||0)}     accent="#FF9F43" delta={calcDelta(a.subscribersGained,"subscribersGained")}/>
        <StatBox label="Watch Hrs"  value={Math.round((a.watchMinutes||0)/60)} accent="#FF6B35"/>
        <StatBox label="Revenue"    value={"$"+(a.estimatedRevenue||0)}      accent="#ADFF2F" sub={a.estimatedRevenue>0?"monetized":"pre-YPP"}/>
      </div>
      {prevWeeks.length>0&&<div style={{background:"var(--bg3)",border:"1px solid rgba(0,207,255,0.1)",borderRadius:"10px",padding:"12px"}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#00CFFF",marginBottom:"8px"}}>COMPARED TO PREVIOUS {prevWeeks.length} WEEK{prevWeeks.length>1?"S":""} AVERAGE</div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
          {[["Views",a.views,"views"],["CTR",a.ctr,"ctr"],["Retention",a.avgRetention,"avgRetention"],["Subs",a.subscribersGained,"subscribersGained"]].map(([label,val,field])=>{
            const d=calcDelta(val,field);
            return <div key={field} style={{background:"var(--bg4)",borderRadius:"8px",padding:"8px 12px",flex:1,minWidth:"80px"}}>
              <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",marginBottom:"3px"}}>{label}</div>
              <div style={{fontFamily:"Space Mono",fontSize:"14px",fontWeight:700,color:d&&d.startsWith("+")?"#ADFF2F":d&&d.startsWith("-")?"#FF2D6B":"var(--text)"}}>{d||"—"}</div>
            </div>;
          })}
        </div>
      </div>}
    </div>}
    {insight&&<div style={{background:"rgba(13,26,13,0.3)",border:"1px solid rgba(173,255,47,0.15)",borderRadius:"10px",padding:"12px"}}>
      <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",marginBottom:"8px"}}>ENGINE INSIGHT — NEXT WEEK</div>
      <p style={{fontSize:"13px",color:"var(--text2)",lineHeight:1.75,marginBottom:"8px"}}>{insight.summary}</p>
      {insight.nextNiches&&<div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>{insight.nextNiches.map((n,i)=><Tag key={i} color={i===0?"#FF6B35":"var(--text4)"}>{i===0?"★ ":""}{n}</Tag>)}</div>}
    </div>}
  </div>;
}

// ── Week Workspace ────────────────────────────────────────────
function WeekWorkspace({week,updateWeek,settings,ytToken,connectYT,serverOnline,onCheckServer,allWeeks}){
  const prevWeeks=allWeeks.filter(w=>w.number<week.number);
  const slots=week.slots||[];
  const scriptsDone=slots.filter(s=>s.script).length;
  const footageDone=slots.filter(s=>s.footage&&s.footage.length>0).length;
  const videosDone=slots.filter(s=>s.videoUrl).length;
  const scheduled=slots.filter(s=>s.scheduleStatus==="youtube_done").length;
  const stageStatus=(stage)=>{
    if(stage==="plan")    return week.locked?"done":week.niche?"active":"active";
    if(stage==="scripts") return !week.locked?"pending":scriptsDone===21?"done":scriptsDone>0?"active":"active";
    if(stage==="footage") return scriptsDone===0?"pending":footageDone===21?"done":footageDone>0?"active":"active";
    if(stage==="video")   return footageDone===0?"pending":videosDone===21?"done":videosDone>0?"active":"active";
    if(stage==="schedule")return videosDone===0?"pending":scheduled===21?"done":"active";
    if(stage==="analytics")return !week.scheduled?"pending":week.analytics?"done":"active";
    return "pending";
  };
  const initExpanded=()=>{
    if(!week.locked) return "plan";
    if(scriptsDone<21) return "scripts";
    if(footageDone<21) return "footage";
    if(videosDone<21)  return "video";
    if(scheduled<21)   return "schedule";
    return "analytics";
  };
  const [expanded,setExpanded]=useState(initExpanded());
  const toggle=id=>setExpanded(expanded===id?null:id);
  return <div className="fade-up" style={{display:"flex",flexDirection:"column"}}>
    {/* Week header */}
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"12px",padding:"14px 16px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"12px",flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",marginBottom:"3px"}}>WEEK {week.number}</div>
        <div style={{fontWeight:800,fontSize:"16px",color:week.niche?"var(--text)":"var(--text4)",letterSpacing:"-0.01em"}}>{week.niche||"Not planned yet"}</div>
        {week.topics&&week.topics.length>0&&<div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginTop:"5px"}}>{week.topics.map((t,i)=><Tag key={i} color="#00CFFF">{t.slice(0,24)}</Tag>)}</div>}
      </div>
      <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
        <Tag color={scriptsDone===21?"#ADFF2F":"var(--text4)"}>{scriptsDone}/21 scripts</Tag>
        <Tag color={videosDone>0?"#B06EF3":"var(--text4)"}>{videosDone}/21 videos</Tag>
        <Tag color={scheduled===21?"#ADFF2F":scheduled>0?"#FF6B35":"var(--text4)"}>{scheduled}/21 on YT</Tag>
      </div>
    </div>
    {/* Stage accordions */}
    <StageCard number={1} title="Plan Week" status={stageStatus("plan")} expanded={expanded==="plan"} onToggle={()=>toggle("plan")}>
      <PlanStage week={week} updateWeek={updateWeek}/>
    </StageCard>
    <StageCard number={2} title="Generate Scripts" status={stageStatus("scripts")} expanded={expanded==="scripts"} onToggle={()=>week.locked&&toggle("scripts")}>
      {week.locked?<ScriptsStage week={week} updateWeek={updateWeek}/>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Lock the week plan first.</div>}
    </StageCard>
    <StageCard number={3} title="Get Pexels Footage" status={stageStatus("footage")} expanded={expanded==="footage"} onToggle={()=>scriptsDone>0&&toggle("footage")}>
      {scriptsDone>0?<FootageStage week={week} updateWeek={updateWeek} pexelsKey={settings.pexelsKey}/>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Generate scripts first.</div>}
    </StageCard>
    <StageCard number={4} title="Generate Videos + Preview" status={stageStatus("video")} expanded={expanded==="video"} onToggle={()=>footageDone>0&&toggle("video")}>
      {footageDone>0||videosDone>0?<VideoStage week={week} updateWeek={updateWeek} serverOnline={serverOnline} onCheckServer={onCheckServer}/>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Get footage first.</div>}
    </StageCard>
    <StageCard number={5} title="Review + Schedule" status={stageStatus("schedule")} expanded={expanded==="schedule"} onToggle={()=>videosDone>0&&toggle("schedule")}>
      {videosDone>0?<ScheduleStage week={week} updateWeek={updateWeek} prevWeeks={prevWeeks} serverOnline={serverOnline} onCheckServer={onCheckServer}/>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Generate videos first.</div>}
    </StageCard>
    <StageCard number={6} title="YouTube Analytics" status={stageStatus("analytics")} expanded={expanded==="analytics"} onToggle={()=>week.scheduled&&toggle("analytics")}>
      {week.scheduled?<AnalyticsStage week={week} updateWeek={updateWeek} ytToken={ytToken} connectYT={connectYT} allWeeks={allWeeks}/>:<div style={{fontSize:"12px",color:"var(--text4)"}}>Schedule videos first. Analytics appear after your content goes live.</div>}
    </StageCard>
  </div>;
}

        </div>
        {/* YouTube Analytics */}
        <div><SL>YOUTUBE ANALYTICS</SL>
          <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"8px",padding:"10px 12px",marginBottom:"10px",fontFamily:"Space Mono",fontSize:"10px",color:"var(--text4)",lineHeight:1.8}}>
            <div>Google Cloud Console → Enable YouTube Analytics API v2</div>
            <div>Credentials → OAuth 2.0 → Web App → add <span style={{color:"#00CFFF"}}>https://randoomscroll.vercel.app</span></div>
            <div>Copy Client ID → paste below</div>
          </div>
          <div style={{fontSize:"12px",color:"var(--text3)",fontWeight:700,marginBottom:"4px"}}>YouTube Web Client ID</div>
          <input type="text" value={local.youtubeClientId||""} onChange={e=>set("youtubeClientId",e.target.value)} placeholder="xxxx.apps.googleusercontent.com" style={inp2}/>
        </div>
        {/* Supabase */}
        <div><SL>SUPABASE SYNC</SL>
          {[{k:"supabaseUrl",l:"Supabase Project URL",t:"text",h:"https://xxxxxxxxxxxx.supabase.co"},{k:"supabaseKey",l:"Supabase Anon Key",t:"password",h:"Supabase → Settings → API → anon public"},{k:"channelKey",l:"Channel Key",t:"text",h:"Your password e.g. rand00mscroll-2025"}].map(f=><div key={f.k} style={{marginBottom:"10px"}}><div style={{fontSize:"12px",color:"var(--text3)",fontWeight:700,marginBottom:"4px"}}>{f.l}</div><input type={f.t} value={local[f.k]||""} onChange={e=>set(f.k,e.target.value)} placeholder={f.h} style={inp2}/></div>)}
        </div>
        {/* Prefs */}
        <div><SL>PREFERENCES</SL>
          <div style={{marginBottom:"10px"}}><div style={{fontSize:"12px",color:"var(--text3)",fontWeight:700,marginBottom:"4px"}}>Posting Times</div><div style={{display:"flex",gap:"8px"}}>{local.postingTimes.map((t,i)=><input key={i} type="time" value={t} onChange={e=>{const tt=[...local.postingTimes];tt[i]=e.target.value;set("postingTimes",tt);}} style={{padding:"8px 10px",fontSize:"13px",fontFamily:"Space Mono",borderRadius:"8px"}}/>)}</div></div>
          <div><div style={{fontSize:"12px",color:"var(--text3)",fontWeight:700,marginBottom:"4px"}}>Voice</div><select value={local.voiceId} onChange={e=>set("voiceId",e.target.value)} style={{...inp2}}>{["en-US-ChristopherNeural","en-US-AriaNeural","en-US-GuyNeural","en-GB-RyanNeural","en-IN-NeerjaNeural"].map(v=><option key={v} value={v}>{v}</option>)}</select></div>
        </div>
      </div>
    </div>
  </div>;
}

// ── Aggregation Views ─────────────────────────────────────────
function AggregateView({weeks,period}){
  const withA=weeks.filter(w=>w.analytics);
  if(!withA.length) return <div style={{padding:"20px",textAlign:"center",color:"var(--text4)",fontFamily:"Space Mono",fontSize:"12px"}}>No analytics data yet. Analytics appear here after weeks complete.</div>;
  const sum=(field)=>withA.reduce((s,w)=>s+(w.analytics[field]||0),0);
  const avg=(field)=>+(sum(field)/withA.length).toFixed(2);
  return <div style={{display:"flex",flexDirection:"column",gap:"16px",padding:"16px"}}>
    <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)"}}>{period} OVERVIEW — {withA.length} week{withA.length!==1?"s":""} of data</div>
    <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
      <StatBox label="Total Views"   value={sum("views").toLocaleString()} accent="#ADFF2F"/>
      <StatBox label="Avg CTR"       value={avg("ctr")+"%"} accent="#00CFFF"/>
      <StatBox label="Avg Retention" value={avg("avgRetention")+"%"} accent="#B06EF3"/>
      <StatBox label="Total Subs"    value={"+"+sum("subscribersGained")} accent="#FF9F43"/>
      <StatBox label="Total Revenue" value={"$"+sum("estimatedRevenue").toFixed(2)} accent="#ADFF2F"/>
      <StatBox label="Watch Hours"   value={Math.round(sum("watchMinutes")/60)} accent="#FF6B35"/>
    </div>
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px"}}>
      <SL>WEEK BY WEEK</SL>
      {withA.map(w=><div key={w.id} style={{display:"flex",gap:"10px",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
        <div style={{fontFamily:"Space Mono",fontSize:"11px",color:"var(--text4)",width:"50px",flexShrink:0}}>WK {w.number}</div>
        <div style={{flex:1,fontSize:"13px",fontWeight:600}}>{w.niche}</div>
        <div style={{display:"flex",gap:"8px"}}>
          <Tag color="#ADFF2F">{(w.analytics.views||0).toLocaleString()} views</Tag>
          <Tag color="#00CFFF">{w.analytics.ctr||0}% CTR</Tag>
          <Tag color="#FF9F43">+{w.analytics.subscribersGained||0} subs</Tag>
        </div>
      </div>)}
    </div>
  </div>;
}

// ── App Root ──────────────────────────────────────────────────
function App(){
  const [weeks,setWeeksRaw]=useState(()=>{try{const s=localStorage.getItem("r00m_weeks2");return s?JSON.parse(s):[initWeek(1),initWeek(2),initWeek(3),initWeek(4)];}catch{return[initWeek(1),initWeek(2),initWeek(3),initWeek(4)];}});
  const [settings,setSettingsRaw]=useState(()=>{try{const s=localStorage.getItem("r00m_settings");return s?JSON.parse(s):INIT_SETTINGS;}catch{return INIT_SETTINGS;}});
  const [activeTab,setActiveTab]=useState("w0"); // w0..w3, month, quarter, year
  const [theme,setTheme]=useState(()=>{try{return localStorage.getItem("r00m_theme")||"light";}catch{return"light";}});
  const [syncStatus,setSyncStatus]=useState("");
  const [sbReady,setSbReady]=useState(false);
  const [showSetup,setShowSetup]=useState(false);
  const [ytToken,setYtToken]=useState(null);
  const [serverOnline,setServerOnline]=useState(false);

  // Theme
  useEffect(()=>{document.body.className=theme;try{localStorage.setItem("r00m_theme",theme);}catch{};},[theme]);

  // Manual sync — works even when credentials entered after load
  const syncFromSupabase = async (s) => {
    const cfg = s || settings;
    const {supabaseUrl,supabaseKey,channelKey} = cfg;
    if(!supabaseUrl||!supabaseKey||!channelKey) return;
    setSyncStatus("syncing");
    try {
      const data = await sbLoad(supabaseUrl,supabaseKey,channelKey);
      if(data&&data.weeks) setWeeksRaw(data.weeks);
      if(data&&data.settings) setSettingsRaw(prev=>({...data.settings,supabaseUrl:prev.supabaseUrl,supabaseKey:prev.supabaseKey,channelKey:prev.channelKey}));
      setSyncStatus("synced");
    } catch(e) { setSyncStatus("error"); }
    setSbReady(true);
  };

  // Supabase
  useEffect(()=>{
    const {supabaseUrl,supabaseKey,channelKey}=settings;
    if(supabaseUrl&&supabaseKey&&channelKey){
      syncFromSupabase(settings);
    } else { setSbReady(true); }
    // eslint-disable-next-line
  },[]);

  useEffect(()=>{ // dummy to satisfy linter
    const {supabaseUrl,supabaseKey,channelKey}=settings;
    if(supabaseUrl&&supabaseKey&&channelKey){
      sbLoad(supabaseUrl,supabaseKey,channelKey).then(data=>{
        if(data&&data.weeks){setWeeksRaw(data.weeks);}
        setSyncStatus("synced");setSbReady(true);
      }).catch(()=>setSbReady(true));
    }else{setSbReady(true);}
  },[]);

  useEffect(()=>{try{localStorage.setItem("r00m_weeks2",JSON.stringify(weeks));}catch{}},[weeks]);
  useEffect(()=>{try{localStorage.setItem("r00m_settings",JSON.stringify(settings));}catch{}},[settings]);

  useEffect(()=>{
    if(!sbReady)return;
    const {supabaseUrl,supabaseKey,channelKey}=settings;
    if(supabaseUrl&&supabaseKey&&channelKey){sbSave(supabaseUrl,supabaseKey,channelKey,{weeks});setSyncStatus("saved");}
  },[weeks,sbReady]);

  const setSettings=v=>setSettingsRaw(v);

  const updateWeek=(idx,data)=>{setWeeksRaw(prev=>prev.map((w,i)=>i===idx?{...w,...data}:w));};

  const addWeek=()=>{const n=weeks.length+1;setWeeksRaw(prev=>[...prev,initWeek(n)]);setActiveTab("w"+(weeks.length));};

  // YouTube OAuth
  const connectYT=()=>{
    if(!settings.youtubeClientId){setShowSetup(true);return;}
    if(!window.google){alert("Google library not loaded. Check connection.");return;}
    const tc=google.accounts.oauth2.initTokenClient({client_id:settings.youtubeClientId,scope:"https://www.googleapis.com/auth/yt-analytics.readonly",callback:(resp)=>{if(!resp.error)setYtToken(resp.access_token);}});
    tc.requestAccessToken();
  };

  // Server check — auto-connect if running on localhost
  const checkServer=async()=>{const ok=await pingServer();setServerOnline(ok);return ok;};
  useEffect(()=>{if(IS_LOCAL){checkServer();}}, []);

  const activeWeekIdx=activeTab.startsWith("w")?parseInt(activeTab.slice(1)):-1;
  const isAggView=["month","quarter","year"].includes(activeTab);

  return <div style={{minHeight:"100vh",background:"var(--bg)"}}>
    {/* Topbar */}
    <div style={{position:"sticky",top:0,zIndex:200,background:"var(--topbar)",backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",borderBottom:"1px solid var(--border)",padding:"8px 12px",display:"flex",alignItems:"center",gap:"6px"}}>
      {/* Brand */}
      <a href="https://www.youtube.com/@rand00mscroll" target="_blank" rel="noopener" style={{fontWeight:800,fontSize:"15px",letterSpacing:"-0.02em",color:"#ADFF2F",flexShrink:0,marginRight:"4px",textDecoration:"none",cursor:"pointer"}}>Rand00mscroll</a>
      {/* Week tabs — scrollable */}
      <div style={{flex:1,display:"flex",gap:"3px",overflowX:"auto",scrollbarWidth:"none"}}>
        {weeks.map((w,i)=>{
          const isActive=activeTab==="w"+i;
          const hasDot=w.locked;
          const dotColor=w.scheduled&&w.analytics?"#ADFF2F":w.scheduled?"#FF6B35":w.locked?"#00CFFF":"var(--border2)";
          return <button key={w.id} onClick={()=>setActiveTab("w"+i)} style={{background:isActive?"#ADFF2F":"var(--bg4)",color:isActive?"#08080E":"var(--text3)",border:"1px solid "+(isActive?"#ADFF2F":"var(--border)"),borderRadius:"8px",padding:"5px 10px",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:700,fontSize:"12px",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,display:"flex",alignItems:"center",gap:"5px",transition:"all .15s"}}>
            {hasDot&&<div style={{width:5,height:5,borderRadius:"50%",background:isActive?"#08080E":dotColor,flexShrink:0}}/>}
            W{i+1}{w.niche?" · "+w.niche.slice(0,10):""}
          </button>;
        })}
        <button onClick={addWeek} style={{background:"transparent",border:"1px dashed var(--border)",borderRadius:"8px",padding:"5px 10px",color:"var(--text4)",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:700,fontSize:"12px",cursor:"pointer",flexShrink:0}}>+ Week</button>
        <div style={{width:"1px",background:"var(--border)",margin:"0 2px",flexShrink:0}}/>
        {[["month","Month"],["quarter","Quarter"],["year","Year"]].map(([id,label])=><button key={id} onClick={()=>setActiveTab(id)} style={{background:activeTab===id?"var(--bg4)":"transparent",color:activeTab===id?"var(--text)":"var(--text4)",border:"1px solid "+(activeTab===id?"var(--border)":"transparent"),borderRadius:"8px",padding:"5px 10px",fontFamily:"'Stardos Stencil','Arial Black',sans-serif",fontWeight:600,fontSize:"11px",cursor:"pointer",flexShrink:0}}>{label}</button>)}
      </div>
      {/* Right controls */}
      <div style={{display:"flex",gap:"5px",alignItems:"center",flexShrink:0}}>
        {ytToken&&<div style={{fontFamily:"Space Mono",fontSize:"9px",color:"#ADFF2F"}}>YT✓</div>}
        {serverOnline&&<div style={{fontFamily:"Space Mono",fontSize:"9px",color:"#00CFFF"}}>SRV✓</div>}
        <button onClick={()=>setShowSetup(true)} style={{background:"var(--bg4)",border:"1px solid var(--border)",borderRadius:"8px",padding:"5px 8px",cursor:"pointer",fontSize:"14px"}}>⚙️</button>
        <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} style={{background:"var(--bg4)",border:"1px solid var(--border)",borderRadius:"8px",padding:"5px 8px",cursor:"pointer",fontSize:"14px"}}>{theme==="dark"?"☀️":"🌙"}</button>
        <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
          <div style={{width:5,height:5,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite"}}/>
          <span style={{fontFamily:"Space Mono",fontSize:"9px",color:syncStatus==="saved"||syncStatus==="synced"?"#ADFF2F":syncStatus==="syncing"?"#FF6B35":"#ADFF2F"}}>{syncStatus==="syncing"?"SYNC":syncStatus==="synced"?"SYNC'd":syncStatus==="saved"?"SAVED":"LIVE"}</span>
        </div>
      </div>
    </div>

    {/* Main content */}
    <div style={{maxWidth:"860px",margin:"0 auto",padding:"16px 12px 80px"}}>
      {isAggView
        ? <AggregateView weeks={weeks} period={activeTab.toUpperCase()}/>
        : activeWeekIdx>=0&&activeWeekIdx<weeks.length
          ? <WeekWorkspace
              week={weeks[activeWeekIdx]}
              updateWeek={(data)=>updateWeek(activeWeekIdx,data)}
              settings={settings}
              ytToken={ytToken}
              connectYT={connectYT}
              serverOnline={serverOnline}
              onCheckServer={checkServer}
              allWeeks={weeks}
            />
          : <div style={{padding:"40px",textAlign:"center",color:"var(--text4)"}}>Select a week above</div>
      }
    </div>

    {/* Setup overlay */}
    {showSetup&&<SetupOverlay settings={settings} setSettings={setSettings} onClose={()=>setShowSetup(false)} onSync={syncFromSupabase}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
