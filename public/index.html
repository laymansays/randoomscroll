function makeSlots(types) {
  const t = types.length ? types : ["engaging"];
  const s = [];
  let ti = 0;
  for (let d=0;d<7;d++) for (let x=0;x<3;x++)
    s.push({id:uid(),day:d,time:x,contentType:t[ti++%t.length],status:"pending",script:null,keywords:[],footage:[],youtubeId:null,scheduleStatus:"unscheduled",igScheduled:false});
  return s;
}

// ALL 4 WEEKS START BLANK

  {id:2,status:"intention",frozen:false,niche:null,topic:null,contentTypes:[],score:null,slots:[],evolvedPrompt:""},
  {id:3,status:"intention",frozen:false,niche:null,topic:null,contentTypes:[],score:null,slots:[],evolvedPrompt:""},

const INIT_SETTINGS = {
  pexelsKey:"",youtubeChannelId:"",
  postingTimes:["07:00","13:00","18:00"],
  voiceId:"en-US-ChristopherNeural",targetDuration:55,
  instagramEnabled:false,bufferKey:"",bufferInstagramProfileId:"",
};

const MOCK_ANALYTICS = {weekScore:84,ctr:5.2,duration:67,newSubs:143,estRevenue:34,contentScores:[{type:"Cliffhanger",score:91,ctr:7.1},{type:"Explanatory",score:78,ctr:4.8},{type:"Ragebait",score:64,ctr:3.2}],postingTimes:{"07:00":2400,"13:00":4100,"18:00":6800},topVideo:{title:"5 AI Tools Nobody Talks About",views:4821,ctr:8.1}};

// Claude API
async function claudeCall(messages,{tools,maxTokens=1000}={}) {
  const body={model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages};
  if(tools) body.tools=tools;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error("Claude "+r.status);
  return r.json();
}
const getText=d=>d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
const tryJSON=t=>{try{return JSON.parse(t.replace(/```json|```/g,"").trim())}catch{return null}};

async function fetchTrending(niche) {
  const d=await claudeCall([{role:"user",content:'Search for 8 trending topics RIGHT NOW for faceless YouTube Shorts in the "'+niche+'" niche. Use YouTube trending, Google Trends, Reddit. Return ONLY a JSON array:\n[{"topic":"full topic","heat":95,"source":"YouTube"},...]'}],{tools:[{type:"web_search_20250305",name:"web_search"}],maxTokens:900});
  return tryJSON(getText(d))||[];
}
async function genScripts(topic,types,evolved) {
  const d=await claudeCall([{role:"user",content:'Write '+types.length+' short-form faceless YouTube Shorts scripts.\nTopic: "'+topic+'"\nTypes: '+types.map((t,i)=>(i+1)+"="+t).join(", ")+"\n"+(evolved?"Style guidance: "+evolved:"")+'\n\nRules: max 60 words, punchy sentences, strong hook first 8 sec, voiceover-ready.\n\nReturn ONLY valid JSON array:\n[{"title":"video title","type":"content type","script":"full script","hook":"opening line only","ytCaption":"YouTube caption with 3 hashtags"}]'}],{maxTokens:2000});
  return tryJSON(getText(d))||[];
}
async function extractKW(script) {
  const d=await claudeCall([{role:"user",content:'Extract 5 Pexels stock video search keywords from this script. Short, specific, searchable. Return ONLY a JSON array:\n["kw1","kw2",...]\n\nScript: "'+script+'"'}],{maxTokens:150});
  return tryJSON(getText(d))||[];
}
async function weeklyInsight(data,niche,prev) {
  const d=await claudeCall([{role:"user",content:'You are the intelligence engine for a faceless YouTube channel. Analyse this week.\n\nNiche: '+niche+'\nAnalytics: '+JSON.stringify(data)+'\nPrevious prompt: '+(prev||"none")+'\n\nReturn ONLY valid JSON:\n{"summary":"2-3 sentence analysis","topFormat":"best content type","recommendation":"specific next week action","evolvedPrompt":"improved script instructions","nextNiches":["top pick","second","third"],"adjustments":["adj1","adj2","adj3","adj4"]}'}],{maxTokens:900});
  return tryJSON(getText(d))||{};
}
async function pexelsSearch(kw,key) {
  if(!key) return [];
  try{const r=await fetch("https://api.pexels.com/videos/search?query="+encodeURIComponent(kw)+"&per_page=4&orientation=portrait",{headers:{Authorization:key}});const d=await r.json();return(d.videos||[]).map(v=>({id:v.id,preview:v.image,url:v.video_files?.find(f=>f.quality==="sd")?.link||v.video_files?.[0]?.link,duration:v.duration}));}catch{return[];}
}

// Shared UI
function Tag({children,color="#ADFF2F"}){return <span style={{fontFamily:"Space Mono",fontSize:"10px",color,background:color+"18",border:"1px solid "+color+"44",padding:"3px 9px",borderRadius:"20px",letterSpacing:"0.05em"}}>{children}</span>;}
function Spinner({size=14}){return <span style={{display:"inline-block",width:size,height:size,border:"2px solid #ADFF2F",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite",flexShrink:0}}/>;}
function SL({children,color="#555"}){return <div style={{fontFamily:"Space Mono",fontSize:"10px",color,letterSpacing:"0.1em",marginBottom:"12px"}}>{children}</div>;}
function Card({children,style={},accent}){return <div style={{background:"#111118",border:"1px solid "+(accent||"#1E1E2E"),borderRadius:"12px",padding:"18px",...style}}>{children}</div>;}
function StatBox({label,value,sub,accent="#ADFF2F"}){return <div style={{flex:1,minWidth:"90px",background:"#111118",border:"1px solid #1E1E2E",borderRadius:"10px",padding:"12px 14px"}}><div style={{fontFamily:"Space Mono",fontSize:"20px",fontWeight:700,color:accent,lineHeight:1}}>{value}</div><div style={{fontSize:"11px",color:"#888",fontWeight:600,marginTop:"5px"}}>{label}</div>{sub&&<div style={{fontFamily:"Space Mono",fontSize:"10px",color:"#444",marginTop:"2px"}}>{sub}</div>}</div>;}
function Btn({children,onClick,disabled,variant="primary",small,full}){
  const look={primary:{background:disabled?"#1c1c28":"#ADFF2F",color:disabled?"#444":"#08080E",border:"none"},outline:{background:"transparent",color:"#ADFF2F",border:"1px solid #ADFF2F55"},danger:{background:"transparent",color:"#FF2D6B",border:"1px solid #FF2D6B44"},ghost:{background:"#111118",color:"#888",border:"1px solid #1E1E2E"},green:{background:"#0D1A0D",color:"#ADFF2F",border:"1px solid #ADFF2F44"}}[variant]||{};
  return <button onClick={onClick} disabled={disabled} style={{...look,fontFamily:"Syne",fontWeight:700,fontSize:small?"12px":"14px",padding:small?"7px 14px":"11px 22px",borderRadius:"8px",cursor:disabled?"not-allowed":"pointer",transition:"all .15s",width:full?"100%":undefined,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:"6px"}}>{children}</button>;
}
function ZoneCard({week,niche,status,score,selected,onClick,frozen}){
  const done=frozen&&status!=="live";
  const cfg={live:{label:"LIVE",bg:"#0A1A0A",border:"#ADFF2F",dot:"#ADFF2F",pulse:true},draft:{label:"DRAFT",bg:"#1A1200",border:"#FF6B35",dot:"#FF6B35",pulse:false},intention:{label:"OPEN",bg:"#111118",border:"#1E1E2E",dot:"#333",pulse:false},done:{label:"DONE",bg:"#0d0d0d",border:"#1a1a1a",dot:"#222",pulse:false}}[done?"done":status]||{};
  return <div onClick={!done&&status!=="live"?onClick:undefined} style={{background:cfg.bg,border:"1px solid "+(selected?"#ADFF2F":cfg.border),borderRadius:"12px",padding:"12px",minHeight:"84px",cursor:done||status==="live"?"default":"pointer",opacity:done?0.4:1,transition:"all .2s",outline:selected?"2px solid #ADFF2F22":"none"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
      <span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#444"}}>WK {week}</span>
      <div style={{display:"flex",alignItems:"center",gap:"4px"}}><div style={{width:6,height:6,borderRadius:"50%",background:cfg.dot,...(cfg.pulse?{animation:"pulse 2s infinite"}:{})}}/>
      <span style={{fontFamily:"Space Mono",fontSize:"9px",color:cfg.dot}}>{cfg.label}</span></div>
    </div>
    <div style={{fontWeight:700,fontSize:"13px",color:done?"#333":"#E8E8F0",marginBottom:"5px",lineHeight:1.3}}>{niche||"Plan this week"}</div>
    {score!=null&&<div style={{fontFamily:"Space Mono",fontSize:"14px",color:"#ADFF2F"}}>{score}<span style={{fontSize:"10px",color:"#555"}}>/100</span></div>}
    {status==="intention"&&!done&&<div style={{fontFamily:"Space Mono",fontSize:"9px",color:"#333",marginTop:"3px"}}>tap to plan</div>}
  </div>;
}

// Command Center
function CommandCenter({weeks,onNavigate,instagramEnabled}){
  const live=weeks.find(w=>w.status==="live");
  const draft=weeks.find(w=>w.status==="draft"&&w.slots?.length>0);
  const open=weeks.find(w=>w.status==="intention");
  const pending=draft?.slots?.filter(s=>s.status==="pending").length||0;
  const scheduled=draft?.slots?.filter(s=>s.scheduleStatus==="youtube_done").length||0;
  const nextAction=!live&&!draft?{msg:"Start here: Planner → pick a niche → lock Week 1",tab:"planner"}:!draft?{msg:"Planner → lock Week "+(open?.id||2),tab:"planner"}:pending>0?{msg:"Content Engine → generate "+pending+" scripts for Week "+draft.id,tab:"engine"}:scheduled<21?{msg:"Content Engine → run pipeline → upload "+(21-scheduled)+" remaining",tab:"engine"}:{msg:"All done. Check back Sunday for analytics.",tab:null};
  const steps=[
    {s:live?"done":"pending",t:"Week 1",text:live?"Week "+live.id+" live — "+live.niche:"Lock Week 1 in Planner to begin"},
    {s:draft?"done":live?"active":"pending",t:"Next",text:draft?"Week "+draft.id+" drafted — "+draft.niche:"Lock next week in Planner"},
    {s:pending===0&&draft?"done":"pending",t:"Scripts",text:"Scripts: "+(draft?(21-pending)+"/21":"0/21")},
    {s:scheduled>0?"done":"pending",t:"YouTube",text:"YouTube scheduled: "+scheduled+"/21"},
    {s:"pending",t:"Sunday",text:"Analytics in → engine evolves → next niche recommended"},
  ];
  return <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:"#ADFF2F",animation:"pulse 2s infinite"}}/>
        <span style={{fontFamily:"Space Mono",fontSize:"10px",color:"#ADFF2F",letterSpacing:"0.08em"}}>ENGINE READY</span>
      </div>
      <h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Command Center</h2>
      <p style={{color:"#555",fontSize:"13px",marginTop:"3px"}}>{live?"Week "+live.id+" live — "+live.niche:draft?"Week "+draft.id+" in draft — "+draft.niche:"No weeks planned yet — start in Planner"}</p>
    </div>
    <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
      <StatBox label="Live Score" value={live?.score||"—"} sub="live week"/>
      <StatBox label="Scripts Done" value={(21-pending)+"/21"} sub={"wk "+(draft?.id||"—")} accent="#FF6B35"/>
      <StatBox label="YT Scheduled" value={scheduled+"/21"} sub="this draft" accent="#00CFFF"/>
      <StatBox label="Weeks Open" value={weeks.filter(w=>w.status==="intention").length} sub="to plan" accent="#B06EF3"/>
    </div>
    <div>
      <SL>ROLLING RUNWAY</SL>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}}>
        {weeks.map(w=><ZoneCard key={w.id} week={w.id} niche={w.niche} status={w.status} score={w.score} frozen={w.frozen} onClick={()=>onNavigate(w.status==="intention"?"planner":"engine")}/>)}
      </div>
    </div>
    {!live&&!draft&&<div style={{background:"#0A1A0A",border:"1px solid #ADFF2F33",borderRadius:"12px",padding:"16px"}}>
      <SL color="#ADFF2F">HOW TO START</SL>
      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
        {["1. Go to Planner → enter your niche (e.g. Personal Finance, AI Tools)","2. Search for trending topics → pick one","3. Select content type mix → Lock Week 1","4. Go to Content Engine → generate all 21 scripts","5. Export jobs → run Python pipeline → upload to YouTube"].map((s,i)=><div key={i} style={{fontSize:"13px",color:"#888"}}>{s}</div>)}
      </div>
    </div>}
    <Card>
      <SL>PIPELINE STATUS</SL>
      {steps.map((step,i)=>{
        const dc=step.s==="done"?"#ADFF2F":step.s==="active"?"#FF6B35":"#2a2a3a";
        return <div key={i} style={{display:"flex",gap:"12px",alignItems:"flex-start",marginBottom:"10px"}}>
          <div style={{width:18,height:18,borderRadius:"50%",flexShrink:0,marginTop:"2px",display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid "+dc,background:dc+"18",fontSize:"9px",color:dc,...(step.s==="active"?{animation:"pulse 2s infinite"}:{})}}>{step.s==="done"?"✓":step.s==="active"?"◉":"○"}</div>
          <div style={{flex:1,fontSize:"13px",color:step.s==="pending"?"#444":"#CCC"}}>{step.text}</div>
          <span style={{fontFamily:"Space Mono",fontSize:"9px",color:"#333",flexShrink:0}}>{step.t}</span>
        </div>;
      })}
    </Card>
    <div style={{background:"#0D1A0D",border:"1px solid #ADFF2F33",borderRadius:"12px",padding:"14px 16px"}}>
      <SL color="#ADFF2F">YOUR NEXT ACTION</SL>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px",flexWrap:"wrap"}}>
        <p style={{fontSize:"14px",color:"#CCC",flex:1}}>{nextAction.msg}</p>
        {nextAction.tab&&<Btn small variant="green" onClick={()=>onNavigate(nextAction.tab)}>Go</Btn>}
      </div>
    </div>
  </div>;
}

// Weekly Planner
function WeeklyPlanner({weeks,setWeeks,lastInsight}){
  const [selWeek,setSelWeek]=useState(()=>{const w=weeks.find(x=>x.status==="intention");return w?.id||1;});
  const [niche,setNiche]=useState("");
  const [trending,setTrending]=useState([]);
  const [loading,setLoading]=useState(false);
  const [trendErr,setTrendErr]=useState("");
  const [selTopic,setSelTopic]=useState(null);
  const [custom,setCustom]=useState("");
  const [selTypes,setSelTypes]=useState(["cliffhanger","explanatory"]);
  const [usedRec,setUsedRec]=useState(false);
  const week=weeks.find(w=>w.id===selWeek);
  const activeTopic=selTopic?.topic||custom;
  const hasRecs=lastInsight?.nextNiches?.length>0;
  const applyRec=n=>{setCustom(n);setSelTopic(null);setNiche(n);setUsedRec(true);};
  const doSearch=async()=>{if(!niche.trim()){setTrendErr("Enter a niche first");return;}setTrendErr("");setLoading(true);setTrending([]);try{const t=await fetchTrending(niche.trim());setTrending(t.length?t:[{topic:"No results — try broader term",heat:0,source:"—"}]);}catch{setTrendErr("Search failed — check connection");}setLoading(false);};
  const toggleType=id=>setSelTypes(p=>p.includes(id)?p.filter(t=>t!==id):[...p,id]);
  const lockWeek=()=>{if(!activeTopic||!selTypes.length)return;setWeeks(prev=>prev.map(w=>w.id===selWeek?{...w,status:weeks.filter(x=>x.status==="live").length===0?"live":"draft",frozen:weeks.filter(x=>x.status==="live").length===0,niche:niche.trim()||activeTopic.slice(0,22),topic:activeTopic,contentTypes:selTypes,slots:makeSlots(selTypes)}:w));setSelTopic(null);setCustom("");setNiche("");setTrending([]);setUsedRec(false);};
  return <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:"18px"}}>
    <div><h2 style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.02em"}}>Weekly Planner</h2><p style={{color:"#555",fontSize:"13px",marginTop:"3px"}}>One niche · One week · 21 videos · Rolling runway</p></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}}>
      {weeks.map(w=><ZoneCard key={w.id} week={w.id} niche={w.niche} status={w.status} score={w.score} frozen={w.frozen} selected={selWeek===w.id} onClick={()=>setSelWeek(w.id)}/>)}
    </div>
    {week&&(week.status==="live"||week.status==="draft")&&!week.frozen&&<Card accent="#FF6B3544"><SL color="#FF6B35">WEEK {selWeek} LOCKED — {week.slots?.length||0} SLOTS READY</SL><p style={{fontSize:"13px",color:"#888",marginBottom:"10px"}}>Go to <strong style={{color:"#ADFF2F"}}>Content Engine</strong> to generate scripts.</p><div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}><Tag color="#FF6B35">{week.niche}</Tag><Tag color="#00CFFF">{(week.topic||"").slice(0,32)}</Tag></div></Card>}
    {week&&week.frozen&&<Card accent="#ADFF2F33"><SL color="#ADFF2F">WEEK {selWeek} — LIVE AND PUBLISHING</SL><p style={{fontSize:"13px",color:"#888",lineHeight:1.75}}>Publishing automatically 3x/day. Analytics from this week feed the engine for future recommendations. Nothing to do here.</p></Card>}
    {week&&week.status==="intention"&&<Card style={{display:"flex",flexDirection:"column",gap:"18px"}}>
      <div style={{fontWeight:700,fontSize:"16px"}}>Planning Week {selWeek}{weeks.filter(x=>x.status==="live").length===0?" — This becomes your live Week 1":""}</div>
      {hasRecs&&<div style={{background:"#070712",border:"1px solid #00CFFF22",borderRadius:"12px",padding:"14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}><div style={{width:22,height:22,borderRadius:"50%",background:"#00CFFF14",border:"1px solid #00CFFF44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",color:"#00CFFF"}}>◈</div><SL color="#00CFFF" style={{margin:0}}>ENGINE RECOMMENDS — FROM YOUR ANALYTICS</SL></div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"8px"}}>{lastInsight.nextNiches.map((n,i)=><button key={i} onClick={()=>applyRec(n)} style={{background:usedRec&&custom===n?"#0D1A0D":"#0A0A12",border:"1px solid "+(usedRec&&custom===n?"#ADFF2F":i===0?"#FF6B3566":"#1A1A2A"),color:i===0?"#FF6B35":"#888",padding:"7px 14px",borderRadius:"8px",fontFamily:"Syne",fontWe
